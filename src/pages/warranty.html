<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>质保期管理</title>
  <link rel="stylesheet" href="../../styles.css" />
  <script defer src="../../frontend-api.js"></script>
  <script defer src="../../app.js"></script>
</head>
<body>
  <div id="app"></div>
  <script>
    const state = {
      defaultRule: null,
      employmentRecords: []
    };

    function addMonths(dateStr, months) {
      if (!dateStr) return '--';
      const parts = dateStr.slice(0, 10).split('-');
      const year = parseInt(parts[0], 10);
      const month = parseInt(parts[1], 10);
      const day = parseInt(parts[2], 10);
      
      const date = new Date(year, month - 1 + months, day);
      
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function getRemainingDays(expiryDateStr) {
      if (expiryDateStr === '--') return 0;
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      
      const parts = expiryDateStr.split('-');
      const expiry = new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
      
      const diffTime = expiry - today;
      const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
      return diffDays;
    }

    function maskPhone(phone) {
      if (!phone) return '--';
      if (phone.length >= 7) {
        return phone.slice(0, 3) + '****' + phone.slice(-4);
      }
      return phone;
    }

    async function loadData() {
      try {
        // 1. 加载所有质保期规则并查找统一配置
        const rules = await window.hrApi.warrantyRules();
        state.defaultRule = rules.find(r => r.scope === '入职质保期');
        if (state.defaultRule) {
          document.querySelector('[data-warranty-select]').value = String(state.defaultRule.months);
        } else {
          document.querySelector('[data-warranty-select]').value = "6";
        }

        // 2. 加载在职中的质保期候选人 (已入职状态)
        const records = await window.hrApi.employmentRecords();
        state.employmentRecords = records.filter(r => r.status === '已入职');
        
        renderMonitoringList();
      } catch (err) {
        console.error("加载质保数据失败:", err);
        showToast("加载数据失败，请重试");
      }
    }

    function renderMonitoringList() {
      const container = document.querySelector('[data-monitoring-rows]');
      if (!container) return;

      const months = state.defaultRule ? state.defaultRule.months : 6;

      if (!state.employmentRecords.length) {
        container.innerHTML = `
          <div class="table-row" style="grid-template-columns: 1fr;">
            <div class="item-meta" style="text-align: center; padding: 20px; color: var(--muted-foreground); width: 100%;">暂无在质保期中的已入职候选人</div>
          </div>
        `;
        return;
      }

      container.innerHTML = state.employmentRecords.map(r => {
        const onboardDate = r.onboard_date ? r.onboard_date.slice(0, 10) : '--';
        const expiryDate = r.onboard_date ? addMonths(onboardDate, months) : '--';
        const remainingDays = r.onboard_date ? getRemainingDays(expiryDate) : 0;
        
        const isCritical = remainingDays <= 90;
        const daysHtml = isCritical 
          ? `<span style="background-color: #fee2e2; color: #ef4444; padding: 4px 12px; border-radius: 12px; font-weight: 600; font-size: 12px; display: inline-block;">${remainingDays}天</span>`
          : `<span>${remainingDays}天</span>`;

        const isActive = remainingDays >= 0;
        const statusChip = isActive
          ? `<span class="chip success" style="flex-shrink: 0; width: 80px; text-align: center; display: inline-block;">激活</span>`
          : `<span class="chip danger" style="flex-shrink: 0; width: 80px; text-align: center; display: inline-block;">已失效</span>`;

        const reactivateBtn = !isActive
          ? `<button class="btn-sm primary" data-action="reactivate" data-id="${r.candidate_id}" data-company="${escapeHtml(r.company_name)}" data-position="${escapeHtml(r.position_name)}">重新激活</button>`
          : '';

        return `
          <div class="table-row" style="grid-template-columns: 1fr 1.2fr 1.2fr 1fr 1.2fr 1fr 1fr 1.5fr; align-items: center;">
            <div style="font-weight:600; color:var(--foreground);">${escapeHtml(r.candidate_name || '未知')}</div>
            <div>${maskPhone(r.candidate_phone)}</div>
            <div>${onboardDate}</div>
            <div>${months}个月</div>
            <div>${expiryDate}</div>
            <div>${daysHtml}</div>
            <div>${statusChip}</div>
            <div class="table-actions" style="gap: 8px;">
              <button class="btn-sm" data-action="view-detail" data-id="${r.candidate_id}">查看详情</button>
              ${reactivateBtn}
            </div>
          </div>
        `;
      }).join('');
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }

    window.__PAGE_BODY__ = `
      <div style="background-color: #fffbeb; border: 1px solid #fef3c7; color: #d97706; padding: 12px 16px; border-radius: var(--radius); font-size: 13px; margin-bottom: 20px; display: flex; align-items: center; gap: 8px;">
        <span>⚠️ 此模块仅超级管理员可访问。质保期设置将影响全系统所有简历的激活/失效状态。</span>
      </div>

      <section class="panel">
        <div class="section-head">
          <div>
            <h3>质保期设置</h3>
          </div>
        </div>
        <div style="padding: 16px 20px;">
          <div style="display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px;">
            <label style="font-size: 12px; font-weight: 600; color: var(--foreground);">统一质保期 (月)</label>
            <select class="input" data-warranty-select style="max-width: 320px;">
              <option value="1">1 个月</option>
              <option value="3">3 个月</option>
              <option value="6">6 个月</option>
              <option value="9">9 个月</option>
              <option value="12">12 个月</option>
            </select>
          </div>
          <p class="subtle" style="margin-bottom: 20px; font-size: 12px; color: var(--muted-foreground);">
            质保期从简历入库时间开始计算，质保期结束后简历状态自动变为「失效」。再次导入此简历时，状态恢复为「激活」。
          </p>
          <button class="btn primary" data-action="save-settings" style="height: 38px; padding: 0 24px;">保存设置</button>
        </div>
      </section>

      <section class="panel" style="margin-top: 24px;">
        <div class="section-head" style="border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 16px;">
          <div>
            <h3>简历质保期监控</h3>
          </div>
        </div>
        <div class="table-card">
          <div class="table-head" style="grid-template-columns: 1fr 1.2fr 1.2fr 1fr 1.2fr 1fr 1fr 1.5fr;">
            <div>姓名</div>
            <div>手机号</div>
            <div>入库日期</div>
            <div>质保期</div>
            <div>到期日期</div>
            <div>剩余天数</div>
            <div>状态</div>
            <div>操作</div>
          </div>
          <div class="table-rows-container" data-monitoring-rows>
            <div class="table-row" style="grid-template-columns: 1fr;">
              <div class="item-meta" style="text-align: center; padding: 20px;">加载数据中...</div>
            </div>
          </div>
        </div>
      </section>
    `;

    window.addEventListener('DOMContentLoaded', async () => {
      await renderApp();
      await loadData();
    });

    document.addEventListener('click', async (event) => {
      const btn = event.target.closest('[data-action]');
      if (!btn) return;

      if (btn.dataset.action === 'save-settings') {
        const select = document.querySelector('[data-warranty-select]');
        const months = parseInt(select.value, 10);
        
        try {
          if (state.defaultRule) {
            state.defaultRule = await window.hrApi.updateWarrantyRule(state.defaultRule.id, {
              scope: '入职质保期',
              months: months,
              remind_days: 5,
              auto_expire: true
            });
          } else {
            state.defaultRule = await window.hrApi.createWarrantyRule({
              scope: '入职质保期',
              months: months,
              remind_days: 5,
              auto_expire: true
            });
          }
          showToast("质保期设置保存成功！");
          await loadData();
        } catch (err) {
          console.error("保存设置失败:", err);
          showToast("保存设置失败，请重试");
        }
      }

      if (btn.dataset.action === 'reactivate') {
        const candidateId = Number(btn.dataset.id);
        const companyName = btn.dataset.company;
        const positionName = btn.dataset.position;
        if (!confirm("确定重新激活该求职者的质保期吗？这会将其入职时间更新为今天。")) return;

        try {
          const todayStr = new Date().toISOString().slice(0, 10);
          await window.hrApi.createEmploymentRecord({
            candidate_id: candidateId,
            status: "已入职",
            company_name: companyName,
            position_name: positionName,
            onboard_date: new Date(todayStr).toISOString(),
            note: "重新激活质保期"
          });
          showToast("质保期重新激活成功！");
          await loadData();
        } catch (err) {
          console.error("重新激活失败:", err);
          showToast("操作失败，请重试");
        }
      }
    });
  </script>
</body>
</html>
