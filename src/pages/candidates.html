<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>求职者数据池</title>
  <link rel="stylesheet" href="../../styles.css" />
  <style>
    .province-item, .city-item, .search-result-item {
      padding: 8px 12px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 12px;
      color: #334155;
      transition: all 0.2s;
      text-align: left;
    }
    .province-item:hover, .city-item:hover, .search-result-item:hover {
      background: rgba(15, 23, 42, 0.05);
      color: #0f172a;
    }
    .province-item.active {
      background: rgba(15, 23, 42, 0.08);
      color: #0d9488;
      font-weight: 600;
    }
  </style>
  <script defer src="../../frontend-api.js"></script>
  <script defer src="../../app.js"></script>
</head>
<body>
  <div id="app"></div>
  <script>
    window.__PAGE_BODY__ = `
      <section class="metrics" style="grid-template-columns: repeat(3, minmax(0, 1fr));">
        <div class="metric-card">
          <div class="metric-top"><div><div class="section-sub">候选人总数</div></div><div class="metric-icon">○</div></div>
          <div class="metric-value" data-candidate-total>0</div>
          <div class="metric-label">覆盖全部简历资源</div>
        </div>
        <div class="metric-card">
          <div class="metric-top"><div><div class="section-sub">今日新增</div></div><div class="metric-icon">△</div></div>
          <div class="metric-value" data-candidate-new>0</div>
          <div class="metric-label">比昨日增加 3.2%</div>
        </div>
        <div class="metric-card">
          <div class="metric-top"><div><div class="section-sub">已锁定候选人</div></div><div class="metric-icon">◌</div></div>
          <div class="metric-value" data-candidate-locked>0</div>
          <div class="metric-label">当前被项目占用</div>
        </div>
      </section>

      <section class="panel">
        <div class="section-head">
          <div>
            <h3>搜索工具栏</h3>
            <div class="section-sub">关键词、城市组合搜索，快速定位候选人。</div>
          </div>
          <div class="hero-actions" style="margin-top:0">
            <button class="btn primary" data-action="search-candidates">搜索</button>
          </div>
        </div>
        <div class="toolbar" style="margin-bottom:0; padding:0; border:0; box-shadow:none; background:transparent; display:flex; gap:12px;">
          <input class="input wide" data-field="candidate-keyword" placeholder="搜索公司、职位、专业、学校、行业、技能等关键词" style="flex:3;" />
          <div class="city-selector-wrapper" style="position: relative; flex: 1; min-width: 220px;">
            <input class="input" data-field="candidate-city" placeholder="期望城市（如：北京、上海、深圳）" autocomplete="off" style="width: 100%;" />
            <div class="city-dropdown" style="display: none; position: absolute; top: calc(100% + 4px); right: 0; width: 380px; background: #fff; border: 1px solid rgba(15,23,42,.12); border-radius: 8px; box-shadow: 0 10px 15px -3px rgba(0,0,0,.1), 0 4px 6px -4px rgba(0,0,0,.1); z-index: 1000; padding: 12px;">
              <div class="city-search-results" style="display: none; max-height: 240px; overflow-y: auto;">
              </div>
              <div class="city-cascade-view" style="display: flex; height: 240px;">
                <div class="province-list" style="width: 130px; border-right: 1px solid rgba(15,23,42,.06); overflow-y: auto; padding-right: 8px;">
                </div>
                <div class="city-list" style="flex: 1; overflow-y: auto; padding-left: 12px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; align-content: start;">
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="grid-2">
        <div class="panel">
          <div class="section-head">
            <div>
              <h3>筛选条件</h3>
              <div class="section-sub">学历、年龄、经验多维度下拉检索。</div>
            </div>
          </div>
          <div class="list">
            <div class="list-item">
              <div class="item-top">
                <div style="width: 100%;">
                  <div class="item-title" style="margin-bottom: 6px;">学历要求</div>
                  <select class="input" data-filter-education style="width: 100%;">
                    <option value="">不限</option>
                    <option value="大专">大专及以上</option>
                    <option value="本科">本科及以上</option>
                    <option value="硕士">硕士及以上</option>
                  </select>
                </div>
              </div>
            </div>
            <div class="list-item">
              <div class="item-top">
                <div style="width: 100%;">
                  <div class="item-title" style="margin-bottom: 6px;">年龄要求</div>
                  <select class="input" data-filter-age style="width: 100%;">
                    <option value="">不限</option>
                    <option value="20-25">20-25岁</option>
                    <option value="25-30">25-30岁</option>
                    <option value="30-35">30-35岁</option>
                    <option value="35-40">35-40岁</option>
                    <option value="40+">40岁以上</option>
                  </select>
                </div>
              </div>
            </div>
            <div class="list-item">
              <div class="item-top">
                <div style="width: 100%;">
                  <div class="item-title" style="margin-bottom: 6px;">经验要求</div>
                  <select class="input" data-filter-experience style="width: 100%;">
                    <option value="">不限</option>
                    <option value="0">无经验/应届</option>
                    <option value="1-3">1-3年</option>
                    <option value="3-5">3-5年</option>
                    <option value="5-10">5-10年</option>
                    <option value="10+">10年以上</option>
                  </select>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="panel">
          <div class="section-head">
            <div>
              <h3>快捷筛选</h3>
              <div class="section-sub">选择热词、排序和过滤条件，并支持保存当前方案。</div>
            </div>
          </div>
          <div class="list">
            <div class="list-item">
              <div class="item-top">
                <div>
                  <div class="item-title" style="margin-bottom: 8px;">猜你想搜 (点击切换选中)</div>
                  <div class="skills" data-hotkey-container>
                    <span class="skill-tag" data-hotkey="销售" style="cursor:pointer; transition: all 0.15s;">销售</span>
                    <span class="skill-tag" data-hotkey="课程顾问" style="cursor:pointer; transition: all 0.15s;">课程顾问</span>
                    <span class="skill-tag" data-hotkey="招聘" style="cursor:pointer; transition: all 0.15s;">招聘</span>
                    <span class="skill-tag" data-hotkey="行政" style="cursor:pointer; transition: all 0.15s;">行政</span>
                    <span class="skill-tag" data-hotkey="客服" style="cursor:pointer; transition: all 0.15s;">客服</span>
                    <span class="skill-tag" data-hotkey="Java" style="cursor:pointer; transition: all 0.15s;">Java</span>
                    <span class="skill-tag" data-hotkey="前端" style="cursor:pointer; transition: all 0.15s;">前端</span>
                    <span class="skill-tag" data-hotkey="产品经理" style="cursor:pointer; transition: all 0.15s;">产品经理</span>
                  </div>
                </div>
              </div>
            </div>
            <div class="list-item">
              <div class="item-top">
                <div style="width: 100%;">
                  <div class="item-title" style="margin-bottom: 6px;">排序</div>
                  <select class="input" data-filter-sort style="width: 100%;">
                    <option value="default">默认关联排序</option>
                    <option value="created_desc">更新/导入时间降序</option>
                    <option value="age_asc">年龄升序</option>
                  </select>
                </div>
              </div>
            </div>
            <div class="list-item">
              <div class="item-top">
                <div style="width: 100%; display:flex; justify-content:space-between; align-items:flex-end; gap: 12px;">
                  <div style="flex: 1;">
                    <div class="item-title" style="margin-bottom: 6px;">状态过滤</div>
                    <select class="input" data-filter-exclude style="width: 100%;">
                      <option value="">不限</option>
                      <option value="unlocked">未锁定</option>
                      <option value="locked">已锁定</option>
                    </select>
                  </div>
                  <button class="btn success" data-action="open-search-preset-modal" style="height: 38px;">保存搜索方案</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="panel" style="padding:0;">
        <div class="section-head" style="padding:16px 16px 0; display:flex; justify-content:space-between; align-items:center;">
          <div>
            <h3>候选人列表</h3>
            <div class="section-sub">按岗位需求筛选、推进和管理候选人。</div>
          </div>
          <div class="hero-actions" style="margin-top:0">
            <button class="btn secondary" data-action="export-selected" style="height:38px;">导出简历</button>
          </div>
        </div>
        <div class="table-card" style="border:0; box-shadow:none; border-radius:0; margin-top:10px;">
          <div class="table-head">
            <div><input type="checkbox" data-action="toggle-all-candidates" aria-label="全选" /></div>
            <div>候选人</div>
            <div>基本信息</div>
            <div>期望职位</div>
            <div>期望城市</div>
            <div>薪资</div>
            <div>来源</div>
            <div>状态</div>
            <div>活跃 / 操作</div>
          </div>

          <div class="table-row" data-candidate-empty>
            <div><input type="checkbox" aria-label="候选人空状态" disabled /></div>
            <div>
              <div class="row-title">
                <div class="avatar-sm"></div>
                <div>
                  <strong>暂无候选人数据</strong>
                  <div class="row-sub">候选人列表来自数据库记录。</div>
                </div>
              </div>
            </div>
            <div>姓名 / 职位</div>
            <div>城市 / 联系</div>
            <div>状态 / 来源</div>
            <div class="mono">--</div>
            <div>--</div>
            <div><span class="state active">待同步</span></div>
            <div>
              <div class="row-sub">--</div>
            </div>
          </div>

          <div class="table-foot" style="display:flex; justify-content:space-between; align-items:center;">
            <div class="legend">
              <span class="legend-item"><span class="legend-dot new"></span>新入库</span>
              <span class="legend-item"><span class="legend-dot active"></span>激活</span>
              <span class="legend-item"><span class="legend-dot locked"></span>锁定</span>
              <span class="legend-item"><span class="legend-dot released"></span>释放</span>
            </div>
            <div style="display:flex; align-items:center; gap:12px; margin-left:auto;">
              <span data-candidate-foot>共 0 条记录</span>
              <div class="pagination-buttons" style="display:flex; align-items:center; gap:6px;">
                <button class="btn small" data-action="prev-page" style="padding:2px 8px; font-size:12px; height:auto; line-height:1.2;">上一页</button>
                <span data-page-indicator style="font-size:13px; font-weight:500; min-width:48px; text-align:center; display:inline-block;">1 / 1</span>
                <button class="btn small" data-action="next-page" style="padding:2px 8px; font-size:12px; height:auto; line-height:1.2;">下一页</button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="grid-2 page-section">
        <div class="panel">
          <div class="section-head">
            <div>
              <h3>候选人跟踪</h3>
              <div class="section-sub">推荐、面试、薪资、入职的真实跟踪明细。</div>
            </div>
          </div>
          <div class="list" data-tracking-events>
            <div class="list-item"><div class="item-top"><div><div class="item-title">推荐事件</div><div class="item-meta">候选人状态、推荐岗位和推荐人会写入跟踪表</div></div><span class="chip primary">跟踪</span></div></div>
          </div>
        </div>
        <div class="panel">
          <div class="section-head">
            <div>
              <h3>面试 / 薪资 / 入职</h3>
              <div class="section-sub">按候选人查看生命周期内的后续事件。</div>
            </div>
          </div>
          <div class="list" data-lifecycle-events>
            <div class="list-item"><div class="item-top"><div><div class="item-title">面试记录</div><div class="item-meta">第 1 轮、面试结果、面试官、时间</div></div><span class="chip success">面试</span></div></div>
            <div class="list-item"><div class="item-top"><div><div class="item-title">薪资记录</div><div class="item-meta">期望薪资、offer 薪资、服务状态</div></div><span class="chip warning">薪资</span></div></div>
            <div class="list-item"><div class="item-top"><div><div class="item-title">入职记录</div><div class="item-meta">公司、岗位、入职日期、入职状态</div></div><span class="chip neutral">入职</span></div></div>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="section-head">
          <div>
            <h3>导出历史</h3>
            <div class="section-sub">查看候选人导出的真实记录。</div>
          </div>
        </div>
        <div class="list" data-export-history>
          <div class="list-item"><div class="item-meta">导出记录来自数据库，可按候选人回看。</div></div>
        </div>
      </section>
      <section class="panel">
        <div class="section-head">
          <div>
            <h3>快捷搜索记录</h3>
            <div class="section-sub">保存过的筛选条件可重复使用。</div>
          </div>
        </div>
        <div class="list" data-search-presets>
          <div class="list-item"><div class="item-meta">快捷搜索记录来自数据库，可重复使用。</div></div>
        </div>
      </section>

      <div class="modal" data-export-modal style="display:none; position:fixed; inset:0; background:rgba(14,22,34,.45); z-index:2000; padding:24px;">
        <div class="panel" style="max-width:760px; margin:6vh auto 0; background:#fff;">
          <div class="section-head">
            <div>
              <h3>简历导出</h3>
              <div class="section-sub">选择客户、项目、岗位和格式后确认导出，系统会生成带水印的导出记录。</div>
            </div>
            <div class="hero-actions" style="margin-top:0">
              <button class="btn" data-action="close-export-modal">取消</button>
              <button class="btn primary" data-action="confirm-export-upload">确认导出</button>
            </div>
          </div>
          <div class="grid-2">
            <div class="panel" style="box-shadow:none; border:1px solid rgba(15,23,42,.08);">
              <h3>导出参数</h3>
              <div class="list">
                <div class="list-item"><div class="item-top"><div><div class="item-title">候选人</div><div class="item-meta">选择要导出的候选人</div></div></div><select class="input" data-export-candidate></select></div>
                <div class="list-item"><div class="item-top"><div><div class="item-title">客户公司</div><div class="item-meta">选择本次导出的客户公司</div></div></div><select class="input" data-export-company></select></div>
                <div class="list-item"><div class="item-top"><div><div class="item-title">项目</div><div class="item-meta">选择本次导出的项目</div></div></div><select class="input" data-export-project></select></div>
                <div class="list-item"><div class="item-top"><div><div class="item-title">岗位</div><div class="item-meta">选择本次导出的岗位</div></div></div><select class="input" data-export-position></select></div>
                <div class="list-item"><div class="item-top"><div><div class="item-title">格式</div><div class="item-meta">Word 或 PDF</div></div></div><select class="input" data-export-format><option value="PDF">PDF</option><option value="Word">Word</option></select></div>
              </div>
            </div>
            <div class="panel" style="box-shadow:none; border:1px solid rgba(15,23,42,.08);">
              <h3>导出历史</h3>
              <div class="list" data-export-history-modal>
                <div class="list-item"><div class="item-meta">导出记录来自数据库，可按候选人回看。</div></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="modal" data-search-preset-modal style="display:none; position:fixed; inset:0; background:rgba(14,22,34,.45); z-index:2000; padding:24px;">
        <div class="panel" style="max-width:680px; margin:10vh auto 0; background:#fff;">
          <div class="section-head">
            <div>
              <h3>保存快捷搜索</h3>
              <div class="section-sub">给当前筛选条件起一个名字，方便后面重复使用。</div>
            </div>
            <div class="hero-actions" style="margin-top:0">
              <button class="btn" data-action="close-search-preset-modal">取消</button>
              <button class="btn primary" data-action="confirm-search-preset-upload">确认保存</button>
            </div>
          </div>
          <div class="list">
            <div class="list-item"><div class="item-top"><div><div class="item-title">预设名称</div><div class="item-meta">用于在列表中识别这组条件</div></div></div><input class="input" data-search-preset-name /></div>
            <div class="list-item"><div class="item-top"><div><div class="item-title">当前条件</div><div class="item-meta">会保存关键词、城市和职位条件</div></div></div><div class="item-meta" data-search-preset-summary>关键词：全部 · 城市：全部 · 职位：全部</div></div>
          </div>
        </div>
      </div>

      <div class="modal" data-candidate-detail-modal style="display:none; position:fixed; inset:0; background:rgba(14,22,34,.45); z-index:2000; padding:24px;">
        <div class="panel" style="max-width:840px; margin:8vh auto 0; background:#fff;">
          <div class="section-head">
            <div>
              <h3 data-candidate-detail-title>候选人详情</h3>
              <div class="section-sub" data-candidate-detail-sub>查看候选人的真实数据、状态和后续动作。</div>
            </div>
            <div class="hero-actions" style="margin-top:0">
              <button class="btn" data-action="close-candidate-detail-modal">关闭</button>
              <button class="btn" data-action="edit-candidate" data-id="">编辑资料</button>
              <button class="btn primary" data-action="open-candidate-mail-modal">发送邮件</button>
            </div>
          </div>
        <div class="grid-2">
            <div class="panel" style="box-shadow:none; border:1px solid rgba(15,23,42,.08);">
              <div class="list">
                <div class="list-item"><div class="item-top"><div><div class="item-title">姓名</div><div class="item-meta" data-candidate-detail-name>--</div></div><span class="chip primary">基础</span></div></div>
                <div class="list-item"><div class="item-top"><div><div class="item-title">基本信息</div><div class="item-meta" data-candidate-detail-basic>--</div></div><span class="chip primary">基础</span></div></div>
                <div class="list-item"><div class="item-top"><div><div class="item-title">期望薪资</div><div class="item-meta" data-candidate-detail-salary>--</div></div><span class="chip neutral">期望</span></div></div>
                <div class="list-item"><div class="item-top"><div><div class="item-title">电话</div><div class="item-meta" data-candidate-detail-phone>--</div></div><span class="chip neutral">联系</span></div></div>
                <div class="list-item"><div class="item-top"><div><div class="item-title">城市</div><div class="item-meta" data-candidate-detail-city>--</div></div><span class="chip success">地区</span></div></div>
                <div class="list-item"><div class="item-top"><div><div class="item-title">当前职位</div><div class="item-meta" data-candidate-detail-title2>--</div></div><span class="chip warning">岗位</span></div></div>
                <div class="list-item"><div class="item-top"><div><div class="item-title">状态</div><div class="item-meta" data-candidate-detail-status>--</div></div><span class="chip neutral">状态</span></div></div>
              </div>
            </div>
            <div class="panel" style="box-shadow:none; border:1px solid rgba(15,23,42,.08);">
              <h3>后续动作</h3>
              <div class="list">
                <div class="list-item"><div class="item-top"><div><div class="item-title">锁定 / 释放</div><div class="item-meta">从详情窗中直接流转候选人状态。</div></div><span class="chip primary">真实操作</span></div></div>
                <div class="list-item"><div class="item-top"><div><div class="item-title">推荐 / 面试</div><div class="item-meta">后续可继续在推荐和面试模块中推进。</div></div><span class="chip success">流程</span></div></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="modal" data-candidate-salary-modal style="display:none; position:fixed; inset:0; background:rgba(14,22,34,.45); z-index:3000; padding:24px;">
        <div class="panel" style="max-width:760px; margin:10vh auto 0; background:#fff;">
          <div class="section-head">
            <div>
              <h3>薪资记录</h3>
              <div class="section-sub">填写候选人的薪资跟踪信息并保存到数据库。</div>
            </div>
            <div class="hero-actions" style="margin-top:0">
              <button class="btn" data-action="close-candidate-salary-modal">取消</button>
              <button class="btn primary" data-action="confirm-candidate-salary">确认保存</button>
            </div>
          </div>
          <div class="grid-2">
            <div class="panel" style="box-shadow:none; border:1px solid rgba(15,23,42,.08);">
              <div class="list">

                <div class="list-item"><div class="item-top"><div><div class="item-title">当前职位</div><div class="item-meta">现任岗位</div></div></div><input class="input" data-candidate-title /></div>
                <div class="list-item"><div class="item-top"><div><div class="item-title">城市</div><div class="item-meta">期望或所在城市</div></div></div><input class="input" data-candidate-city-create /></div>

      <div class="modal" data-candidate-action-modal style="display:none; position:fixed; inset:0; background:rgba(14,22,34,.45); z-index:3000; padding:24px;">
        <div class="panel" style="max-width:620px; margin:12vh auto 0; background:#fff;">
          <div class="section-head">
            <div><h3>候选人状态确认</h3><div class="section-sub">确认后才会执行锁定或释放。</div></div>
            <div class="hero-actions" style="margin-top:0"><button class="btn" data-action="close-candidate-action-modal">取消</button><button class="btn primary" data-action="confirm-candidate-action">确认执行</button></div>
          </div>
          <div class="list">
            <div class="list-item"><div class="item-top"><div><div class="item-title" data-candidate-action-title>等待操作</div><div class="item-meta" data-candidate-action-desc>点击列表或详情按钮后会在这里确认。</div></div><span class="chip warning">确认</span></div></div>
          </div>
        </div>
      </div>
    `;
    window.addEventListener('DOMContentLoaded', async () => {
      await renderApp();
      window.candidatesPageState = {
        list: [],
        rawList: [],
        currentPage: 1,
        pageSize: 10,
        applyFilters() {
          const keyword = document.querySelector('[data-field="candidate-keyword"]')?.value?.trim() || "";
          const city = document.querySelector('[data-field="candidate-city"]')?.value?.trim() || "";
          const education = document.querySelector('[data-filter-education]')?.value || "";
          const ageRange = document.querySelector('[data-filter-age]')?.value || "";
          const expRange = document.querySelector('[data-filter-experience]')?.value || "";
          const sortVal = document.querySelector('[data-filter-sort]')?.value || "default";
          const excludeVal = document.querySelector('[data-filter-exclude]')?.value || "";
          
          const activeHotkeys = Array.from(document.querySelectorAll('[data-hotkey].active')).map(el => el.getAttribute('data-hotkey'));
          
          let filtered = [...this.rawList];

          // 关键词过滤
          if (keyword) {
            const kw = keyword.toLowerCase();
            filtered = filtered.filter(i => {
              return [
                i.name,
                i.current_title,
                i.education,
                i.city,
                i.source,
                i.gender,
                i.age ? String(i.age) : '',
                i.experience_years ? String(i.experience_years) : '',
                i.expected_salary
              ].join(" ").toLowerCase().includes(kw);
            });
          }

          // 城市过滤
          if (city) {
            const cVal = city.toLowerCase();
            filtered = filtered.filter(i => (i.city || "").toLowerCase().includes(cVal));
          }
          
          // 1. 学历要求过滤
          if (education) {
            filtered = filtered.filter(i => {
              const edu = String(i.education || "");
              if (education === '硕士') return edu.includes('硕士') || edu.includes('研究生') || edu.includes('博士');
              if (education === '本科') return edu.includes('本科') || edu.includes('硕士') || edu.includes('研究生') || edu.includes('博士');
              if (education === '大专') return edu.includes('大专') || edu.includes('专科') || edu.includes('本科') || edu.includes('硕士');
              return true;
            });
          }
          
          // 2. 年龄过滤
          if (ageRange) {
            filtered = filtered.filter(i => {
              const age = Number(i.age);
              if (!age) return false;
              if (ageRange === '20-25') return age >= 20 && age <= 25;
              if (ageRange === '25-30') return age >= 25 && age <= 30;
              if (ageRange === '30-35') return age >= 30 && age <= 35;
              if (ageRange === '35-40') return age >= 35 && age <= 40;
              if (ageRange === '40+') return age > 40;
              return true;
            });
          }
          
          // 3. 经验过滤
          if (expRange) {
            filtered = filtered.filter(i => {
              const exp = Number(i.experience_years);
              if (expRange === '0') return !exp || exp === 0;
              if (expRange === '1-3') return exp >= 1 && exp <= 3;
              if (expRange === '3-5') return exp >= 3 && exp <= 5;
              if (expRange === '5-10') return exp >= 5 && exp <= 10;
              if (expRange === '10+') return exp > 10;
              return true;
            });
          }
          
          // 4. 状态过滤 (unlocked / locked)
          if (excludeVal) {
            if (excludeVal === 'unlocked') {
              filtered = filtered.filter(i => !i.locked);
            } else if (excludeVal === 'locked') {
              filtered = filtered.filter(i => i.locked);
            }
          }
          
          // 5. 点击的热词额外检索匹配
          if (activeHotkeys.length > 0) {
            filtered = filtered.filter(i => {
              const text = [
                i.name,
                i.current_title,
                i.education,
                i.city,
                i.source
              ].join(" ").toLowerCase();
              return activeHotkeys.every(hk => text.includes(hk.toLowerCase()));
            });
          }
          
          // 6. 排序
          if (sortVal === 'created_desc') {
            filtered.sort((a, b) => {
              const tA = a.created_at ? new Date(a.created_at).getTime() : 0;
              const tB = b.created_at ? new Date(b.created_at).getTime() : 0;
              return tB - tA;
            });
          } else if (sortVal === 'age_asc') {
            filtered.sort((a, b) => (Number(a.age) || 999) - (Number(b.age) || 999));
          }
          
          this.list = filtered;
          this.currentPage = 1;
          this.renderOnly();
        },
        renderOnly() {
          const total = this.list.length;
          const totalPages = Math.max(1, Math.ceil(total / this.pageSize));
          if (this.currentPage > totalPages) this.currentPage = totalPages;
          if (this.currentPage < 1) this.currentPage = 1;

          const start = (this.currentPage - 1) * this.pageSize;
          const end = start + this.pageSize;
          const pageItems = this.list.slice(start, end);

          const totalNode = document.querySelector('[data-candidate-total]');
          const newNode = document.querySelector('[data-candidate-new]');
          const lockedNode = document.querySelector('[data-candidate-locked]');
          if (totalNode) totalNode.textContent = String(total);
          
          const localDate = new Date();
          const year = localDate.getFullYear();
          const month = String(localDate.getMonth() + 1).padStart(2, '0');
          const day = String(localDate.getDate()).padStart(2, '0');
          const todayPrefix = `${year}-${month}-${day}`;
          
          if (newNode) newNode.textContent = String(this.list.filter(i => i.created_at && i.created_at.startsWith(todayPrefix)).length);
          if (lockedNode) lockedNode.textContent = String(this.list.filter(i => i.locked).length);

          const footNode = document.querySelector('[data-candidate-foot]');
          const pageIndicator = document.querySelector('[data-page-indicator]');
          if (footNode) footNode.textContent = `共 ${total} 条记录`;
          if (pageIndicator) pageIndicator.textContent = `${this.currentPage} / ${totalPages}`;

          const table = document.querySelector('.table-card');
          if (table) {
            table.querySelectorAll('.table-row').forEach(row => row.remove());
            
            const rows = pageItems.map(i => {
              const basicInfo = [
                i.gender,
                i.age ? i.age + '岁' : '',
                i.education,
                i.experience_years ? i.experience_years + '年' : ''
              ].filter(Boolean).join(' / ') || '--';

              return `
                <div class="table-row">
                  <div><input type="checkbox" data-id="${i.id}" aria-label="选择${i.name}" /></div>
                  <div>
                    <div class="row-title">
                      <div class="avatar-sm"></div>
                      <div>
                        <strong>${i.name || ''}</strong>
                        <div class="row-sub">${i.city || ''} · ${i.current_title || ''}</div>
                      </div>
                    </div>
                    <div class="skills">
                      <span class="skill-tag">${i.source || '来源'}</span>
                      <span class="skill-tag">${i.locked ? '已锁定' : '未锁定'}</span>
                    </div>
                  </div>
                  <div>${basicInfo}</div>
                  <div>${i.current_title || '--'}</div>
                  <div>${i.city || '--'}</div>
                  <div class="mono">${i.expected_salary || '--'}</div>
                  <div>${i.source || '--'}</div>
                  <div><span class="state ${i.locked ? 'locked' : 'active'}">${i.status || '未知'}</span></div>
                  <div>
                    <div class="row-sub">${i.created_at || ''}</div>
                    <div class="table-actions" style="margin-top:8px;">
                      <button class="btn-sm primary" data-action="view-detail" data-id="${i.id}" data-title="${i.name}">详情</button>
                    </div>
                  </div>
                </div>
              `;
            }).join('') || `<div class="table-row"><div><input type="checkbox" aria-label="候选人空状态" disabled /></div><div><div class="row-title"><div class="avatar-sm"></div><div><strong>暂无候选人数据</strong><div class="row-sub">没有符合条件的候选人数据。</div></div></div></div><div>--</div><div>--</div><div>--</div><div class="mono">--</div><div>--</div><div><span class="state active">无数据</span></div><div><div class="row-sub">--</div></div></div>`;
            
            const head = table.querySelector('.table-head');
            if (head) {
              head.insertAdjacentHTML('afterend', rows);
            }
          }
        },
        render() {
          this.applyFilters();

        provinceListEl.innerHTML = CITY_DATA.map((p, idx) => `
          <div class="province-item ${idx === 0 ? 'active' : ''}" data-idx="${idx}">${p.province}</div>
        `).join('');
        
        provinceListEl.addEventListener('click', (e) => {
          const item = e.target.closest('.province-item');
          if (!item) return;
          provinceListEl.querySelectorAll('.province-item').forEach(el => el.classList.remove('active'));
          item.classList.add('active');
          const idx = parseInt(item.getAttribute('data-idx'));
          renderCities(idx);
        });
      }

      function renderCities(provinceIdx) {
        if (!cityListEl) return;
        const cities = CITY_DATA[provinceIdx].cities;
        cityListEl.innerHTML = cities.map(c => `
          <div class="city-item" data-val="${c}">${c}</div>
        `).join('');
      }

      renderCities(0);

      if (cityInput && cityDropdown) {
        cityInput.addEventListener('focus', () => {
          cityDropdown.style.display = 'block';
          filterCityDropdown();
        });
        cityInput.addEventListener('click', (e) => {
          e.stopPropagation();
          cityDropdown.style.display = 'block';
        });
        cityInput.addEventListener('input', () => {
          filterCityDropdown();
        });
      }

      document.addEventListener('click', (e) => {
        const cityItem = e.target.closest('.city-item, .search-result-item');
        if (cityItem) {
          const val = cityItem.getAttribute('data-val');
          if (cityInput) {
            cityInput.value = val;
            cityInput.dispatchEvent(new Event('input', { bubbles: true }));
          }
          if (cityDropdown) cityDropdown.style.display = 'none';
          window.candidatesPageState.applyFilters();
          return;
        }
        
        if (cityDropdown && !e.target.closest('.city-selector-wrapper')) {
          cityDropdown.style.display = 'none';
        }
      });

      function filterCityDropdown() {
        if (!cityInput || !searchResultsEl || !cascadeViewEl) return;
        const query = cityInput.value.trim().toLowerCase();
        if (!query) {
          searchResultsEl.style.display = 'none';
          cascadeViewEl.style.display = 'flex';
          return;
        }

        const matches = [];
        CITY_DATA.forEach(p => {
          p.cities.forEach(c => {
            if (c.toLowerCase().includes(query)) {
              matches.push(c);
            }
          });
        });

        if (matches.length > 0) {
          searchResultsEl.innerHTML = matches.map(c => `
            <div class="search-result-item" data-val="${c}">${c}</div>
          `).join('');
          searchResultsEl.style.display = 'block';
          cascadeViewEl.style.display = 'none';
        } else {
          searchResultsEl.innerHTML = '<div style="padding: 8px 12px; font-size: 12px; color: var(--muted-foreground);">未找到匹配城市</div>';
          searchResultsEl.style.display = 'block';
          cascadeViewEl.style.display = 'none';
        }

        if (e.target.matches('[data-action="toggle-all-candidates"]')) {
          const checked = e.target.checked;
          document.querySelectorAll('.table-card .table-row input[type="checkbox"]').forEach(cb => {
            if (!cb.disabled) {
              cb.checked = checked;
            }
          });
        }
      });

      // 监听下拉框 change 联动过滤
      document.addEventListener('change', (e) => {
        if (e.target.matches('[data-filter-education], [data-filter-age], [data-filter-experience], [data-filter-sort], [data-filter-exclude]')) {
          window.candidatesPageState.applyFilters();
        }
      });

      const hotkeyContainer = document.querySelector('[data-hotkey-container]');
      if (hotkeyContainer) {
        hotkeyContainer.addEventListener('click', (e) => {
          const span = e.target.closest('[data-hotkey]');
          if (!span) return;
          span.classList.toggle('active');
          if (span.classList.contains('active')) {
            span.style.background = 'var(--primary)';
            span.style.color = 'white';
          } else {
            span.style.background = '';
            span.style.color = '';
          }
          window.candidatesPageState.applyFilters();
        });

      document.addEventListener('click', async (e) => {
        const openPresetBtn = e.target.closest('[data-action="open-search-preset-modal"]');
        if (openPresetBtn) {
          e.stopPropagation();
          const modal = document.querySelector('[data-search-preset-modal]');
          if (!modal) return;
          
          const nameInput = modal.querySelector('[data-search-preset-name]');
          if (nameInput) {
            nameInput.value = `搜索方案-${new Date().toLocaleTimeString()}`;
          }
          
          const kw = document.querySelector('[data-field="candidate-keyword"]')?.value?.trim() || "无";
          const city = document.querySelector('[data-field="candidate-city"]')?.value?.trim() || "无";
          
          const edu = document.querySelector('[data-filter-education]')?.value || "不限";
          const age = document.querySelector('[data-filter-age]')?.value || "不限";
          const exp = document.querySelector('[data-filter-experience]')?.value || "不限";
          const sort = document.querySelector('[data-filter-sort]')?.value || "default";
          const exclude = document.querySelector('[data-filter-exclude]')?.value || "不限";
          const activeHotkeys = Array.from(document.querySelectorAll('[data-hotkey].active')).map(el => el.getAttribute('data-hotkey'));
          
          const sortTexts = { "default": "默认", "created_desc": "更新时间降序", "age_asc": "年龄升序" };
          const excludeTexts = { "": "不限", "unlocked": "未锁定", "locked": "已锁定" };
          
          const parts = [
            `关键词：${kw}`,
            `城市：${city}`,
            `学历：${edu}`,
            `年龄：${age}`,
            `经验：${exp}`,
            `排序：${sortTexts[sort] || sort}`,
            `过滤：${excludeTexts[exclude] || exclude}`
          ];
          if (activeHotkeys.length > 0) {
            parts.push(`热词：${activeHotkeys.join('、')}`);
          }
          
          const summaryNode = modal.querySelector('[data-search-preset-summary]');
          if (summaryNode) {
            summaryNode.textContent = parts.join(' · ');
          }
          
          modal.style.display = 'block';
          return;
        }

        const confirmPresetBtn = e.target.closest('[data-action="confirm-search-preset-upload"]');
        if (confirmPresetBtn) {
          e.stopPropagation();
          const nameInput = document.querySelector('[data-search-preset-name]');
          const presetName = nameInput?.value?.trim() || `快捷搜索-${Date.now().toString(36)}`;
          
          const keyword = document.querySelector('[data-field="candidate-keyword"]')?.value?.trim() || "";
          const city = document.querySelector('[data-field="candidate-city"]')?.value?.trim() || "";
          
          const education = document.querySelector('[data-filter-education]')?.value || "";
          const age = document.querySelector('[data-filter-age]')?.value || "";
          const experience = document.querySelector('[data-filter-experience]')?.value || "";
          const sort = document.querySelector('[data-filter-sort]')?.value || "default";
          const exclude = document.querySelector('[data-filter-exclude]')?.value || "";
          const activeHotkeys = Array.from(document.querySelectorAll('[data-hotkey].active')).map(el => el.getAttribute('data-hotkey'));
          
          const jsonKw = JSON.stringify({
            keyword,
            education,
            age,
            experience,
            sort,
            exclude,
            activeHotkeys
          });
          
          try {
            const preset = await window.hrApi.createSearchPreset({
              name: presetName,
              keyword: jsonKw,
              city,
              status: "",
              created_by: "admin"
            });
            
            const modal = document.querySelector('[data-search-preset-modal]');
            if (modal) modal.style.display = 'none';
            showToast(`成功保存方案：${preset.name}`);
            window.location.reload();
          } catch(err) {
            alert('保存失败: ' + err.message);
          }
          return;
        }

        const prevBtn = e.target.closest('[data-action="prev-page"]');
        if (prevBtn) {
          if (window.candidatesPageState.currentPage > 1) {
            window.candidatesPageState.currentPage--;
            window.candidatesPageState.renderOnly();
          }
          return;
        }
        const nextBtn = e.target.closest('[data-action="next-page"]');
        if (nextBtn) {
          const totalPages = Math.ceil(window.candidatesPageState.list.length / window.candidatesPageState.pageSize);
          if (window.candidatesPageState.currentPage < totalPages) {
            window.candidatesPageState.currentPage++;
            window.candidatesPageState.renderOnly();
          }
          return;
        }
      });

      window.updateCandidatePanels = async (candidateId) => {
        if (!candidateId) return;
        try {
          const tracking = await window.hrApi.candidateTrackingEvents({ candidate_id: candidateId });
          const trackingBox = document.querySelector('[data-tracking-events]');
          if (trackingBox) {
            trackingBox.innerHTML = tracking.slice(0, 3).map(e => `
              <div class="list-item">
                <div class="item-top">
                  <div>
                    <div class="item-title">${e.event_type}</div>
                    <div class="item-meta">${e.summary}</div>
                  </div>
                  <span class="chip primary">${e.status || '事件'}</span>
                </div>
              </div>
            `).join('') || '<div class="list-item"><div class="item-meta">暂无跟踪事件记录</div></div>';
          }
        } catch (err) { console.warn(err); }
        try {
          const exports = await window.hrApi.exportRecords({ candidate_id: candidateId });
          const history = document.querySelector('[data-export-history]');
          if (history) {
            history.innerHTML = exports.map(r => `
              <div class="list-item">
                <div class="item-top">
                  <div>
                    <div class="item-title">${r.file_name}</div>
                    <div class="item-meta">${r.company_name} · ${r.project_name} · ${r.position_name}</div>

                  </div>
                  <span class="chip ${r.watermarked ? 'success' : 'neutral'}">${r.watermarked ? '带水印' : '无水印'}</span>
                </div>
              </div>
            `).join('') || '<div class="list-item"><div class="item-meta">暂无导出历史</div></div>';
          }
        } catch (err) { console.warn(err); }
        try {
          const interview = await window.hrApi.interviewRecords({ candidate_id: candidateId });
          const salary = await window.hrApi.salaryRecords({ candidate_id: candidateId });
          const employment = await window.hrApi.employmentRecords({ candidate_id: candidateId });
          const followUps = await window.hrApi.candidateFollowUpRecords({ candidate_id: candidateId });
          const lifecycle = document.querySelector('[data-lifecycle-events]');
          if (lifecycle) {
            const items = [];
            if (interview[0]) items.push(`<div class="list-item"><div class="item-top"><div><div class="item-title">${interview[0].round_name}</div><div class="item-meta">${interview[0].result} · ${interview[0].interviewer}</div></div><span class="chip success">面试</span></div></div>`);
            if (salary[0]) items.push(`<div class="list-item"><div class="item-top"><div><div class="item-title">薪资</div><div class="item-meta">${salary[0].expected_salary} / ${salary[0].offered_salary}</div></div><span class="chip warning">${salary[0].service_status}</span></div></div>`);
            if (employment[0]) items.push(`<div class="list-item"><div class="item-top"><div><div class="item-title">${employment[0].company_name}</div><div class="item-meta">${employment[0].position_name} · ${employment[0].status}</div></div><span class="chip neutral">入职</span></div></div>`);
            if (followUps[0]) items.push(`<div class="list-item"><div class="item-top"><div><div class="item-title">随访</div><div class="item-meta">${followUps[0].follow_up_time || followUps[0].created_at} · ${followUps[0].content}</div></div><span class="chip primary">已录用</span></div></div>`);
            lifecycle.innerHTML = items.join('') || '<div class="list-item"><div class="item-meta">暂无面试、入职等记录</div></div>';
          }
          const followupBlock = document.querySelector('[data-followup-block]');
          if (followupBlock) {
            followupBlock.innerHTML = followUps.map(item => `
              <div class="list-item">
                <div class="item-top">
                  <div>
                    <div class="item-title">${item.follow_up_time || item.created_at}</div>
                    <div class="item-meta">${item.content}</div>
                  </div>
                  <span class="chip primary">${item.status}</span>
                </div>
              </div>
            `).join('') || '<div class="list-item"><div class="item-meta">暂无随访记录</div></div>';
          }
        } catch (err) { console.warn(err); }
      };

      try {
        const rawId = document.body.dataset.candidateId || '';
        const candidateId = rawId ? (isNaN(Number(rawId)) ? rawId : Number(rawId)) : (window.candidatesPageState.list[0]?.id || 0);
        await window.updateCandidatePanels(candidateId);
      } catch (err) { console.warn(err); }

      try {
        const presets = await window.hrApi.searchPresets();
        const list = document.querySelector('[data-search-presets]');
        if (list) {
          list.innerHTML = presets.slice(0, 5).map(p => {
            let displayKw = p.keyword;
            try {
              const parsed = JSON.parse(p.keyword);
              displayKw = parsed.keyword || "全部关键词";
            } catch(e) {}
            return `
              <div class="list-item" data-preset-id="${p.id}" style="cursor:pointer;">
                <div class="item-top">
                  <div>
                    <div class="item-title">${p.name}</div>
                    <div class="item-meta">${displayKw} · ${p.city || '全部城市'} · ${p.status || '全部状态'}</div>
                  </div>
                  <span class="chip primary">${p.created_by}</span>
                </div>
              </div>
            `;
          }).join('') || '<div class="list-item"><div class="item-meta">暂无快捷搜索记录</div></div>';
          
          list.addEventListener('click', (e) => {
            const item = e.target.closest('[data-preset-id]');
            if (!item) return;
            const presetId = Number(item.getAttribute('data-preset-id'));
            const p = presets.find(x => x.id === presetId);
            if (!p) return;
            
            try {
              const config = JSON.parse(p.keyword);
              document.querySelector('[data-field="candidate-keyword"]').value = config.keyword || "";
              document.querySelector('[data-filter-education]').value = config.education || "";
              document.querySelector('[data-filter-age]').value = config.age || "";
              document.querySelector('[data-filter-experience]').value = config.experience || "";
              document.querySelector('[data-filter-sort]').value = config.sort || "default";
              document.querySelector('[data-filter-exclude]').value = config.exclude || "";
              
              document.querySelectorAll('[data-hotkey]').forEach(span => {
                const hk = span.getAttribute('data-hotkey');
                if (config.activeHotkeys && config.activeHotkeys.includes(hk)) {
                  span.classList.add('active');
                  span.style.background = 'var(--primary)';
                  span.style.color = 'white';
                } else {
                  span.classList.remove('active');
                  span.style.background = '';
                  span.style.color = '';
                }
              });
            } catch(err) {
              document.querySelector('[data-field="candidate-keyword"]').value = p.keyword || "";
              document.querySelector('[data-filter-education]').value = "";
              document.querySelector('[data-filter-age]').value = "";
              document.querySelector('[data-filter-experience]').value = "";
              document.querySelector('[data-filter-sort]').value = "default";
              document.querySelector('[data-filter-exclude]').value = "";
              document.querySelectorAll('[data-hotkey]').forEach(span => {
                span.classList.remove('active');
                span.style.background = '';
                span.style.color = '';
              });
            }
            
            document.querySelector('[data-field="candidate-city"]').value = p.city || "";
            
            showToast(`已加载搜索方案：${p.name}`);
            window.candidatesPageState.applyFilters();
          });
        }
      } catch (err) { console.warn(err); }
    });
  </script>
</body>
</html>
