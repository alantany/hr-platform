                <div class="list-item"><div class="item-top"><div><div class="item-title">状态</div><div class="item-meta">已入职 / 未入职</div></div></div><select class="input" data-candidate-employment-status><option value="已入职">已入职</option><option value="未入职">未入职</option></select></div>
                <div class="list-item"><div class="item-top"><div><div class="item-title">公司名称</div><div class="item-meta">已入职时填写</div></div></div><input class="input" data-candidate-employment-company /></div>
                <div class="list-item"><div class="item-top"><div><div class="item-title">岗位名称</div><div class="item-meta">录用岗位</div></div></div><input class="input" data-candidate-employment-position /></div>
                <div class="list-item"><div class="item-top"><div><div class="item-title">入职日期</div><div class="item-meta">日期时间</div></div></div><input class="input" type="datetime-local" data-candidate-employment-onboard /></div>
                <div class="list-item"><div class="item-top"><div><div class="item-title">备注</div><div class="item-meta">未入职原因或证明文件说明</div></div></div><textarea class="input" rows="5" data-candidate-employment-note></textarea></div>
              </div>
            </div>
            <div class="panel" style="box-shadow:none; border:1px solid rgba(15,23,42,.08);">
              <h3>保存后</h3>
              <div class="list"><div class="list-item"><div class="item-meta">会写入入职状态记录，并刷新候选人生命周期区块。</div></div></div>
            </div>
          </div>
        </div>
      </div>

      <div class="modal" data-candidate-followup-modal style="display:none; position:fixed; inset:0; background:rgba(14,22,34,.45); z-index:2000; padding:24px;">
        <div class="panel" style="max-width:760px; margin:10vh auto 0; background:#fff;">
          <div class="section-head">
            <div>
              <h3>随访记录</h3>
              <div class="section-sub">仅已录用候选人可以添加随访记录。</div>
            </div>
            <div class="hero-actions" style="margin-top:0">
              <button class="btn" data-action="close-candidate-followup-modal">取消</button>
              <button class="btn primary" data-action="confirm-candidate-followup">确认保存</button>
            </div>
          </div>
          <div class="grid-2">
            <div class="panel" style="box-shadow:none; border:1px solid rgba(15,23,42,.08);">
              <div class="list">
                <div class="list-item"><div class="item-top"><div><div class="item-title">随访时间</div><div class="item-meta">系统记录时间</div></div></div><input class="input" type="datetime-local" data-candidate-followup-time /></div>
                <div class="list-item"><div class="item-top"><div><div class="item-title">随访内容</div><div class="item-meta">记录跟进细节</div></div></div><textarea class="input" rows="7" data-candidate-followup-content></textarea></div>
              </div>
            </div>
            <div class="panel" style="box-shadow:none; border:1px solid rgba(15,23,42,.08);">
              <h3>随访历史</h3>
              <div class="list" data-followup-block>
                <div class="list-item"><div class="item-meta">保存后会显示真实随访记录。</div></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="modal" data-candidate-mail-modal style="display:none; position:fixed; inset:0; background:rgba(14,22,34,.45); z-index:2000; padding:24px;">
        <div class="panel" style="max-width:840px; margin:8vh auto 0; background:#fff;">
          <div class="section-head">
            <div>
              <h3 data-candidate-mail-title>发送邮件</h3>
              <div class="section-sub">确认邮件地址、主题、正文和附件后发送，系统会写入发送记录。</div>
            </div>
            <div class="hero-actions" style="margin-top:0">
              <button class="btn" data-action="close-candidate-mail-modal">取消</button>
              <button class="btn primary" data-action="confirm-candidate-mail">确认发送</button>
            </div>
          </div>
          <div class="grid-2">
            <div class="panel" style="box-shadow:none; border:1px solid rgba(15,23,42,.08);">
              <div class="list">
                <div class="list-item"><div class="item-top"><div><div class="item-title">收件邮箱</div><div class="item-meta">客户公司的邮箱</div></div></div><input class="input" data-candidate-mail-to /></div>
                <div class="list-item"><div class="item-top"><div><div class="item-title">邮件主题</div><div class="item-meta">求职者姓名-岗位名</div></div></div><input class="input" data-candidate-mail-subject /></div>
                <div class="list-item"><div class="item-top"><div><div class="item-title">附件名</div><div class="item-meta">求职者姓名-岗位名.pdf</div></div></div><input class="input" data-candidate-mail-attachment /></div>
                <div class="list-item"><div class="item-top"><div><div class="item-title">邮件正文</div><div class="item-meta">自动生成候选人信息、轮次、日期等摘要</div></div></div><textarea class="input" rows="7" data-candidate-mail-body></textarea></div>
              </div>
            </div>
            <div class="panel" style="box-shadow:none; border:1px solid rgba(15,23,42,.08);">
              <h3>发送历史</h3>
              <div class="list" data-mail-history>
                <div class="list-item"><div class="item-meta">发送后会写入邮件发送记录。</div></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="modal" data-candidate-edit-modal style="display:none; position:fixed; inset:0; background:rgba(14,22,34,.45); z-index:2000; padding:24px;">
        <div class="panel" style="max-width:840px; margin:8vh auto 0; background:#fff;">
          <div class="section-head">
            <div>
              <h3>编辑候选人</h3>
              <div class="section-sub">姓名不可修改，保存后会写入候选人表并刷新列表。</div>
            </div>
            <div class="hero-actions" style="margin-top:0">
              <button class="btn" data-action="close-candidate-edit-modal">取消</button>
              <button class="btn primary" data-action="confirm-candidate-edit">确认保存</button>
            </div>
          </div>
          <div class="grid-2">
            <div class="panel" style="box-shadow:none; border:1px solid rgba(15,23,42,.08);">
              <div class="list">
                <div class="list-item"><div class="item-top"><div><div class="item-title">姓名</div><div class="item-meta">不可修改</div></div></div><input class="input" data-candidate-edit-name readonly /></div>
                <div class="list-item"><div class="item-top"><div><div class="item-title">电话</div><div class="item-meta">联系方式</div></div></div><input class="input" data-candidate-edit-phone /></div>
                <div class="list-item"><div class="item-top"><div><div class="item-title">邮箱</div><div class="item-meta">可选</div></div></div><input class="input" data-candidate-edit-email /></div>
                <div class="list-item"><div class="item-top"><div><div class="item-title">当前职位</div><div class="item-meta">现任岗位</div></div></div><input class="input" data-candidate-edit-title /></div>
                <div class="list-item"><div class="item-top"><div><div class="item-title">城市</div><div class="item-meta">期望或所在城市</div></div></div><input class="input" data-candidate-edit-city /></div>
                <div class="list-item"><div class="item-top"><div><div class="item-title">状态</div><div class="item-meta">激活 / 锁定 / 释放</div></div></div><select class="input" data-candidate-edit-status><option value="激活">激活</option><option value="锁定">锁定</option><option value="释放">释放</option></select></div>
                <div class="list-item"><div class="item-top"><div><div class="item-title">来源</div><div class="item-meta">页面创建 / 导入 / 推荐</div></div></div><input class="input" data-candidate-edit-source /></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="modal" data-candidate-create-modal style="display:none; position:fixed; inset:0; background:rgba(14,22,34,.45); z-index:2000; padding:24px;">
        <div class="panel" style="max-width:840px; margin:8vh auto 0; background:#fff;">
          <div class="section-head">
            <div>
              <h3>新建候选人</h3>
              <div class="section-sub">填写基础信息后确认保存，系统会真实写入候选人表。</div>
            </div>
            <div class="hero-actions" style="margin-top:0">
              <button class="btn" data-action="close-candidate-create-modal">取消</button>
              <button class="btn primary" data-action="confirm-candidate-create">确认保存</button>
            </div>
          </div>
          <div class="grid-2">
            <div class="panel" style="box-shadow:none; border:1px solid rgba(15,23,42,.08);">
              <div class="list">
                <div class="list-item"><div class="item-top"><div><div class="item-title">姓名</div><div class="item-meta">候选人真实姓名</div></div></div><input class="input" data-candidate-name /></div>
                <div class="list-item"><div class="item-top"><div><div class="item-title">电话</div><div class="item-meta">用于联系</div></div></div><input class="input" data-candidate-phone /></div>
                <div class="list-item"><div class="item-top"><div><div class="item-title">邮箱</div><div class="item-meta">可选</div></div></div><input class="input" data-candidate-email /></div>
                <div class="list-item"><div class="item-top"><div><div class="item-title">当前职位</div><div class="item-meta">现任岗位</div></div></div><input class="input" data-candidate-title /></div>
                <div class="list-item"><div class="item-top"><div><div class="item-title">城市</div><div class="item-meta">期望或所在城市</div></div></div><input class="input" data-candidate-city-create /></div>
                <div class="list-item"><div class="item-top"><div><div class="item-title">来源</div><div class="item-meta">手动创建 / 导入 / 推荐</div></div></div><input class="input" data-candidate-source value="页面创建" /></div>
              </div>
            </div>
            <div class="panel" style="box-shadow:none; border:1px solid rgba(15,23,42,.08);">
              <h3>保存说明</h3>
              <div class="list"><div class="list-item"><div class="item-meta">确认后会写入候选人表并刷新当前列表与快照。</div></div></div>
            </div>
          </div>
        </div>
      </div>

      <div class="modal" data-candidate-action-modal style="display:none; position:fixed; inset:0; background:rgba(14,22,34,.45); z-index:2000; padding:24px;">
        <div class="panel" style="max-width:620px; margin:12vh auto 0; background:#fff;">
          <div class="section-head">
            <div><h3>候选人状态确认</h3><div class="section-sub">确认后才会执行锁定或释放。</div></div>
            <div class="hero-actions" style="margin-top:0"><button class="btn" data-action="close-candidate-action-modal">取消</button><button class="btn primary" data-action="confirm-candidate-action">确认执行</button></div>
          </div>
          <div class="list">
            <div class="list-item"><div class="item-top"><div><div class="item-title" data-candidate-action-title>等待操作</div><div class="item-meta" data-candidate-action-desc>点击列表或详情按钮后会在这里确认。</div></div><span class="chip warning">确认</span></div></div>
          </div>
        </div>
      </div>
    `;
    window.addEventListener('DOMContentLoaded', async () => {
      await renderApp();
      window.candidatesPageState = {
        list: [],
        currentPage: 1,
        pageSize: 10,
        render() {
          const total = this.list.length;
          const totalPages = Math.max(1, Math.ceil(total / this.pageSize));
          if (this.currentPage > totalPages) this.currentPage = totalPages;
          if (this.currentPage < 1) this.currentPage = 1;

          const start = (this.currentPage - 1) * this.pageSize;
          const end = start + this.pageSize;
          const pageItems = this.list.slice(start, end);

          const totalNode = document.querySelector('[data-candidate-total]');
          const newNode = document.querySelector('[data-candidate-new]');
          const searchNode = document.querySelector('[data-candidate-search]');
          const lockedNode = document.querySelector('[data-candidate-locked]');
          if (totalNode) totalNode.textContent = String(total);
          if (newNode) newNode.textContent = String(this.list.filter(i => String(i.status).includes('新') || String(i.status).includes('激活')).length);
          if (lockedNode) lockedNode.textContent = String(this.list.filter(i => i.locked).length);

          const footNode = document.querySelector('[data-candidate-foot]');
          const pageIndicator = document.querySelector('[data-page-indicator]');
          if (footNode) footNode.textContent = `共 ${total} 条记录`;
          if (pageIndicator) pageIndicator.textContent = `${this.currentPage} / ${totalPages}`;

          const table = document.querySelector('.table-card');
          if (table) {
            table.querySelectorAll('.table-row').forEach(row => row.remove());
            
            const rows = pageItems.map(i => {
              const basicInfo = [
                i.gender,
                i.age ? i.age + '岁' : '',
                i.education,
                i.experience_years ? i.experience_years + '年' : ''
              ].filter(Boolean).join(' / ') || '--';

              return `
                <div class="table-row">
                  <div><input type="checkbox" aria-label="选择${i.name}" /></div>
                  <div>
                    <div class="row-title">
                      <div class="avatar-sm"></div>
                      <div>
                        <strong>${i.name || ''}</strong>
                        <div class="row-sub">${i.city || ''} · ${i.current_title || ''}</div>
                      </div>
                    </div>
                    <div class="skills">
                      <span class="skill-tag">${i.source || '来源'}</span>
                      <span class="skill-tag">${i.locked ? '已锁定' : '未锁定'}</span>
                    </div>
                  </div>
                  <div>${basicInfo}</div>
                  <div>${i.current_title || '--'}</div>
                  <div>${i.city || '--'}</div>
                  <div class="mono">${i.expected_salary || '--'}</div>
                  <div>${i.source || '--'}</div>
                  <div><span class="state ${i.locked ? 'locked' : 'active'}">${i.status || '未知'}</span></div>
                  <div>
                    <div class="row-sub">${i.created_at || ''}</div>
                    <div class="table-actions" style="margin-top:8px;">
                      <button class="btn-sm primary" data-action="view-detail" data-id="${i.id}" data-title="${i.name}">详情</button>
                      <button class="btn-sm" data-action="edit-candidate" data-id="${i.id}">编辑</button>
                    </div>
                  </div>
                </div>
              `;
            }).join('') || `<div class="table-row"><div><input type="checkbox" aria-label="候选人空状态" disabled /></div><div><div class="row-title"><div class="avatar-sm"></div><div><strong>暂无候选人数据</strong><div class="row-sub">没有符合条件的候选人数据。</div></div></div></div><div>--</div><div>--</div><div>--</div><div class="mono">--</div><div>--</div><div><span class="state active">无数据</span></div><div><div class="row-sub">--</div></div></div>`;
            
            const head = table.querySelector('.table-head');
            if (head) {
              head.insertAdjacentHTML('afterend', rows);
            }
          }
        }
      };

      try {
        window.candidatesPageState.list = await window.hrApi.candidates();
        const searchNode = document.querySelector('[data-candidate-search]');
        if (searchNode) searchNode.textContent = String((await window.hrApi.searchPresets()).length);
        
        window.candidatesPageState.render();
      } catch (err) { console.warn(err); }

      document.addEventListener('click', (e) => {
        const prevBtn = e.target.closest('[data-action="prev-page"]');
        if (prevBtn) {
          if (window.candidatesPageState.currentPage > 1) {
            window.candidatesPageState.currentPage--;
            window.candidatesPageState.render();
          }
          return;
        }
        const nextBtn = e.target.closest('[data-action="next-page"]');
        if (nextBtn) {
          const totalPages = Math.ceil(window.candidatesPageState.list.length / window.candidatesPageState.pageSize);
          if (window.candidatesPageState.currentPage < totalPages) {
            window.candidatesPageState.currentPage++;
            window.candidatesPageState.render();
          }
          return;
        }
      });

      window.updateCandidatePanels = async (candidateId) => {
        if (!candidateId) return;
        try {
          const tracking = await window.hrApi.candidateTrackingEvents({ candidate_id: candidateId });
          const trackingBox = document.querySelector('[data-tracking-events]');
          if (trackingBox) {
            trackingBox.innerHTML = tracking.slice(0, 3).map(e => `
              <div class="list-item">
                <div class="item-top">
                  <div>
                    <div class="item-title">${e.event_type}</div>
                    <div class="item-meta">${e.summary}</div>
                  </div>
                  <span class="chip primary">${e.status || '事件'}</span>
                </div>
              </div>
            `).join('') || '<div class="list-item"><div class="item-meta">暂无跟踪事件记录</div></div>';
          }
        } catch (err) { console.warn(err); }
        try {
          const exports = await window.hrApi.exportRecords({ candidate_id: candidateId });
          const history = document.querySelector('[data-export-history]');
          if (history) {
            history.innerHTML = exports.map(r => `
              <div class="list-item">
                <div class="item-top">
                  <div>
                    <div class="item-title">${r.file_name}</div>
                    <div class="item-meta">${r.company_name} · ${r.project_name} · ${r.position_name}</div>
                    <div class="item-meta mono">${r.format} · ${r.created_at}</div>
                  </div>
                  <span class="chip ${r.watermarked ? 'success' : 'neutral'}">${r.watermarked ? '带水印' : '无水印'}</span>
                </div>
              </div>
            `).join('') || '<div class="list-item"><div class="item-meta">暂无导出历史</div></div>';
          }
        } catch (err) { console.warn(err); }
        try {
          const interview = await window.hrApi.interviewRecords({ candidate_id: candidateId });
          const salary = await window.hrApi.salaryRecords({ candidate_id: candidateId });
          const employment = await window.hrApi.employmentRecords({ candidate_id: candidateId });
          const followUps = await window.hrApi.candidateFollowUpRecords({ candidate_id: candidateId });
          const lifecycle = document.querySelector('[data-lifecycle-events]');
          if (lifecycle) {
            const items = [];
            if (interview[0]) items.push(`<div class="list-item"><div class="item-top"><div><div class="item-title">${interview[0].round_name}</div><div class="item-meta">${interview[0].result} · ${interview[0].interviewer}</div></div><span class="chip success">面试</span></div></div>`);
            if (salary[0]) items.push(`<div class="list-item"><div class="item-top"><div><div class="item-title">薪资</div><div class="item-meta">${salary[0].expected_salary} / ${salary[0].offered_salary}</div></div><span class="chip warning">${salary[0].service_status}</span></div></div>`);
            if (employment[0]) items.push(`<div class="list-item"><div class="item-top"><div><div class="item-title">${employment[0].company_name}</div><div class="item-meta">${employment[0].position_name} · ${employment[0].status}</div></div><span class="chip neutral">入职</span></div></div>`);
            if (followUps[0]) items.push(`<div class="list-item"><div class="item-top"><div><div class="item-title">随访</div><div class="item-meta">${followUps[0].follow_up_time || followUps[0].created_at} · ${followUps[0].content}</div></div><span class="chip primary">已录用</span></div></div>`);
            lifecycle.innerHTML = items.join('') || '<div class="list-item"><div class="item-meta">暂无面试、入职等记录</div></div>';
          }
          const followupBlock = document.querySelector('[data-followup-block]');
          if (followupBlock) {
            followupBlock.innerHTML = followUps.map(item => `
              <div class="list-item">
                <div class="item-top">
                  <div>
                    <div class="item-title">${item.follow_up_time || item.created_at}</div>
                    <div class="item-meta">${item.content}</div>
                  </div>
                  <span class="chip primary">${item.status}</span>
                </div>
              </div>
            `).join('') || '<div class="list-item"><div class="item-meta">暂无随访记录</div></div>';
          }
        } catch (err) { console.warn(err); }
      };

      try {
        const rawId = document.body.dataset.candidateId || '';
        const candidateId = rawId ? (isNaN(Number(rawId)) ? rawId : Number(rawId)) : (window.candidatesPageState.list[0]?.id || 0);
        await window.updateCandidatePanels(candidateId);
      } catch (err) { console.warn(err); }

      try {
        const presets = await window.hrApi.searchPresets();
        const list = document.querySelector('[data-search-presets]');
        if (list) {
          list.innerHTML = presets.slice(0, 5).map(p => `<div class="list-item"><div class="item-top"><div><div class="item-title">${p.name}</div><div class="item-meta">${p.keyword || '全部关键词'} · ${p.city || '全部城市'} · ${p.status || '全部状态'}</div></div><span class="chip primary">${p.created_by}</span></div></div>`).join('');
        }
      } catch (err) { console.warn(err); }
    });
  </script>
</body>
</html>
