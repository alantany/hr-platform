<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>角色管理</title>
  <link rel="stylesheet" href="../../styles.css" />
  <script defer src="../../frontend-api.js"></script>
  <script defer src="../../app.js"></script>
</head>
<body>
  <div id="app"></div>
  <script>
    window.__PAGE_BODY__ = `
      <section class="admin-manage-page">
        <div class="admin-page-toolbar">
          <div></div>
          <button class="admin-primary-btn" type="button" data-role-page-open-create>+ 创建角色</button>
        </div>

        <section class="admin-table-panel panel">
          <div class="admin-panel-head">
            <h3>角色列表</h3>
          </div>

          <div class="admin-table-shell">
            <div class="admin-table-head admin-role-grid">
              <div>角色名称</div>
              <div>标识</div>
              <div>用户数</div>
              <div>功能权限</div>
              <div>创建时间</div>
              <div>操作</div>
            </div>
            <div data-role-table-body></div>
          </div>
        </section>
      </section>

      <div class="modal" data-role-page-modal style="display:none; position:fixed; inset:0; background:rgba(14,22,34,.45); z-index:2000; padding:24px;">
        <div class="panel admin-edit-modal">
          <div class="section-head">
            <div><h3 data-role-page-modal-title>创建角色</h3><div class="section-sub">管理系统角色以及其功能权限模板。</div></div>
            <div class="hero-actions" style="margin-top:0">
              <button class="btn" type="button" data-role-page-close-modal>取消</button>
              <button class="btn primary" type="button" data-role-page-save-modal>确认保存</button>
            </div>
          </div>
          <div class="grid-2">
            <div class="panel admin-edit-card">
              <div class="list">
                <div class="list-item"><div class="item-top"><div><div class="item-title">角色编码</div><div class="item-meta">例如 ADMIN / TEAM_LEADER</div></div></div><input class="input" data-role-form-code /></div>
                <div class="list-item"><div class="item-top"><div><div class="item-title">角色名称</div><div class="item-meta">例如 超级管理员 / 组长</div></div></div><input class="input" data-role-form-name /></div>
                <div class="list-item"><div class="item-top"><div><div class="item-title">说明</div><div class="item-meta">用于角色职责展示</div></div></div><textarea class="input" rows="4" style="height:auto; padding:12px;" data-role-form-desc></textarea></div>
              </div>
            </div>
            <div class="panel admin-edit-card" style="max-height:480px; overflow-y:auto;">
              <h3>功能权限分配</h3>
              <div class="list" data-role-permissions-container style="display:flex; flex-direction:column; gap:16px; margin-top:12px;">
              </div>
            </div>
          </div>
        </div>
      </div>
    `;

    const ALL_PRESET_PERMISSIONS = [
      { key: 'page:dashboard', name: '首页', module: '主要功能' },
      { key: 'page:candidates', name: '求职者数据池', module: '主要功能' },
      { key: 'page:import', name: '简历导入', module: '主要功能' },
      { key: 'page:customers', name: '客户管理', module: '主要功能' },
      { key: 'page:projects', name: '项目管理', module: '主要功能' },
      { key: 'page:positions', name: '岗位管理', module: '主要功能' },
      { key: 'page:recruit-job-publish', name: '岗位发布', module: '岗位管理' },
      { key: 'page:recruit-job-list', name: '岗位列表', module: '岗位管理' },
      { key: 'page:recruit-daily-tasks', name: '每日任务', module: '岗位管理' },
      { key: 'page:evaluations', name: '评价体系', module: '主要功能' },
      { key: 'page:statistics', name: '统计管理', module: '主要功能' },
      { key: 'page:notifications', name: '通知提醒', module: '主要功能' },
      { key: 'page:dictionary', name: '标签字典', module: '系统设置' },
      { key: 'page:users', name: '用户管理', module: '系统设置' },
      { key: 'page:roles', name: '角色管理', module: '系统设置' },
      { key: 'page:permissions', name: '权限管理', module: '系统设置' },
      { key: 'page:data-permissions', name: '数据权限', module: '系统设置' },
      { key: 'page:warranty', name: '质保期管理', module: '系统设置' },
      { key: 'page:logs', name: '操作日志', module: '系统设置' },
      { key: 'page:ui-kit', name: 'UI 样板', module: '开发工具' },
      { key: 'all', name: '全部功能', module: '系统' },
      { key: 'action:create-company', name: '创建客户公司', module: '客户管理' },
      { key: 'action:assign-operator', name: '分配操作员权限', module: '系统设置' }
    ];

    function renderPermissionsSelection(activePermissionKeys = []) {
      const container = document.querySelector('[data-role-permissions-container]');
      if (!container) return;
      
      const groups = {};
      ALL_PRESET_PERMISSIONS.forEach((item) => {
        if (!groups[item.module]) groups[item.module] = [];
        groups[item.module].push(item);
      });

      container.innerHTML = Object.keys(groups).map((module) => {
        const inputsHtml = groups[module].map((item) => {
          const isChecked = activePermissionKeys.includes(item.key) ? 'checked' : '';
          return `
            <label style="display:flex; align-items:center; gap:8px; cursor:pointer; font-size:13px; margin-bottom:4px;">
              <input type="checkbox" name="role_permission_keys" value="${escapeHtml(item.key)}" data-module="${escapeHtml(item.module)}" ${isChecked} style="width:15px; height:15px; margin:0;" />
              <span>${escapeHtml(item.name)}</span>
            </label>
          `;
        }).join('');

        return `
          <div style="border-bottom:1px solid rgba(0,0,0,0.06); padding-bottom:8px; margin-bottom:8px;">
            <strong style="font-size:13px; color:#2563eb; display:block; margin-bottom:8px;">${escapeHtml(module)}</strong>
            <div style="display:grid; grid-template-columns:repeat(2, 1fr); gap:6px 12px;">
              ${inputsHtml}
            </div>
          </div>
        `;
      }).join('');
    }

    const rolePageState = {
      roles: [],
      users: [],
      permissions: [],
      logs: [],
      editingId: null,
    };

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (char) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[char]));
    }

    function formatDateTime(value) {
      if (!value) return '—';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return '—';
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
    }

    function getRoleTone(code, name) {
      const text = `${code || ''} ${name || ''}`;
      if (text.includes('ADMIN') || text.includes('超级')) return 'tone-pink';
      if (text.includes('LEADER') || text.includes('组长')) return 'tone-orange';
      return 'tone-violet';
    }

    function getUserCount(role) {
      return rolePageState.users.filter((user) => user.role === role.name).length;
    }

    function getPermissionSummary(role) {
      const modules = rolePageState.permissions
        .filter((item) => item.role_code === role.code && item.enabled)
        .map((item) => item.module || item.permission_key)
        .filter(Boolean);
      if (!modules.length) return '暂无功能权限';
      const unique = Array.from(new Set(modules));
      return unique.slice(0, 3).join('、') + (unique.length > 3 ? ` 等 ${unique.length} 项` : '');
    }

    function getRoleCreatedAt(role) {
      const match = rolePageState.logs.find((item) => item.module === '角色管理' && item.action === '新增角色' && String(item.entity_id) === String(role.id));
      return match?.created_at || null;
    }

    function openModal(isEdit, role = null) {
      rolePageState.editingId = role?.id || null;
      document.querySelector('[data-role-page-modal-title]').textContent = isEdit ? '编辑角色' : '创建角色';
      document.querySelector('[data-role-form-code]').value = role?.code || '';
      document.querySelector('[data-role-form-name]').value = role?.name || '';
      document.querySelector('[data-role-form-desc]').value = role?.description || '';
      document.querySelector('[data-role-form-code]').readOnly = Boolean(isEdit);
      
      let activeKeys = [];
      if (role) {
        activeKeys = rolePageState.permissions
          .filter((item) => item.role_code === role.code && item.enabled)
          .map((item) => item.permission_key);
      }
      renderPermissionsSelection(activeKeys);

      const modal = document.querySelector('[data-role-page-modal]');
      if (modal) modal.style.display = 'block';
    }

    function closeModal() {
      const modal = document.querySelector('[data-role-page-modal]');
      if (modal) modal.style.display = 'none';
    }

    function renderRolesTable() {
      const body = document.querySelector('[data-role-table-body]');
      if (!body) return;
      body.innerHTML = rolePageState.roles.map((role) => `
        <div class="admin-table-row admin-role-grid">
          <div class="admin-row-strong">${escapeHtml(role.name)}</div>
          <div><span class="admin-pill ${getRoleTone(role.code, role.name)}">${escapeHtml(role.code)}</span></div>
          <div>${getUserCount(role)}</div>
          <div>${escapeHtml(getPermissionSummary(role))}</div>
          <div>${escapeHtml(formatDateTime(getRoleCreatedAt(role)))}</div>
          <div class="admin-inline-actions">
            <button type="button" class="admin-text-link" data-role-page-edit="${role.id}">编辑与授权</button>
          </div>
        </div>
      `).join('') || '<div class="admin-empty-state">暂无角色记录。</div>';
    }

    async function loadRolePageData() {
      const [roles, users, permissions, logs] = await Promise.all([
        window.hrApi.roles(),
        window.hrApi.users(),
        window.hrApi.rolePermissions(),
        window.hrApi.auditLogs({ module: '角色管理' }).catch(() => []),
      ]);
      rolePageState.roles = roles;
      rolePageState.users = users;
      rolePageState.permissions = permissions;
      rolePageState.logs = Array.isArray(logs) ? logs : [];
      renderRolesTable();
    }

    async function saveRole() {
      const code = document.querySelector('[data-role-form-code]').value.trim().toLowerCase();
      const name = document.querySelector('[data-role-form-name]').value.trim();
      const description = document.querySelector('[data-role-form-desc]').value.trim();
      if (!code || !name) throw new Error('请先填写角色编码和角色名称');
      
      if (rolePageState.editingId) {
        await window.hrApi.updateRole(rolePageState.editingId, { name, description });
      } else {
        await window.hrApi.createRole({ code, name, description });
      }

      const selectedKeys = Array.from(document.querySelectorAll('input[name="role_permission_keys"]:checked')).map((input) => input.value);
      
      let originalKeys = [];
      if (rolePageState.editingId) {
        originalKeys = rolePageState.permissions
          .filter((item) => item.role_code === code && item.enabled)
          .map((item) => item.permission_key);
      }

      const toAdd = selectedKeys.filter((k) => !originalKeys.includes(k));
      const toDelete = originalKeys.filter((k) => !selectedKeys.includes(k));

      const promises = [];
      toAdd.forEach((permission_key) => {
        const preset = ALL_PRESET_PERMISSIONS.find((p) => p.key === permission_key);
        const module = preset ? preset.module : '主要功能';
        const type = permission_key.startsWith('action:') ? 'action' : 'menu';
        
        promises.push(
          window.hrApi.saveRolePermission({
            role_code: code,
            permission_key,
            permission_type: type,
            module,
            enabled: true,
          })
        );
      });

      toDelete.forEach((permission_key) => {
        const preset = ALL_PRESET_PERMISSIONS.find((p) => p.key === permission_key);
        const module = preset ? preset.module : '主要功能';
        const type = permission_key.startsWith('action:') ? 'action' : 'menu';
        
        promises.push(
          window.hrApi.deleteRolePermission(code, permission_key, type, module)
        );
      });

      await Promise.all(promises);

      showToast(rolePageState.editingId ? '角色已更新' : '角色已创建');
      closeModal();
      await loadRolePageData();
    }

    function bindRolePageEvents() {
      document.addEventListener('click', async (event) => {
        if (event.target.closest('[data-role-page-open-create]')) {
          openModal(false);
          return;
        }
        if (event.target.closest('[data-role-page-close-modal]')) {
          closeModal();
          return;
        }
        if (event.target.closest('[data-role-page-save-modal]')) {
          try { await saveRole(); } catch (error) { showToast(error.message || '保存失败'); }
          return;
        }
        const editButton = event.target.closest('[data-role-page-edit]');
        if (editButton) {
          const role = rolePageState.roles.find((item) => item.id === Number(editButton.dataset.rolePageEdit));
          openModal(true, role);
        }
      });
    }

    window.addEventListener('DOMContentLoaded', async () => {
      await renderApp();
      bindRolePageEvents();
      try {
        await loadRolePageData();
      } catch (error) {
        console.warn(error);
        showToast('角色列表加载失败');
      }
    });
  </script>
</body>
</html>
