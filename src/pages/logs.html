<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>操作日志</title>
  <link rel="stylesheet" href="../../styles.css" />
  <script defer src="../../frontend-api.js"></script>
  <script defer src="../../app.js"></script>
</head>
<body>
  <div id="app"></div>
  <script>
    window.__PAGE_BODY__ = `
      <section class="metrics">
        <div class="metric-card" onclick="filterLogsByModule(null)" style="cursor: pointer;"><div class="metric-top"><div><div class="section-sub">操作总数</div></div><div class="metric-icon">○</div></div><div class="metric-value" data-audit-total>0</div><div class="metric-label">当前筛选结果</div></div>
        <div class="metric-card" onclick="filterLogsByModule('导入')" style="cursor: pointer;"><div class="metric-top"><div><div class="section-sub">导入日志</div></div><div class="metric-icon">△</div></div><div class="metric-value" data-audit-import>0</div><div class="metric-label">简历导入相关</div></div>
        <div class="metric-card" onclick="filterLogsByModule('推荐')" style="cursor: pointer;"><div class="metric-top"><div><div class="section-sub">推荐日志</div></div><div class="metric-icon">▣</div></div><div class="metric-value" data-audit-recommend>0</div><div class="metric-label">推荐与面试流转</div></div>
        <div class="metric-card" onclick="filterLogsByModule('权限')" style="cursor: pointer;"><div class="metric-top"><div><div class="section-sub">权限变更</div></div><div class="metric-icon">◌</div></div><div class="metric-value" data-audit-permission>0</div><div class="metric-label">组织管理操作</div></div>
      </section>
      <section class="panel">
        <div class="section-head">
          <div><h3>操作日志管理</h3><p class="panel-sub">支持按时间、用户、模块、动作和对象检索，并导出当前结果。</p></div>
          <div class="hero-actions" style="margin-top:0">
            <button class="btn" data-action="refresh-audit-logs">刷新</button>
            <button class="btn primary" data-action="export-audit-logs">导出当前结果</button>
          </div>
        </div>
        <!-- 单行水平紧凑筛选器 -->
        <div class="audit-filters-bar" style="display: flex; flex-wrap: nowrap; gap: 12px; align-items: center; padding: 12px 16px; background: rgba(15,23,42,.02); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 16px; overflow-x: auto;">
          <div class="filter-item" style="display: flex; align-items: center; gap: 6px;">
            <span class="filter-label" style="font-size: 13px; color: var(--muted-foreground); white-space: nowrap;">操作人:</span>
            <input class="input" data-audit-filter-actor placeholder="例如 admin" style="width: 80px; height: 32px; padding: 0 8px; font-size: 13px;" />
          </div>
          <div class="filter-item" style="display: flex; align-items: center; gap: 6px;">
            <span class="filter-label" style="font-size: 13px; color: var(--muted-foreground); white-space: nowrap;">模块:</span>
            <input class="input" data-audit-filter-module placeholder="例如 权限" style="width: 80px; height: 32px; padding: 0 8px; font-size: 13px;" />
          </div>
          <div class="filter-item" style="display: flex; align-items: center; gap: 6px;">
            <span class="filter-label" style="font-size: 13px; color: var(--muted-foreground); white-space: nowrap;">动作:</span>
            <input class="input" data-audit-filter-action placeholder="例如 导出" style="width: 80px; height: 32px; padding: 0 8px; font-size: 13px;" />
          </div>
          <div class="filter-item" style="display: flex; align-items: center; gap: 6px;">
            <span class="filter-label" style="font-size: 13px; color: var(--muted-foreground); white-space: nowrap;">对象:</span>
            <input class="input" data-audit-filter-target placeholder="例如 candidate" style="width: 90px; height: 32px; padding: 0 8px; font-size: 13px;" />
          </div>
          <div class="filter-item" style="display: flex; align-items: center; gap: 6px;">
            <span class="filter-label" style="font-size: 13px; color: var(--muted-foreground); white-space: nowrap;">结果:</span>
            <select class="input" data-audit-filter-result style="width: 75px; height: 32px; padding: 0 8px; font-size: 13px;">
              <option value="">全部</option>
              <option value="成功">成功</option>
              <option value="失败">失败</option>
            </select>
          </div>
          <div class="filter-item" style="display: flex; align-items: center; gap: 6px;">
            <span class="filter-label" style="font-size: 13px; color: var(--muted-foreground); white-space: nowrap;">关键词:</span>
            <input class="input" data-audit-filter-keyword placeholder="例如 简历" style="width: 80px; height: 32px; padding: 0 8px; font-size: 13px;" />
          </div>
          <div class="filter-item" style="display: flex; align-items: center; gap: 6px; margin-left: auto;">
            <span class="filter-label" style="font-size: 13px; color: var(--muted-foreground); white-space: nowrap;">时间范围:</span>
            <input class="input" type="date" data-audit-filter-from style="width: 120px; height: 32px; padding: 0 8px; font-size: 13px;" />
            <span style="font-size: 13px; color: var(--muted-foreground);">至</span>
            <input class="input" type="date" data-audit-filter-to style="width: 120px; height: 32px; padding: 0 8px; font-size: 13px;" />
          </div>
        </div>

        <!-- 独占宽度的日志列表容器 -->
        <div class="panel" style="box-shadow:none; border:1px solid rgba(15,23,42,.08); padding:16px; margin:0;">
          <div class="list" data-audit-list>
            <div class="list-item"><div class="item-meta">加载中...</div></div>
          </div>
        </div>
      </section>`;

    const auditState = { rows: [] };

    function valueOf(selector) {
      return document.querySelector(selector)?.value?.trim?.() || '';
    }

    function selectedFilters() {
      const params = {};
      const actor = valueOf('[data-audit-filter-actor]');
      const module = valueOf('[data-audit-filter-module]');
      const action = valueOf('[data-audit-filter-action]');
      const target_type = valueOf('[data-audit-filter-target]');
      const result = valueOf('[data-audit-filter-result]');
      const keyword = valueOf('[data-audit-filter-keyword]');
      const date_from = valueOf('[data-audit-filter-from]');
      const date_to = valueOf('[data-audit-filter-to]');
      if (actor) params.actor = actor;
      if (module) params.module = module;
      if (action) params.action = action;
      if (target_type) params.target_type = target_type;
      if (result) params.result = result;
      if (keyword) params.keyword = keyword;
      if (date_from) params.date_from = date_from;
      if (date_to) params.date_to = date_to;
      params.limit = '200';
      return params;
    }

    function renderRows(logs) {
      const list = document.querySelector('[data-audit-list]');
      if (!list) return;
      list.innerHTML = logs.map((log, index) => `
        <div class="list-item" data-log-index="${index}">
          <div class="item-top">
            <div>
              <div class="item-title" style="font-size: 14px; font-weight: 600;">${log.actor}</div>
              <div class="item-meta" style="margin-top: 4px;">${log.module} · ${log.action} · ${log.created_at}</div>
              <div class="item-meta mono" style="margin-top: 2px;">对象：${log.target_type || 'none'} (${log.target_id || 'none'})</div>
              <div class="item-meta" style="margin-top: 6px; color: var(--foreground); font-weight: 500;">详情：${log.detail || '—'}</div>
            </div>
            <div style="display:flex; gap:12px; align-items:center;">
              <button class="btn-sm" data-action="jump-audit-module" data-module="${log.module}">跳转</button>
              <span class="chip ${log.result === '成功' ? 'success' : 'neutral'}">${log.result}</span>
            </div>
          </div>
        </div>
      `).join('') || '<div class="list-item"><div class="item-meta">当前筛选条件下没有日志。</div></div>';
    }

    function downloadCsv(rows) {
      const header = ['id','actor','module','action','target_type','target_id','result','detail','created_at'];
      const lines = [header.join(',')];
      rows.forEach((row) => {
        const values = header.map((key) => {
          const raw = String(row[key] ?? '');
          return `"${raw.replaceAll('"', '""')}"`;
        });
        lines.push(values.join(','));
      });
      const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `audit-logs-${new Date().toISOString().slice(0, 19).replaceAll(':', '-')}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    async function loadLogs() {
      const logs = await window.hrApi.auditLogs(selectedFilters());
      auditState.rows = logs;
      const total = document.querySelector('[data-audit-total]');
      if (total) total.textContent = String(logs.length);
      const imports = logs.filter(l => String(l.module).includes('导入')).length;
      const recommends = logs.filter(l => String(l.module).includes('推荐') || String(l.module).includes('候选')).length;
      const permissions = logs.filter(l => String(l.module).includes('权限')).length;
      document.querySelector('[data-audit-import]').textContent = String(imports);
      document.querySelector('[data-audit-recommend]').textContent = String(recommends);
      document.querySelector('[data-audit-permission]').textContent = String(permissions);
      renderRows(logs);
    }

    window.addEventListener('DOMContentLoaded', async () => {
      await renderApp();
      await loadLogs().catch((err) => console.warn(err));
    });

    document.addEventListener('click', async (event) => {
      const button = event.target.closest('[data-action]');
      if (!button) return;
      if (button.dataset.action === 'refresh-audit-logs') {
        await loadLogs().catch((err) => console.warn(err));
        showToast('日志已刷新');
      }
      if (button.dataset.action === 'export-audit-logs') {
        downloadCsv(auditState.rows);
        showToast('已导出当前筛选结果');
      }
      if (button.dataset.action === 'jump-audit-module') {
        const module = String(button.dataset.module || '');
        const mapping = [
          ['候选人池', 'candidates.html'],
          ['客户公司管理', 'companies.html'],
          ['项目管理', 'projects.html'],
          ['岗位管理', 'positions.html'],
          ['权限管理', 'permissions.html'],
          ['数据权限', 'data-permissions.html'],
          ['操作日志', 'logs.html'],
          ['系统配置', 'system-config.html'],
          ['邮件配置', 'email-config.html'],
        ];
        const target = mapping.find(([key]) => module.includes(key));
        if (target) {
          window.location.href = `./${target[1]}`;
        } else {
          showToast(`未找到 ${module} 的跳转入口`);
        }
      }
    });

    document.addEventListener('input', async (event) => {
      if (!event.target.closest('[data-audit-filter-actor], [data-audit-filter-module], [data-audit-filter-action], [data-audit-filter-target], [data-audit-filter-keyword]')) return;
      clearTimeout(window.__AUDIT_FILTER_TIMER__);
      window.__AUDIT_FILTER_TIMER__ = setTimeout(() => {
        loadLogs().catch((err) => console.warn(err));
      }, 350);
    });

    document.addEventListener('change', async (event) => {
      if (!event.target.closest('[data-audit-filter-result], [data-audit-filter-from], [data-audit-filter-to]')) return;
      loadLogs().catch((err) => console.warn(err));
    });

    window.filterLogsByModule = function(moduleName) {
      const moduleInput = document.querySelector('[data-audit-filter-module]');
      if (moduleInput) {
        moduleInput.value = moduleName || '';
      }
      if (window.loadLogs) {
        window.loadLogs().catch((err) => console.warn(err));
      }
    };
  </script>
</body>
</html>
