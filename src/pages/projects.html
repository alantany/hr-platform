  try {
    const projects = await window.hrApi.projects();
    const companies = await window.hrApi.companies();
    const positions = await window.hrApi.positions();
    
    const total = document.querySelector('[data-project-total]');
    const active = document.querySelector('[data-project-active]');
    const finished = document.querySelector('[data-project-finished]');
    const urgent = document.querySelector('[data-project-urgent]');
    if (total) total.textContent = String(projects.length);
    if (active) active.textContent = String(projects.filter(p => p.status === '招聘中').length);
    if (finished) finished.textContent = String(projects.filter(p => p.status === '招聘完毕').length);
    if (urgent) urgent.textContent = String(positions.filter(position => position.urgency === '高').length);
    
    const companyOptions = companies.map((c) => `<option value="${c.id}">${c.name}</option>`).join('');
    
    // 填充搜索表单下拉框
    const searchProjComp = document.querySelector('#search-project-company');
    const searchPosComp = document.querySelector('#search-position-company');
    if (searchProjComp) searchProjComp.innerHTML = `<option value="">全部公司</option>${companyOptions}`;
    if (searchPosComp) searchPosComp.innerHTML = `<option value="">全部公司</option>${companyOptions}`;

    const searchPosProject = document.querySelector('#search-position-project');
    const updateSearchPosProjectOptions = (companyId) => {
      if (!searchPosProject) return;
      const filtered = companyId ? projects.filter(p => p.company_id === Number(companyId)) : projects;
      searchPosProject.innerHTML = `<option value="">全部项目</option>` + filtered.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
    };
    updateSearchPosProjectOptions('');
    if (searchPosComp) {
      searchPosComp.addEventListener('change', (e) => updateSearchPosProjectOptions(e.target.value));
    }

    // 填充新建/编辑窗口下拉框
    const createCompany = document.querySelector('[data-project-company]');
    const editCompany = document.querySelector('[data-project-edit-company]');
    if (createCompany) createCompany.innerHTML = `<option value="">请选择客户</option>${companyOptions}`;
    if (editCompany) editCompany.innerHTML = `<option value="">请选择客户</option>${companyOptions}`;
    
    const createPosProject = document.querySelector('[data-position-project]');
    if (createPosProject) createPosProject.innerHTML = `<option value="">请选择项目</option>` + projects.map(p => `<option value="${p.id}">${p.name}</option>`).join('');

    const projectMap = new Map(projects.map((p) => [p.id, p]));
    const createCompanyDisplay = document.querySelector('[data-position-company-display]');
    if (createPosProject && createCompanyDisplay) {
      createPosProject.addEventListener('change', () => {
        const pid = Number(createPosProject.value || 0);
        const proj = projectMap.get(pid);
        createCompanyDisplay.textContent = proj
          ? `所属公司：${proj.company_name || '未知公司'} · ${proj.name}`
          : '所属公司：请选择项目后自动显示';
      });
    }

    // Tab 切换逻辑
    const tabs = document.querySelectorAll('.sub-tab');
    const projectSearchForm = document.querySelector('#project-search-form');
    const positionSearchForm = document.querySelector('#position-search-form');
    const projectPanel = document.querySelector('#project-panel');
    const positionPanel = document.querySelector('#position-panel');

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => {
          t.classList.remove('active');
          t.style.color = '#64748b';
          t.style.borderBottomColor = 'transparent';
        });
        tab.classList.add('active');
        tab.style.color = '#2563EB';
        tab.style.borderBottomColor = '#2563EB';

        const mode = tab.dataset.subtab;
        if (mode === 'project-tab') {
          projectSearchForm.style.display = 'flex';
          projectPanel.style.display = 'block';
          positionSearchForm.style.display = 'none';
          positionPanel.style.display = 'none';
        } else {
          projectSearchForm.style.display = 'none';
          projectPanel.style.display = 'none';
          positionSearchForm.style.display = 'flex';
          positionPanel.style.display = 'block';
        }
      });
    });

    // 搜索与重置逻辑：项目列表
    document.querySelector('#btn-project-search')?.addEventListener('click', () => {
      window.projectFilters = {
        name: document.querySelector('#search-project-name').value.trim(),
        companyId: document.querySelector('#search-project-company').value,
        status: document.querySelector('#search-project-status').value,
        level: document.querySelector('#search-project-level').value
      };
      window.refreshManagementPage();
    });
    document.querySelector('#btn-project-reset')?.addEventListener('click', () => {
      document.querySelector('#search-project-name').value = '';
      document.querySelector('#search-project-company').value = '';
      document.querySelector('#search-project-status').value = '';
      document.querySelector('#search-project-level').value = '';
      window.projectFilters = { name: '', companyId: '', status: '', level: '' };
      window.refreshManagementPage();
    });

    // 搜索与重置逻辑：岗位列表
    document.querySelector('#btn-position-search')?.addEventListener('click', () => {
      window.positionFilters = {
        name: document.querySelector('#search-position-name').value.trim(),
        companyId: document.querySelector('#search-position-company').value,
        projectId: document.querySelector('#search-position-project').value,
        urgency: document.querySelector('#search-position-urgency').value,
        salaryRange: document.querySelector('#search-position-salary').value
      };
      window.refreshManagementPage();
    });
    document.querySelector('#btn-position-reset')?.addEventListener('click', () => {
      document.querySelector('#search-position-name').value = '';
      document.querySelector('#search-position-company').value = '';
      document.querySelector('#search-position-project').value = '';
      document.querySelector('#search-position-urgency').value = '';
      document.querySelector('#search-position-salary').value = '';
      window.positionFilters = { name: '', companyId: '', projectId: '', urgency: '', salaryRange: '' };
      window.refreshManagementPage();
    });

    // 执行初次渲染
    await window.refreshManagementPage();

  } catch (err) {
    console.warn(err);
  }
});
</script>
</body>
</html>
