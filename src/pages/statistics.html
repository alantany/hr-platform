<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>统计大屏</title>
  <link rel="stylesheet" href="../../styles.css" />
  <script defer src="../../frontend-api.js"></script>
  <script defer src="../../app.js"></script>
  <style>
    /* ===== 统计大屏专享：深色外壳覆盖样式 ===== */
    .content {
      background: #0b0f19 !important;
      color: #f3f4f6 !important;
    }
    .content .crumbs {
      color: rgba(255, 255, 255, 0.45) !important;
    }
    .content .page-title {
      color: #ffffff !important;
      text-shadow: 0 0 10px rgba(37, 99, 235, 0.3) !important;
    }
    .content .page-lede {
      color: rgba(255, 255, 255, 0.55) !important;
    }
    .content .topbar {
      background: rgba(17, 24, 39, 0.8) !important;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08) !important;
      padding: 20px 24px !important;
      border-radius: 12px 12px 0 0;
      margin-bottom: 16px;
    }
    .content .top-notice-btn {
      background: rgba(31, 41, 55, 0.8) !important;
      border-color: rgba(255, 255, 255, 0.1) !important;
      color: #f3f4f6 !important;
    }
    .content .top-notice-btn:hover {
      background: rgba(55, 65, 81, 0.9) !important;
      border-color: rgba(255, 255, 255, 0.2) !important;
      color: #ffffff !important;
    }
    .content .top-notice-btn .badge {
      box-shadow: 0 0 0 2px rgba(17, 24, 39, 0.8) !important;
    }

    /* ===== 数据大屏暗黑主题 ===== */
    .dashboard-dark-container {
      background: linear-gradient(135deg, #0b0f19 0%, #111827 50%, #1f2937 100%);
      color: #f3f4f6;
      border-radius: 12px;
      padding: 24px;
      min-height: calc(100vh - 120px);
      box-shadow: inset 0 2px 20px rgba(0, 0, 0, 0.5);
    }

    .dashboard-dark-container .card {
      background: rgba(17, 24, 39, 0.85);
      border: 1px solid rgba(37, 99, 235, 0.2);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      backdrop-filter: blur(4px);
      border-radius: 12px;
      margin-bottom: 0;
      padding: 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .dashboard-dark-container .card:hover {
      border-color: rgba(37, 99, 235, 0.5);
      box-shadow: 0 8px 32px 0 rgba(37, 99, 235, 0.1);
    }

    .dashboard-dark-container .card-header {
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding-bottom: 10px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .dashboard-dark-container .card-title {
      color: #ffffff;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    /* ===== 大屏标题栏 ===== */
    .dashboard-title-bar {
      text-align: center;
      padding: 0 0 24px 0;
      position: relative;
    }

    .dashboard-title-bar h1 {
      font-size: 26px;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: 3px;
      text-shadow: 0 0 15px rgba(37, 99, 235, 0.4);
      margin: 0;
    }

    .dashboard-title-bar .dtb-line {
      width: 180px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #2563EB, transparent);
      margin: 8px auto 0;
    }

    .dashboard-title-bar .dtb-time {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.4);
      margin-top: 6px;
      font-family: monospace;
    }

    /* ===== 大屏统计卡片 ===== */
    .dash-stat-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    .dash-stat-card {
      background: rgba(17, 24, 39, 0.85);
      border: 1px solid rgba(37, 99, 235, 0.2);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .dash-stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
    }

    .dash-stat-card.blue::before { background: linear-gradient(90deg, #2563EB, #60a5fa); }
    .dash-stat-card.green::before { background: linear-gradient(90deg, #10B981, #34d399); }
    .dash-stat-card.orange::before { background: linear-gradient(90deg, #F59E0B, #fbbf24); }
    .dash-stat-card.red::before { background: linear-gradient(90deg, #EF4444, #f87171); }
    .dash-stat-card.purple::before { background: linear-gradient(90deg, #8B5CF6, #a78bfa); }
    .dash-stat-card.cyan::before { background: linear-gradient(90deg, #06B6D4, #22d3ee); }

    .dash-stat-card:hover {
      border-color: #2563EB;
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(37, 99, 235, 0.25);
    }

    .dash-stat-card .dsc-value {
      font-size: 28px;
      font-weight: 800;
      color: #ffffff;
      text-shadow: 0 0 10px rgba(37, 99, 235, 0.2);
    }

    .dash-stat-card .dsc-label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.52);
      margin-top: 4px;
    }

    .dash-stat-card .dsc-trend {
      font-size: 11px;
      margin-top: 4px;
    }

    .dash-stat-card .dsc-trend.up { color: #10B981; }
    .dash-stat-card .dsc-trend.down { color: #EF4444; }

    /* ===== 大屏网格布局 ===== */
    .dash-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .dash-grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .dash-grid-2-1 {
      display: grid;
      grid-template-columns: 2fr 1.1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    /* ===== 图表容器 ===== */
    .chart-container {
      width: 100%;
      height: 230px;
      position: relative;
    }

    /* ===== 柱状图 ===== */
    .bar-chart {
      display: flex;
      align-items: flex-end;
      justify-content: space-around;
      height: 100%;
      padding: 10px 0 0 0;
      gap: 6px;
    }

    .bar-chart .bar-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      height: 100%;
      justify-content: flex-end;
    }

    .bar-chart .bar {
      width: 60%;
      max-width: 32px;
      border-radius: 4px 4px 0 0;
      transition: all 0.3s;
      cursor: pointer;
      position: relative;
    }

    .bar-chart .bar:hover {
      opacity: 0.8;
      transform: scaleY(1.02);
    }

    .bar-chart .bar-label {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.4);
      margin-top: 6px;
      text-align: center;
    }

    .bar-chart .bar-value {
      font-size: 11px;
      color: #fff;
      margin-bottom: 4px;
      font-weight: 600;
    }

    /* ===== 折线图 ===== */
    .line-chart {
      width: 100%;
      height: 100%;
      position: relative;
    }

    .line-chart svg {
      width: 100%;
      height: 100%;
    }

    /* ===== 饼图 ===== */
    .pie-chart {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      height: 100%;
    }

    .pie-visual {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      position: relative;
      flex-shrink: 0;
    }

    .pie-legend {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }

    .pie-legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.8);
    }

    .pie-legend-item .pli-dot {
      width: 10px;
      height: 10px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .pie-legend-item .pli-value {
      margin-left: auto;
      font-weight: 600;
      color: #fff;
    }

    /* ===== 雷达图 ===== */
    .radar-chart {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .radar-chart svg {
      width: 200px;
      height: 200px;
    }

    /* ===== 散点图 ===== */
    .scatter-chart {
      width: 100%;
      height: 100%;
      position: relative;
    }

    .scatter-chart svg {
      width: 100%;
      height: 100%;
    }

    /* ===== 热点图 ===== */
    .heatmap-container {
      display: grid;
      gap: 3px;
      padding: 6px;
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      overflow: hidden;
    }

    .heatmap-cell {
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.9);
      cursor: pointer;
      transition: all 0.15s;
      font-weight: bold;
    }

    .heatmap-cell:hover {
      transform: scale(1.1);
      z-index: 1;
    }

    /* ===== 漏斗图 ===== */
    .funnel-chart {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      height: 100%;
      justify-content: center;
      padding: 10px 0;
    }

    .funnel-chart .funnel-step {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      cursor: pointer;
      padding: 6px 8px;
      border-radius: 6px;
      transition: background 0.15s;
    }

    .funnel-chart .funnel-step:hover {
      background: rgba(37, 99, 235, 0.1);
    }

    .funnel-chart .funnel-shape {
      height: 30px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      transition: all 0.3s;
    }

    .funnel-chart .funnel-info {
      flex: 1;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .funnel-chart .funnel-name {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.8);
    }

    .funnel-chart .funnel-pct {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
    }

    /* ===== 明细表格 ===== */
    .detail-table-wrapper {
      max-height: 240px;
      overflow-y: auto;
    }

    .detail-table-wrapper::-webkit-scrollbar {
      width: 4px;
    }

    .detail-table-wrapper::-webkit-scrollbar-thumb {
      background: rgba(37, 99, 235, 0.3);
      border-radius: 2px;
    }

    .detail-table {
      width: 100%;
      border-collapse: collapse;
    }

    .detail-table th {
      background: rgba(37, 99, 235, 0.15);
      color: rgba(255, 255, 255, 0.8);
      font-size: 12px;
      font-weight: 600;
      padding: 8px 10px;
      text-align: left;
      position: sticky;
      top: 0;
      z-index: 1;
      border-bottom: 1px solid rgba(37, 99, 235, 0.2);
    }

    .detail-table td {
      padding: 8px 10px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .detail-table tr:hover td {
      background: rgba(37, 99, 235, 0.08);
    }

    .drillable {
      cursor: pointer;
    }

    .drillable:hover {
      color: #3b82f6 !important;
      text-decoration: underline;
    }

    /* ===== 多维对比轮播 ===== */
    .multi-carousel {
      display: flex;
      flex-direction: column;
      height: 100%;
      justify-content: center;
    }

    .multi-carousel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .multi-carousel-header .mc-title {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.8);
      font-weight: 600;
    }

    .multi-carousel-nav {
      display: flex;
      gap: 4px;
    }

    .multi-carousel-nav .mc-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      cursor: pointer;
      transition: all 0.2s;
    }

    .multi-carousel-nav .mc-dot.active {
      background: #2563EB;
      width: 18px;
      border-radius: 4px;
    }

    .multi-carousel-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 10px;
    }

    .multi-carousel-body .mcr-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .multi-carousel-body .mcr-row .mcr-label {
      width: 50px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.6);
      text-align: right;
      flex-shrink: 0;
    }

    .multi-carousel-body .mcr-row .mcr-bar-wrap {
      flex: 1;
      height: 12px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 6px;
      overflow: hidden;
    }

    .multi-carousel-body .mcr-row .mcr-bar {
      height: 100%;
      border-radius: 6px;
      transition: width 0.5s ease;
    }

    .multi-carousel-body .mcr-row .mcr-value {
      width: 35px;
      font-size: 11px;
      color: #fff;
      font-weight: 600;
      flex-shrink: 0;
      text-align: right;
    }

    /* ===== 下钻弹窗 ===== */
    .drill-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      z-index: 3000;
      justify-content: center;
      align-items: center;
      padding: 24px;
      backdrop-filter: blur(4px);
    }

    .drill-modal-overlay.show {
      display: flex;
    }

    .drill-modal {
      background: #111827;
      border: 1px solid rgba(37, 99, 235, 0.3);
      border-radius: 12px;
      width: 100%;
      max-width: 860px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
    }

    .drill-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .drill-modal-header h3 {
      color: #fff;
      font-size: 15px;
      margin: 0;
      font-weight: 700;
    }

    .drill-modal-body {
      padding: 20px;
      overflow-y: auto;
      flex: 1;
    }

    .drill-modal-close {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.5);
      font-size: 24px;
      cursor: pointer;
      line-height: 1;
    }

    .drill-modal-close:hover {
      color: #fff;
    }

    .drill-stat-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    .drill-stat-item {
      background: rgba(37, 99, 235, 0.1);
      border: 1px solid rgba(37, 99, 235, 0.2);
      border-radius: 8px;
      padding: 10px 16px;
      text-align: center;
      flex: 1;
    }

    .drill-stat-item .dsi-value {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
    }

    .drill-stat-item .dsi-label {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    const state = { summary: null };

    // ===== 实时时钟 =====
    let clockTimer = null;
    function startClock() {
      if (clockTimer) clearInterval(clockTimer);
      function updateClock() {
        const now = new Date();
        const str = now.getFullYear() + '-' +
          String(now.getMonth() + 1).padStart(2, '0') + '-' +
          String(now.getDate()).padStart(2, '0') + ' ' +
          String(now.getHours()).padStart(2, '0') + ':' +
          String(now.getMinutes()).padStart(2, '0') + ':' +
          String(now.getSeconds()).padStart(2, '0');
        const el = document.getElementById('currentTime');
        if (el) el.textContent = str;
      }
      clockTimer = setInterval(updateClock, 1000);
      updateClock();
    }

    // ===== 折线图渲染（近30天趋势） =====
    function renderLineChart() {
      const container = document.getElementById('trendLineChart');
      if (!container) return;
      const w = container.clientWidth || 500;
      const h = container.clientHeight || 230;
      const pad = 30;
      const n = 30;
      const stepX = (w - pad * 2) / (n - 1);

      // 从真实数据中得出基数
      const cCount = state.summary?.candidate_count || 12;
      const rCount = state.summary?.recommendation_count || 8;
      const dCount = state.summary?.delivery_count || 3;

      // 模拟近30天数据点
      const resumes = Array.from({length: n}, (_, i) => Math.round(cCount / 40 + Math.sin(i / 2) * 3 + Math.random() * 2 + 10));
      const recommendations = Array.from({length: n}, (_, i) => Math.round(rCount / 30 + Math.sin(i / 2) * 2 + Math.random() * 1.5 + 5));
      const hired = Array.from({length: n}, (_, i) => Math.round(dCount / 20 + Math.sin(i / 2) * 0.8 + Math.random() * 0.5 + 2));
      const allData = [...resumes, ...recommendations, ...hired];
      const max = Math.max(...allData, 10);

      function makePoints(data) {
        return data.map((v, i) => ({
          x: pad + i * stepX,
          y: h - pad - (v / max) * (h - pad * 2),
          v: v
        }));
      }

      const rPts = makePoints(resumes);
      const recPts = makePoints(recommendations);
      const hPts = makePoints(hired);

      function makePath(pts) {
        return pts.map((p, i) => (i === 0 ? 'M' : 'L') + p.x.toFixed(1) + ',' + p.y.toFixed(1)).join(' ');
      }

      let svg = '<svg viewBox="0 0 ' + w + ' ' + h + '">';
      // 网格线
      for (let i = 1; i <= 4; i++) {
        const y = pad + (h - pad * 2) * (i / 4);
        svg += '<line x1="' + pad + '" y1="' + y.toFixed(1) + '" x2="' + (w - pad) + '" y2="' + y.toFixed(1) + '" stroke="rgba(37,99,235,0.08)" stroke-width="1"/>';
      }
      
      // 简历数折线
      let rArea = makePath(rPts) + ' L' + rPts[rPts.length-1].x.toFixed(1) + ',' + (h-pad) + ' L' + rPts[0].x.toFixed(1) + ',' + (h-pad) + ' Z';
      svg += '<defs><linearGradient id="resGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2563EB" stop-opacity="0.2"/><stop offset="100%" stop-color="#2563EB" stop-opacity="0"/></linearGradient></defs>';
      svg += '<path d="' + rArea + '" fill="url(#resGrad)"/><path d="' + makePath(rPts) + '" fill="none" stroke="#2563EB" stroke-width="2"/>';
      rPts.forEach((p, idx) => {
        if (idx % 3 === 0) svg += '<circle cx="' + p.x.toFixed(1) + '" cy="' + p.y.toFixed(1) + '" r="2" fill="#2563EB"/>';
      });

      // 推荐数折线
      let recArea = makePath(recPts) + ' L' + recPts[recPts.length-1].x.toFixed(1) + ',' + (h-pad) + ' L' + recPts[0].x.toFixed(1) + ',' + (h-pad) + ' Z';
      svg += '<defs><linearGradient id="recGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#10B981" stop-opacity="0.2"/><stop offset="100%" stop-color="#10B981" stop-opacity="0"/></linearGradient></defs>';
      svg += '<path d="' + recArea + '" fill="url(#recGrad)"/><path d="' + makePath(recPts) + '" fill="none" stroke="#10B981" stroke-width="2"/>';
      recPts.forEach((p, idx) => {
        if (idx % 3 === 0) svg += '<circle cx="' + p.x.toFixed(1) + '" cy="' + p.y.toFixed(1) + '" r="2" fill="#10B981"/>';
      });

      // 录用数折线
      let hArea = makePath(hPts) + ' L' + hPts[hPts.length-1].x.toFixed(1) + ',' + (h-pad) + ' L' + hPts[0].x.toFixed(1) + ',' + (h-pad) + ' Z';
      svg += '<defs><linearGradient id="hiredGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F59E0B" stop-opacity="0.2"/><stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/></linearGradient></defs>';
      svg += '<path d="' + hArea + '" fill="url(#hiredGrad)"/><path d="' + makePath(hPts) + '" fill="none" stroke="#F59E0B" stroke-width="2"/>';
      hPts.forEach((p, idx) => {
        if (idx % 3 === 0) svg += '<circle cx="' + p.x.toFixed(1) + '" cy="' + p.y.toFixed(1) + '" r="2" fill="#F59E0B"/>';
      });

      svg += '</svg>';
      container.innerHTML = svg;
    }

    // ===== 部门推荐柱状图 =====
    function renderBarChart() {
      const container = document.getElementById('deptBarChart');
      if (!container) return;
      const data = [
        { label: '一组', value: Math.round((state.summary?.recommendation_count || 120) * 0.35), color: '#2563EB' },
        { label: '二组', value: Math.round((state.summary?.recommendation_count || 120) * 0.25), color: '#10B981' },
        { label: '三组', value: Math.round((state.summary?.recommendation_count || 120) * 0.18), color: '#F59E0B' },
        { label: '四组', value: Math.round((state.summary?.recommendation_count || 120) * 0.12), color: '#EF4444' },
        { label: '五组', value: Math.round((state.summary?.recommendation_count || 120) * 0.10), color: '#8B5CF6' }
      ];
      const max = Math.max(...data.map(d => d.value), 10);
      container.innerHTML = data.map(d => {

    // ===== 简历来源分布（饼图） =====
    function renderPieChart() {
      const container = document.getElementById('sourcePieChart');
      if (!container) return;
      const data = [
        { label: '智联招聘', value: 38, color: '#2563EB' },
        { label: '猎聘网', value: 28, color: '#10B981' },
        { label: '58招聘', value: 16, color: '#F59E0B' },
        { label: 'BOSS直聘', value: 10, color: '#EF4444' },
        { label: '人才内推', value: 8, color: '#8B5CF6' }
      ];
      const total = data.reduce((s, d) => s + d.value, 0);
      let cumulative = 0;
      const segments = data.map(d => {
        const start = cumulative;
        cumulative += d.value;
        return { ...d, start, end: cumulative };
      });
      const gradientParts = segments.map(s => {
        const startDeg = (s.start / total) * 360;
        const endDeg = (s.end / total) * 360;
        return s.color + ' ' + startDeg + 'deg ' + endDeg + 'deg';
      });
      container.innerHTML = '<div class="pie-visual" style="background:conic-gradient(' + gradientParts.join(', ') + ')"></div>' +
        '<div class="pie-legend">' + segments.map(s =>
          '<div class="pie-legend-item"><span class="pli-dot" style="background:' + s.color + '"></span>' + s.label + '<span class="pli-value">' + s.value + '%</span></div>'
        ).join('') + '</div>';
    }

    // ===== 雷达图 =====
    function renderRadarChart() {
      const container = document.getElementById('radarChart');
      if (!container) return;
      const labels = ['推荐量', '通过率', '响应速度', '简历质量', '客户满意度', '留存率'];
      const values = [0.88, 0.82, 0.95, 0.78, 0.85, 0.80];
      const n = labels.length;
      const size = 200;
      const cx = size / 2, cy = size / 2, r = 70;

      let html = '<svg viewBox="0 0 ' + size + ' ' + size + '">';
      for (let level = 1; level <= 4; level++) {
        const rr = (r / 4) * level;
        let pts = [];
        for (let i = 0; i < n; i++) {
          const angle = (Math.PI * 2 / n) * i - Math.PI / 2;
          pts.push((cx + rr * Math.cos(angle)).toFixed(1) + ',' + (cy + rr * Math.sin(angle)).toFixed(1));
        }
        html += '<polygon points="' + pts.join(' ') + '" fill="none" stroke="rgba(37,99,235,0.12)" stroke-width="1"/>';
      }
      for (let i = 0; i < n; i++) {
        const angle = (Math.PI * 2 / n) * i - Math.PI / 2;
        html += '<line x1="' + cx + '" y1="' + cy + '" x2="' + (cx + r * Math.cos(angle)).toFixed(1) + '" y2="' + (cy + r * Math.sin(angle)).toFixed(1) + '" stroke="rgba(37,99,235,0.12)"/>';
      }
      let dataPts = [];
      for (let i = 0; i < n; i++) {
        const angle = (Math.PI * 2 / n) * i - Math.PI / 2;
        const vr = r * values[i];
        dataPts.push((cx + vr * Math.cos(angle)).toFixed(1) + ',' + (cy + vr * Math.sin(angle)).toFixed(1));
      }
      html += '<polygon points="' + dataPts.join(' ') + '" fill="rgba(37,99,235,0.2)" stroke="#2563EB" stroke-width="2"/>';
      dataPts.forEach((p) => {
        html += '<circle cx="' + p.split(',')[0] + '" cy="' + p.split(',')[1] + '" r="3" fill="#2563EB"/>';
      });
      for (let i = 0; i < n; i++) {
        const angle = (Math.PI * 2 / n) * i - Math.PI / 2;
        const lx = cx + (r + 16) * Math.cos(angle);
        const ly = cy + (r + 16) * Math.sin(angle);
        html += '<text x="' + lx + '" y="' + ly + '" text-anchor="middle" dominant-baseline="central" fill="rgba(255,255,255,0.5)" font-size="9">' + labels[i] + '</text>';
      }
      html += '</svg>';
      container.innerHTML = html;
    }

    // ===== 散点图 =====
    function renderScatterChart() {
      const container = document.getElementById('scatterChart');
      if (!container) return;
      const w = container.clientWidth || 300;
      const h = container.clientHeight || 230;
      const pad = 35;
      const points = [];
      for (let i = 0; i < 35; i++) {
        points.push({
          x: 1 + Math.random() * 18,
          y: 5 + Math.random() * 30,
          r: 3 + Math.random() * 4
        });
      }
      const maxX = 20, maxY = 35;
      let html = '<svg viewBox="0 0 ' + w + ' ' + h + '">' +
        '<text x="' + (w / 2) + '" y="' + (h - 5) + '" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="9">工作经验(年)</text>' +
        '<text x="10" y="' + (h / 2) + '" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="9" transform="rotate(-90,10,' + (h / 2) + ')">期望薪资(K)</text>';
      points.forEach(p => {
        const cx = pad + (p.x / maxX) * (w - pad * 2);
        const cy = h - pad - (p.y / maxY) * (h - pad * 2);
        const opacity = 0.4 + (p.r / 7) * 0.5;
        html += '<circle cx="' + cx.toFixed(1) + '" cy="' + cy.toFixed(1) + '" r="' + p.r + '" fill="#2563EB" opacity="' + opacity.toFixed(2) + '"/>';
      });
      html += '</svg>';
      container.innerHTML = html;
    }

    // ===== 热力图 =====
    function renderHeatmap() {
      const container = document.getElementById('heatmapChart');
      if (!container) return;
      const positions = ['Java开发', '前端开发', '产品经理', '数据分析', 'UI设计', '销售总监'];
      const months = ['3月', '4月', '5月'];
      const data = [
        [85, 78, 95],
        [70, 82, 80],
        [60, 70, 68],
        [50, 62, 72],
        [40, 55, 58],
        [30, 45, 52]
      ];
      const maxVal = 95;
      const cols = months.length;
      const rows = positions.length;
      container.style.gridTemplateColumns = 'repeat(' + (cols + 1) + ', 1fr)';
      container.style.gridTemplateRows = 'repeat(' + (rows + 1) + ', 1fr)';

      let html = '<div style="font-size:9px;color:rgba(255,255,255,0.3);display:flex;align-items:center;justify-content:center">岗位/月</div>';
      months.forEach(m => {
        html += '<div style="font-size:9px;color:rgba(255,255,255,0.4);display:flex;align-items:center;justify-content:center">' + m + '</div>';
      });
      positions.forEach((p, i) => {
        html += '<div style="font-size:9px;color:rgba(255,255,255,0.4);display:flex;align-items:center;justify-content:center">' + p + '</div>';
        data[i].forEach(v => {
          const intensity = v / maxVal;
          const r = Math.round(37 * intensity + 17 * (1 - intensity));
          const g = Math.round(99 * intensity + 24 * (1 - intensity));
          const b = Math.round(235 * intensity + 39 * (1 - intensity));
          html += '<div class="heatmap-cell" style="background:rgb(' + r + ',' + g + ',' + b + ')" onclick="drillDown(\'heatmap\')">' + v + '</div>';
        });
      });
      container.innerHTML = html;
    }

            <div class="dsc-value" id="statOperators">0</div>
            <div class="dsc-label">协作用户数</div>
            <div class="dsc-trend">活跃中</div>
          </div>
          <div class="dash-stat-card cyan" onclick="drillDown('default')">
            <div class="dsc-value" id="statLogs">0</div>
            <div class="dsc-label">审计操作日志</div>
            <div class="dsc-trend up">↑ 15.3%</div>
          </div>
        </div>

        <!-- 第一行：推荐趋势折线图 + 转化漏斗 -->
        <div class="dash-grid-2-1">
          <!-- 三趋势折线图 -->
          <div class="card">
            <div class="card-header">
              <span class="card-title">近30天系统推进趋势</span>
              <span style="font-size:11px;color:rgba(255,255,255,0.4)">动态回填</span>
            </div>
            <div class="card-body">
              <div style="display:flex;gap:16px;justify-content:center;margin-bottom:12px;flex-wrap:wrap">
                <span style="font-size:11px;color:rgba(255,255,255,0.6)">● 新增简历数 <span style="color:#2563EB">■</span></span>
                <span style="font-size:11px;color:rgba(255,255,255,0.6)">● 推荐数 <span style="color:#10B981">■</span></span>
                <span style="font-size:11px;color:rgba(255,255,255,0.6)">● 录用数 <span style="color:#F59E0B">■</span></span>
              </div>
              <div class="chart-container">
                <div class="line-chart" id="trendLineChart"></div>
              </div>
            </div>
          </div>

          <!-- 转化漏斗 -->
          <div class="card">
            <div class="card-header"><span class="card-title">转化漏斗</span></div>
            <div class="card-body">
              <div class="funnel-chart">
                <div class="funnel-step" onclick="drillDown('recommendations')">
                  <div class="funnel-shape" style="width:100%;background:linear-gradient(90deg,#2563EB,#60a5fa)" id="funnelRecVal">0</div>
                  <div class="funnel-info">
                    <div class="funnel-name">推荐</div>
                    <div class="funnel-pct">100%</div>
                  </div>
                </div>
                <div class="funnel-step" onclick="drillDown('recommendations')">
                  <div class="funnel-shape" id="funnelIntBar" style="width:75%;background:linear-gradient(90deg,#10B981,#34d399)"><span id="funnelIntVal">0</span></div>
                  <div class="funnel-info">
                    <div class="funnel-name">面试</div>
                    <div class="funnel-pct" id="funnelIntPct">75.0%</div>
                  </div>
                </div>
                <div class="funnel-step" onclick="drillDown('hired')">
                  <div class="funnel-shape" id="funnelHirBar" style="width:30%;background:linear-gradient(90deg,#F59E0B,#fbbf24)"><span id="funnelHirVal">0</span></div>
                  <div class="funnel-info">
                    <div class="funnel-name">录用</div>
                    <div class="funnel-pct" id="funnelHirPct">30.0%</div>
                  </div>
                </div>
                <div class="funnel-step" onclick="drillDown('hired')">
                  <div class="funnel-shape" id="funnelRetBar" style="width:20%;background:linear-gradient(90deg,#EF4444,#f87171)"><span id="funnelRetVal">0</span></div>
                  <div class="funnel-info">
                    <div class="funnel-name">留存</div>
                    <div class="funnel-pct" id="funnelRetPct">25.5%</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- 第二行：部门推荐柱状图 + 渠道分布饼图 + 操作员雷达图 -->
        <div class="dash-grid-3">
          <!-- 部门推荐柱状图 -->
          <div class="card">
            <div class="card-header"><span class="card-title">团队推荐占比</span></div>
            <div class="card-body">
              <div class="chart-container">
                <div class="bar-chart" id="deptBarChart"></div>
              </div>
            </div>
          </div>

          <!-- 渠道分布饼图 -->
          <div class="card">
            <div class="card-header"><span class="card-title">简历渠道分布</span></div>
            <div class="card-body">
              <div class="chart-container">
                <div class="pie-chart" id="sourcePieChart"></div>
              </div>
            </div>
          </div>

          <!-- 操作员雷达图 -->
          <div class="card">
            <div class="card-header"><span class="card-title">交付综合雷达图</span></div>
            <div class="card-body">
              <div class="chart-container">
                <div class="radar-chart" id="radarChart"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- 第三行：薪资散点图 + 岗位热度热点图 + 多维对比 -->
        <div class="dash-grid-3">
          <!-- 薪资-经验散点图 -->
          <div class="card">
            <div class="card-header"><span class="card-title">期望薪资-经验散点</span></div>
            <div class="card-body">
              <div class="chart-container">
                <div class="scatter-chart" id="scatterChart"></div>
              </div>
            </div>
          </div>

          <!-- 岗位热度热点图 -->
          <div class="card">
            <div class="card-header"><span class="card-title">岗位热度分布</span></div>
            <div class="card-body">
              <div class="chart-container">
                <div class="heatmap-container" id="heatmapChart"></div>
              </div>
            </div>
          </div>

          <!-- 多维对比图 -->
          <div class="card">
            <div class="card-header"><span class="card-title">多维度穿透对比</span></div>
            <div class="card-body">
              <div class="chart-container">
                <div class="multi-chart" id="multiChart"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- 第四行：团队排行 + 客户排行 -->
        <div class="dash-grid-2">
          <!-- 组长绩效排行 -->
          <div class="card">
            <div class="card-header">
              <span class="card-title">交付团队排行</span>
              <span style="font-size:11px;color:rgba(255,255,255,0.4)">点击下钻明细</span>
            </div>
            <div class="card-body">
              <div class="detail-table-wrapper">
                <table class="detail-table">
                  <thead>
                    <tr><th>排名</th><th>团队名称</th><th>管理规模</th><th>推荐总量</th><th>通过率</th></tr>
                  </thead>
                  <tbody id="teamRankingBody">
                    <tr><td>1</td><td class="drillable" onclick="drillDown('leader-liu')">一组</td><td>12人</td><td>186</td><td>88%</td></tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>

          <!-- 客户效果排行 -->
          <div class="card">
            <div class="card-header">
              <span class="card-title">合作客户效果排行</span>
              <span style="font-size:11px;color:rgba(255,255,255,0.4)">点击下钻明细</span>
            </div>
            <div class="card-body">
              <div class="detail-table-wrapper">
                <table class="detail-table">
                  <thead>
                    <tr><th>排名</th><th>客户公司</th><th>已招人数</th><th>综合合格率</th><th>合作评分</th></tr>
                  </thead>
                  <tbody id="customerRankingBody">
                    <tr><td>1</td><td class="drillable" onclick="drillDown('customer-a')">科技有限公司A</td><td>45</td><td>92%</td><td>4.8</td></tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 下钻弹窗 -->
      <div class="drill-modal-overlay" id="drillModal">
        <div class="drill-modal">
          <div class="drill-modal-header">
            <h3 id="drillModalTitle">明细数据</h3>
            <button class="drill-modal-close" onclick="closeDrillModal()">&times;</button>
          </div>
          <div class="drill-modal-body" id="drillModalBody">
            <!-- 动态填充 -->
          </div>
        </div>
      </div>
    `;

    // 绑定下钻弹窗点击遮罩关闭
    function bindDrillCloseEvents() {
      const modal = document.getElementById('drillModal');
      if (modal) {
        modal.addEventListener('click', function(e) {
          if (e.target === this) closeDrillModal();
        });
      }
    }

    // ===== 页面入口初始化 =====
    window.addEventListener('DOMContentLoaded', async () => {
      await window.renderApp();
      startClock();
      bindDrillCloseEvents();

      // 点击 ESC 关闭弹窗
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeDrillModal();
      });

      // 加载真实统计并绘制所有大屏图表
      await loadSummaryData();

      // 监听窗口缩放重绘
      window.addEventListener('resize', () => {
        renderLineChart();
        renderBarChart();
        renderScatterChart();
      });
    });
  </script>
</body>
</html>
