<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数据权限</title>
  <link rel="stylesheet" href="../../styles.css" />
  <script defer src="../../frontend-api.js"></script>
  <script defer src="../../app.js"></script>
</head>
<body>
  <div id="app"></div>
  <script>
    window.__PAGE_BODY__ = `
      <section class="metrics">
        <div class="metric-card"><div class="metric-top"><div><div class="section-sub">岗位范围</div></div><div class="metric-icon">○</div></div><div class="metric-value" data-metric="team">0</div><div class="metric-label">可见岗位数</div></div>
        <div class="metric-card"><div class="metric-top"><div><div class="section-sub">项目范围</div></div><div class="metric-icon">△</div></div><div class="metric-value" data-metric="project">0</div><div class="metric-label">可见项目数</div></div>
        <div class="metric-card"><div class="metric-top"><div><div class="section-sub">客户范围</div></div><div class="metric-icon">▣</div></div><div class="metric-value" data-metric="company">0</div><div class="metric-label">可见客户数</div></div>
        <div class="metric-card"><div class="metric-top"><div><div class="section-sub">授权记录</div></div><div class="metric-icon">◌</div></div><div class="metric-value" data-metric="personal">0</div><div class="metric-label">公司/项目/岗位</div></div>
      </section>
      <section class="panel">
        <div class="section-head"><div><h3>数据权限</h3><div class="section-sub">按客户公司、项目、岗位控制可见范围。</div></div><div class="hero-actions" style="margin-top:0"><button class="btn primary" data-action="open-data-permission-modal">新增范围</button><button class="btn" data-action="refresh-page">刷新范围</button></div></div>
        <p class="panel-sub">按客户公司、项目、岗位控制可见范围。</p>
        <div class="list" data-data-permission-list><div class="list-item"><div class="item-top"><div><div class="item-title">暂无数据权限</div><div class="item-meta">数据权限记录来自数据库。</div></div><span class="chip primary">权限</span></div></div></div>
      </section>

      <div class="modal" data-data-permission-modal style="display:none; position:fixed; inset:0; background:rgba(14,22,34,.45); z-index:2000; padding:24px;">
        <div class="panel" style="max-width:760px; margin:6vh auto 0; background:#fff;">
          <div class="section-head">
            <div>
              <h3>新增数据权限</h3>
              <div class="section-sub">选择用户和可见范围，确认后写入数据库。</div>
            </div>
            <div class="hero-actions" style="margin-top:0">
              <button class="btn" data-action="close-data-permission-modal">取消</button>
              <button class="btn primary" data-action="confirm-data-permission-upload">确认保存</button>
            </div>
          </div>
          <div class="grid-2">
            <div class="panel" style="box-shadow:none; border:1px solid rgba(15,23,42,.08);">
              <div class="list">
                <div class="list-item"><div class="item-top"><div><div class="item-title">用户 ID</div><div class="item-meta">绑定到具体操作人</div></div></div><input class="input" type="number" min="1" data-data-permission-user /></div>
                <div class="list-item"><div class="item-top"><div><div class="item-title">范围类型</div><div class="item-meta">company / project / position</div></div></div><select class="input" data-data-permission-scope><option value="company">company</option><option value="project">project</option><option value="position">position</option></select></div>
                <div class="list-item"><div class="item-top"><div><div class="item-title">范围 ID</div><div class="item-meta">对应客户、项目或团队标识</div></div></div><input class="input" data-data-permission-scope-id /></div>
                <div class="list-item"><div class="item-top"><div><div class="item-title">范围名称</div><div class="item-meta">用于列表展示</div></div></div><input class="input" data-data-permission-scope-name /></div>
                <div class="list-item"><div class="item-top"><div><div class="item-title">授权人</div><div class="item-meta">默认 admin</div></div></div><input class="input" data-data-permission-granted-by value="admin" /></div>
              </div>
            </div>
            <div class="panel" style="box-shadow:none; border:1px solid rgba(15,23,42,.08);">
              <h3>保存后结果</h3>
              <div class="list" data-data-permission-preview>
                <div class="list-item"><div class="item-meta">确认后会刷新当前数据权限列表。</div></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    `;
    window.addEventListener('DOMContentLoaded', async () => {
      await renderApp();
      try {
        const list = await window.hrApi.dataPermissions();
        const counts = { position: 0, project: 0, company: 0 };
        list.forEach(item => {
          if (item.scope_type === 'project') counts.project += 1;
          if (item.scope_type === 'company') counts.company += 1;
          if (item.scope_type === 'position') counts.position += 1;
        });
        document.querySelector('[data-metric="team"]').textContent = String(counts.position);
        document.querySelector('[data-metric="project"]').textContent = String(counts.project);
        document.querySelector('[data-metric="company"]').textContent = String(counts.company);
        document.querySelector('[data-metric="personal"]').textContent = String(list.length);
        const host = document.querySelector('[data-data-permission-list]');
        if (host) {
          host.innerHTML = list.slice(0, 8).map(item => `<div class="list-item"><div class="item-top"><div><div class="item-title">${item.scope_name || item.scope_type}</div><div class="item-meta">${item.scope_type} · ${item.granted_by} · ${item.active ? '已启用' : '已停用'}</div></div><div class="table-actions"><button class="btn-sm" data-action="toggle-data-permission" data-user-id="${item.user_id}" data-scope-type="${item.scope_type}" data-scope-id="${item.scope_id}" data-scope-name="${item.scope_name}" data-granted-by="${item.granted_by}" data-active="${item.active}">${item.active ? '停用' : '启用'}</button></div><span class="chip ${item.active ? 'primary' : 'neutral'}">${item.scope_type}</span></div></div>`).join('') || '<div class="list-item"><div class="item-top"><div><div class="item-title">暂无数据权限</div><div class="item-meta">数据权限记录来自数据库。</div></div><span class="chip neutral">空</span></div></div>';
        }
      } catch (err) {
        console.warn(err);
      }
    });
  </script>
</body>
</html>
