<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>简历导入</title>
  <link rel="stylesheet" href="../../styles.css" />
  <script defer src="../../frontend-api.js"></script>
  <script defer src="../../app.js"></script>
</head>
<body>
  <div id="app"></div>
  <script>
    window.__PAGE_BODY__ = `
      <section class="hero" style="grid-template-columns:1.1fr .9fr">
        <div class="hero-card featured">
          <div class="intro-line">
            <div class="eyebrow">批量导入 · 解析结果</div>
            <div class="micro">接收外部程序下载好的简历池数据</div>
          </div>
          <div class="hero-actions">
            <button class="btn primary" data-action="open-import-modal">选择文件</button>
            <button class="btn" data-action="open-batch-import-modal">批量导入</button>
            <button class="btn" data-action="refresh-page">查看导入历史</button>
          </div>
        </div>

        <div class="panel import-records">
          <div class="intro-line" style="margin-top:0">
            <h3 style="margin:0">导入记录</h3>
            <div class="micro">按时间查看导入结果和处理状态</div>
          </div>
          <div class="list" style="margin-top:12px;">
            <div class="list-item soft">
              <div class="item-top">
                <div>
                  <div class="item-title">导入预览</div>
                  <div class="item-meta" data-import-preview>选择文件后会先检查同名候选人；若命中重复，会记录为待复核导入。</div>
                </div>
                <span class="tag blue">复核</span>
              </div>
            </div>
          </div>
          <div class="timeline" data-import-history>
            <div class="list-item soft">
              <div class="item-top">
                <div>
                  <div class="item-title">暂无导入记录</div>
                  <div class="item-meta">最近的导入结果来自数据库。</div>
                </div>
                <span class="tag blue">导入</span>
              </div>
            </div>
          </div>
        </div>
      </section>

      <div class="modal" data-import-modal style="display:none; position:fixed; inset:0; background:rgba(14,22,34,.45); z-index:2000; padding:24px;">
        <div class="panel" style="max-width:640px; margin:8vh auto 0; background:#fff;">
          <div class="section-head">
            <div>
              <h3>导入简历</h3>
              <div class="section-sub">选择 PDF 文件后确认导入，系统会记录导入结果与日志；若命中同名候选人，会落待复核记录。</div>
            </div>
            <div class="hero-actions" style="margin-top:0">
              <button class="btn" data-action="close-import-modal">取消</button>
              <button class="btn primary" data-action="confirm-import-upload">确认导入</button>
            </div>
          </div>
          <div class="list">
            <div class="list-item">
              <div class="item-top">
                <div>
                  <div class="item-title">简历文件</div>
                  <div class="item-meta">支持 .pdf 格式</div>
                </div>
              </div>
              <div class="file-upload-zone" onclick="document.querySelector('[data-import-file]').click()">
                <div class="upload-icon">
                  <svg viewBox="0 0 24 24" width="38" height="38" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                  </svg>
                </div>
                <div class="upload-text">点击选择要导入的 PDF 简历</div>
                <div class="upload-filename" data-import-filename>未选择任何文件</div>
              </div>
              <input class="input" type="file" accept=".pdf" data-import-file style="display: none;" />
            </div>
            <div class="list-item">
              <div class="item-top">
                <div>
                  <div class="item-title">导入说明</div>
                  <div class="item-meta">导入后会进入求职者数据池，并生成导入历史和审计日志。</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="modal" data-batch-import-modal style="display:none; position:fixed; inset:0; background:rgba(14,22,34,.45); z-index:2000; padding:24px;">
        <div class="panel" style="max-width:640px; margin:8vh auto 0; background:#fff;">
          <div class="section-head">
            <div>
              <h3>批量导入</h3>
              <div class="section-sub">一次选择多个简历文件，系统会逐个检查同名候选人并写入导入记录。</div>
            </div>
            <div class="hero-actions" style="margin-top:0">
              <button class="btn" data-action="close-batch-import-modal">取消</button>
              <button class="btn primary" data-action="confirm-batch-import-upload">确认导入</button>
            </div>
          </div>
          <div class="list">
            <div class="list-item">
              <div class="item-top">
                <div>
                  <div class="item-title">简历文件</div>
                  <div class="item-meta">支持多选 .pdf 格式</div>
                </div>
              </div>
              <div class="file-upload-zone" onclick="document.querySelector('[data-batch-import-files]').click()">
                <div class="upload-icon">
                  <svg viewBox="0 0 24 24" width="38" height="38" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                  </svg>
                </div>
                <div class="upload-text">点击选择一个或多个 PDF 简历</div>
                <div class="upload-filename" data-batch-import-filenames>未选择任何文件</div>
              </div>
              <input class="input" type="file" accept=".pdf" multiple data-batch-import-files style="display: none;" />
            </div>
          </div>
        </div>
      </div>
    `;
    window.addEventListener('DOMContentLoaded', async () => {
      await renderApp();

      // 绑定简历单选文件变更监听
      const fileInput = document.querySelector('[data-import-file]');
      if (fileInput) {
        fileInput.addEventListener('change', function() {
          const textNode = document.querySelector('[data-import-filename]');
          if (textNode) {
            textNode.textContent = this.files[0] ? this.files[0].name : '未选择任何文件';
          }
        });
      }
      
      // 绑定简历多选文件变更监听
      const batchInput = document.querySelector('[data-batch-import-files]');
      if (batchInput) {
        batchInput.addEventListener('change', function() {
          const textNode = document.querySelector('[data-batch-import-filenames]');
          if (textNode) {
            textNode.textContent = this.files.length ? `已选择 ${this.files.length} 个文件` : '未选择任何文件';
          }
        });
      }

      const refreshImportSummary = async () => {
        const [items, candidates] = await Promise.all([window.hrApi.importRecords(), window.hrApi.candidates()]);
        const success = document.querySelector('[data-import-success]');
        if (success) success.textContent = String(items.reduce((sum, i) => sum + Number(i.imported_count || 0), 0));
        const failed = document.querySelector('[data-import-failed]');
        if (failed) failed.textContent = String(items.reduce((sum, i) => sum + Number(i.failed_count || 0), 0));
        const rate = document.querySelector('[data-import-rate]');
        if (rate) rate.textContent = items.length ? `${((items.reduce((sum, i) => sum + Number(i.imported_count || 0), 0) / Math.max(1, items.reduce((sum, i) => sum + Number(i.imported_count || 0) + Number(i.failed_count || 0), 0))) * 100).toFixed(1)}%` : '0%';
        const review = document.querySelector('[data-import-review]');
        if (review) review.textContent = String(items.filter(i => String(i.note || '').includes('复核')).length);
        const history = document.querySelector('[data-import-history]');
        if (history) {
          history.innerHTML = items.slice(0, 5).map(i => `<div class="list-item soft"><div class="item-top"><div><div class="item-title">${i.file_name}</div><div class="item-meta">${i.imported_count} 成功 / ${i.failed_count} 失败 · ${i.note}</div></div><span class="tag ${i.status === '成功' ? 'green' : 'blue'}">${i.status}</span></div></div>`).join('');
        }
        const preview = document.querySelector('[data-import-preview]');
        if (preview) {
          preview.textContent = candidates.length ? `当前数据池已有 ${candidates.length} 位候选人，导入时会先按姓名检索，存在同名时会记录为待复核。` : '当前数据池暂无候选人，导入后会写入数据池。';
        }
      };
      
      refreshImportSummary().catch(console.warn);

      document.addEventListener('change', async (event) => {
        const fileInput = event.target.closest('[data-import-file]');
        if (!fileInput) return;
        const file = fileInput.files?.[0];
        const preview = document.querySelector('[data-import-preview]');
        if (preview) preview.textContent = file ? `已选择 ${file.name}，点击确认后将进行导入并检查同名候选人。` : '选择文件后会先检查是否存在同名候选人，命中后会记录为待复核。';
      });
    });
  </script>
</body>
</html>
