    async function initPage() {
      const params = new URLSearchParams(location.search);
      const positionId = params.get('position_id');
      if (!positionId) {
        document.querySelector('[data-candidate-list]').innerHTML = '<div class="list-item"><div class="item-meta">缺少岗位ID参数。</div></div>';
        return;
      }

      try {
        const [positions, projects, companies] = await Promise.all([
          window.hrApi.positions(),
          window.hrApi.projects(),
          window.hrApi.companies(),
        ]);

        const position = positions.find(p => p.id === Number(positionId));
        if (!position) throw new Error('岗位不存在');

        const project = projects.find(p => p.id === position.project_id);
        const company = companies.find(c => c.id === (project?.company_id));

        const setText = (sel, val) => { const el = document.querySelector(sel); if (el) el.textContent = val || '--'; };
        setText('[data-page-title]', '岗位候选人列表');
        setText('[data-page-sub]', [company?.name, project?.name, position.name].filter(Boolean).join(' · '));
        setText('[data-position-salary]', formatSalary(position));
        setText('[data-hiring-count]', (position.hiring_count || 1) + '人');

        const urgencyEl = document.querySelector('[data-urgency-chip]');
        if (urgencyEl) {
          urgencyEl.textContent = position.urgency || '--';
          if (position.urgency === '高') {
            urgencyEl.style.cssText = 'font-size:11px;padding:2px 8px;background:#fee2e2;color:#ef4444;border:1px solid #fecaca;';
          } else if (position.urgency === '中') {
            urgencyEl.style.cssText = 'font-size:11px;padding:2px 8px;background:#ffedd5;color:#f97316;border:1px solid #fed7aa;';
          } else {
            urgencyEl.style.cssText = 'font-size:11px;padding:2px 8px;background:#eff6ff;color:#3b82f6;border:1px solid #bfdbfe;';
          }
        }

        // Fetch recommendations
        const [recommendations, tagConfigs] = await Promise.all([
          window.hrApi.recommendations({ position_id: Number(positionId) }),
          window.hrTagSystem?.fetchConfigs?.() || Promise.resolve([]),
        ]);
        window.__positionCandidateTagConfigs = tagConfigs;

        const candidateDetails = await Promise.all(
          recommendations.map(async (rec) => {
            try {
              const candidate = await window.hrApi.candidate(rec.candidate_id);
              return { ...rec, candidate };
            } catch {
              return { ...rec, candidate: null };
            }
          })
        );

        window.__positionCandidateRows = candidateDetails;
        const recommendedCount = candidateDetails.filter(function(item) { return normalizeRecommendationStatus(item.status) !== '待推荐'; }).length;
        const hiredCount = candidateDetails.filter(function(item) { return normalizeRecommendationStatus(item.status) === '已录用'; }).length;
        setText('[data-candidate-count]', candidateDetails.length + '人');
        setText('[data-recommend-count]', recommendedCount + '人');
        setText('[data-hired-count]', hiredCount + '人');
        // Store candidate IDs for batch export
        window.__positionCandidateIds = candidateDetails.map(function(item) {
          return item.candidate?.id;
        }).filter(Boolean).map(String);

        renderPositionCandidateRows(candidateDetails);
      } catch (err) {
        console.warn(err);
        const list = document.querySelector('[data-candidate-list]');
        if (list) list.innerHTML = '<div class="list-item"><div class="item-meta">加载失败：' + err.message + '</div></div>';
      }
    }

    function normalizeRecommendationStatus(status) {
      const value = String(status || '待推荐');
      if (['已录用', '已入职'].includes(value)) return '已录用';
      if (['未录用', '淘汰', '不合适', '拒绝'].includes(value)) return '未录用';
      if (['面试中', '安排面试'].includes(value)) return '面试中';
      if (['已推荐', '客户已收', '客户未收'].includes(value)) return '已推荐';
      return '待推荐';
    }

    function getRecommendationMatchScore(item) {
      const raw = item?.match_score ?? item?.match_degree ?? item?.candidate?.match_score ?? item?.candidate?.match_degree;
      if (raw === null || raw === undefined || raw === '') return null;
      const score = Number(String(raw).replace('%', ''));
      return Number.isFinite(score) ? score : null;
    }

    function renderPositionCandidateRows(candidateDetails) {
      const list = document.querySelector('[data-candidate-list]');
      if (!list) return;
      if (!candidateDetails.length) {
        const hasFilters = Boolean(document.querySelector('[data-position-filter-keyword]')?.value || document.querySelector('[data-position-filter-status]')?.value || document.querySelector('[data-position-filter-match]')?.value);
        list.innerHTML = '<div class="list-item"><div class="item-meta">' + (hasFilters ? '没有符合筛选条件的候选人。' : '该岗位暂无推荐候选人。') + '</div></div>';
        return;
      }
      list.innerHTML = candidateDetails.map((item) => {
            const c = item.candidate;
            if (!c) {
              return '<div class="list-item" style="display:grid;grid-template-columns:1.5fr 1fr 1.5fr 0.8fr 0.8fr 0.8fr 1fr 200px;gap:10px;align-items:center;padding:12px 16px;border-bottom:1px solid #e2e8f0;color:#475569;font-size:13px;"><div>候选人不可用 (ID: ' + item.candidate_id + ')</div><div></div><div></div><div></div><div></div><div></div><div></div><div></div></div>';
            }
            const statusColor = item.status === '已录用' || item.status === '已入职' ? 'success' :
                               item.status === '淘汰' || item.status === '不合适' ? 'neutral' : 'warning';
            const fieldTags = window.hrTagSystem?.extractTags?.('candidate', c, window.__positionCandidateTagConfigs || []) || [];
            const tagHtml = fieldTags.length
              ? window.hrTagSystem.renderTags(fieldTags, { className: 'field-tag-list is-compact' })
              : '';
            return '<div class="list-item" style="display:grid;grid-template-columns:1.5fr 1fr 1.5fr 0.8fr 0.8fr 0.8fr 1fr 200px;gap:10px;align-items:center;padding:12px 16px;border-bottom:1px solid #e2e8f0;">'
              + '<div style="display:flex;align-items:center;gap:8px;">'
              + '<div style="width:30px;height:30px;border-radius:50%;background:#2563EB;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;">' + (c.name || '?').charAt(0) + '</div>'
              + '<div><a style="font-weight:600;color:#2563EB;font-size:13px;cursor:pointer;text-decoration:underline;" data-action="view-detail" data-id="' + c.id + '">' + (c.name || '--') + '</a>'
              + tagHtml
              + '<div style="font-size:11px;color:#94a3b8;">' + (c.email || '') + '</div></div></div>'
              + '<div style="color:#475569;font-size:13px;">' + (c.phone || '--') + '</div>'
              + '<div style="color:#475569;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="' + (c.current_title || '') + '">' + (c.current_title || '--') + '</div>'
              + '<div style="color:#475569;font-size:13px;text-align:center;">' + (c.city || '--') + '</div>'
              + '<div style="color:#475569;font-size:13px;text-align:center;">' + (c.education || '--') + '</div>'
              + '<div style="color:#475569;font-size:13px;text-align:center;">' + (c.experience_years != null ? c.experience_years + '年' : '--') + '</div>'
              + '<div style="text-align:center;"><span class="chip ' + statusColor + '" style="font-size:11px;padding:3px 8px;">' + (item.status || '待推荐') + '</span></div>'
              + '<div class="table-actions" style="display:flex;gap:6px;align-items:center;justify-content:center;">'
              + '<button class="btn-sm" data-action="view-detail" data-id="' + c.id + '">详情</button>'
              + '<button class="btn-sm" onclick="positionExportSingle(' + c.id + ', \'' + (c.name || '').replace(/'/g, "\\'") + '\')">简历导出</button>'
              + '<button class="btn-sm" style="color:#ef4444;border-color:#fecaca;" onclick="removeRecommendation(' + item.id + ', \'' + (c.name || '').replace(/'/g, "\\'") + '\', this)">移除</button>'
              + '</div>'
              + '</div>';
          }).join('');
    }

    function applyPositionCandidateFilters() {
      const keyword = document.querySelector('[data-position-filter-keyword]')?.value.trim().toLowerCase() || '';
      const status = document.querySelector('[data-position-filter-status]')?.value || '';
      const matchBand = document.querySelector('[data-position-filter-match]')?.value || '';
      const rows = (window.__positionCandidateRows || []).filter(function(item) {
        const nameMatches = !keyword || String(item.candidate?.name || '').toLowerCase().includes(keyword);
        const statusMatches = !status || normalizeRecommendationStatus(item.status) === status;
        const score = getRecommendationMatchScore(item);
        let matchMatches = !matchBand;
        if (matchBand === '90') matchMatches = score !== null && score >= 90;
        if (matchBand === '80') matchMatches = score !== null && score >= 80 && score < 90;
        if (matchBand === '70') matchMatches = score !== null && score >= 70 && score < 80;
        if (matchBand === 'below70') matchMatches = score !== null && score < 70;
        return nameMatches && statusMatches && matchMatches;
      });
      renderPositionCandidateRows(rows);
    }

    function resetPositionCandidateFilters() {
      const keyword = document.querySelector('[data-position-filter-keyword]');
      const status = document.querySelector('[data-position-filter-status]');
      const match = document.querySelector('[data-position-filter-match]');
      if (keyword) keyword.value = '';
      if (status) status.value = '';
      if (match) match.value = '';
      renderPositionCandidateRows(window.__positionCandidateRows || []);
    }

    function openPositionCandidatePicker() {
      const positionId = new URLSearchParams(location.search).get('position_id');
      if (!positionId) return;
      location.href = './candidates.html?select_mode=1&position_id=' + encodeURIComponent(positionId);
    }

    function formatSalary(p) {
      const min = p?.salary_min;
      const max = p?.salary_max;
      const display = function(value, fallback) {
        if (value === null || value === undefined || value === '') return fallback;
        const amount = Number(value);
        if (!Number.isFinite(amount)) return value;
        return amount >= 1000 ? String(amount / 1000) : String(amount);
      };
      if (min || max) return display(min, '0') + '-' + display(max, '不限') + 'K';
      return '薪资面议';
    }

    window.addEventListener('DOMContentLoaded', async () => {
      await renderApp();
      await initPage();
      document.querySelector('[data-position-filter-keyword]')?.addEventListener('keydown', function(event) {
        if (event.key === 'Enter') applyPositionCandidateFilters();
      });
    });

    // Single export: open export modal with only this candidate
    async function positionExportSingle(candidateId, candidateName) {
      try {
        const c = await window.hrApi.candidate(candidateId);
        if (!c) throw new Error('候选人不存在');
        const modal = document.querySelector('[data-export-modal]');
        if (!modal) throw new Error('导出弹窗未找到');
        modal.style.display = 'block';
        const candidateList = document.querySelector('[data-export-candidates-list]');
        const history = document.querySelector('[data-export-history-modal]');
        if (candidateList) {
          modal.dataset.exportIds = JSON.stringify([String(c.id)]);
          candidateList.innerHTML = renderExportCard(c);
        }
        if (history) {
          const records = await window.hrApi.exportRecords();
          history.innerHTML = records.slice(0, 5).map(function(r) {
            return '<div class="list-item"><div class="item-top"><div><div class="item-title">' + r.file_name + '</div><div class="item-meta">' + (r.company_name || '') + ' \u00b7 ' + (r.project_name || '') + '</div><div class="item-meta mono">' + r.format + ' \u00b7 ' + r.created_at + '</div></div><span class="chip success">PDF</span></div></div>';
          }).join('') || '<div class="list-item"><div class="item-meta">暂无导出记录</div></div>';
        }
      } catch (err) {
        showToast('导出失败：' + (err.message || err));
      }
    }

    // Batch export: export all candidates under this position
    async function positionBatchExport() {
      const candidateIds = window.__positionCandidateIds || [];
      if (!candidateIds.length) {
        showToast('没有可导出的候选人');
        return;
      }
      const modal = document.querySelector('[data-export-modal]');
      if (!modal) throw new Error('导出弹窗未找到');
      modal.style.display = 'block';
      const candidateList = document.querySelector('[data-export-candidates-list]');
      const history = document.querySelector('[data-export-history-modal]');
      if (candidateList) {
        modal.dataset.exportIds = JSON.stringify(candidateIds);
        candidateList.innerHTML = '<div class="list-item"><div class="item-meta">加载中...</div></div>';

        const candidates = await window.hrApi.candidates();
        const exportList = candidateIds.map(function(id) {
          return candidates.find(function(c) { return String(c.id) === String(id); });
        }).filter(Boolean);
        candidateList.innerHTML = exportList.length
          ? exportList.map(function(c) { return renderExportCard(c); }).join('')
          : '<div style="color:#94a3b8;font-size:13px;padding:12px;text-align:center;">暂无候选人数据</div>';
      }
      if (history) {
        const records = await window.hrApi.exportRecords();
        history.innerHTML = records.slice(0, 5).map(function(r) {
          return '<div class="list-item"><div class="item-top"><div><div class="item-title">' + r.file_name + '</div><div class="item-meta">' + (r.company_name || '') + ' \u00b7 ' + (r.project_name || '') + '</div><div class="item-meta mono">' + r.format + ' \u00b7 ' + r.created_at + '</div></div><span class="chip success">PDF</span></div></div>';
        }).join('') || '<div class="list-item"><div class="item-meta">暂无导出记录</div></div>';
      }
    }

    // Remove recommendation
    async function removeRecommendation(recommendationId, candidateName, btnEl) {
      if (!confirm('确认将 ' + (candidateName || '该候选人') + ' 从当前岗位移除？')) return;
      try {
        if (btnEl) { btnEl.disabled = true; btnEl.textContent = '移除中...'; }
        await window.hrApi.deleteRecommendation(recommendationId);
        showToast('已移除 ' + (candidateName || '候选人'));
        setTimeout(() => location.reload(), 300);
      } catch (err) {
        showToast('移除失败：' + (err.message || err));
        if (btnEl) { btnEl.disabled = false; btnEl.textContent = '移除'; }
      }
    }

    function showToast(msg) {
      const container = document.querySelector('.toast-container');
      if (container) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
      } else {
        try { window.showToast(msg); } catch(e) { alert(msg); }
      }
    }
  </script>
