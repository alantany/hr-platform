<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>岗位候选人管理</title>
  <link rel="stylesheet" href="../../styles.css?v=1" />
  <script defer src="../../frontend-api.js"></script>
  <script defer src="../../app.js?v=1"></script>
</head>
<body>
  <div id="app"></div>
  <script>
    window.__PAGE_BODY__ = `
      <section class="panel">
        <div class="section-head">
          <div>
            <h3 data-page-title>岗位候选人</h3>
            <div class="section-sub" data-page-sub>加载中...</div>
          </div>
          <div class="hero-actions" style="margin-top:0;">
            <button class="btn" onclick="history.back()">返回</button>
          </div>
        </div>

        <div class="position-header" style="display:flex;gap:16px;padding:16px 20px;background:#f8fafc;border-bottom:1px solid #e2e8f0;flex-wrap:wrap;">
          <div style="flex:1;min-width:200px;">
            <div style="font-size:18px;font-weight:700;color:#0f172a;" data-position-name>--</div>
            <div style="font-size:13px;color:#64748b;margin-top:4px;">
              <span data-company-name>--</span> · <span data-project-name>--</span>
            </div>
          </div>
          <div style="text-align:right;min-width:200px;">
            <div style="font-size:13px;color:#475569;">
              <span class="chip" data-urgency-chip style="font-size:11px;padding:2px 8px;">--</span>
              <span data-position-salary>--</span> · <span data-position-location>--</span>
            </div>
            <div style="font-size:12px;color:#94a3b8;margin-top:4px;">
              招聘 <span data-hiring-count class="chip neutral" style="font-size:11px;padding:2px 8px;">0</span> 人 · 已推荐 <span data-recommend-count class="chip success" style="font-size:11px;padding:2px 8px;">0</span> 人
            </div>
          </div>
        </div>

        <div class="table-head" style="display:grid;grid-template-columns:1.5fr 1fr 1.5fr 0.8fr 0.8fr 0.8fr 1fr 200px;gap:10px;padding:12px 16px;background:#f8fafc;border-bottom:1px solid #e2e8f0;font-weight:600;color:#475569;font-size:13px;align-items:center;">
          <div>候选人</div>
          <div>手机号</div>
          <div>当前职位</div>
          <div style="text-align:center;">城市</div>
          <div style="text-align:center;">学历</div>
          <div style="text-align:center;">经验</div>
          <div style="text-align:center;">推荐状态</div>
          <div style="text-align:center;">操作</div>
        </div>
        <div data-candidate-list>
          <div class="list-item"><div class="item-meta">加载中...</div></div>
        </div>
      </section>
    `;

    function formatSalaryRange(position) {
      const min = position?.salary_min;
      const max = position?.salary_max;
      if (min || max) return (min || '0') + '-' + (max || '不限') + 'K';
      return '薪资面议';
    }

    function refreshList() {
      const list = document.querySelector('[data-candidate-list]');
      if (list) list.innerHTML = '<div class="list-item"><div class="item-meta">加载中...</div></div>';
      initPage();
    }

    async function initPage() {
      const params = new URLSearchParams(location.search);
      const positionId = params.get('position_id');
      if (!positionId) {
        document.querySelector('[data-candidate-list]').innerHTML = '<div class="list-item"><div class="item-meta">缺少岗位ID参数。</div></div>';
        return;
      }

      try {
        const [positions, projects, companies] = await Promise.all([
          window.hrApi.positions(),
          window.hrApi.projects(),
          window.hrApi.companies(),
        ]);

        const position = positions.find(p => p.id === Number(positionId));
        if (!position) throw new Error('岗位不存在');

        const project = projects.find(p => p.id === position.project_id);
        const company = companies.find(c => c.id === (project?.company_id));

        const setText = (sel, val) => { const el = document.querySelector(sel); if (el) el.textContent = val || '--'; };
        setText('[data-page-title]', (position.name || '岗位') + ' - 候选人管理');
        setText('[data-page-sub]', '管理该岗位下的推荐候选人');
        setText('[data-position-name]', position.name);
        setText('[data-company-name]', company?.name || '--');
        setText('[data-project-name]', project?.name || '--');
        setText('[data-position-salary]', formatSalaryRange(position));
        setText('[data-position-location]', position.location || '--');
        setText('[data-hiring-count]', position.hiring_count || 1);

        const urgencyEl = document.querySelector('[data-urgency-chip]');
        if (urgencyEl) {
          urgencyEl.textContent = position.urgency || '--';
          if (position.urgency === '高') {
            urgencyEl.className = 'chip';
            urgencyEl.style.cssText = 'font-size:11px;padding:2px 8px;background:#fee2e2;color:#ef4444;border:1px solid #fecaca;';
          } else if (position.urgency === '中') {
            urgencyEl.className = 'chip';
            urgencyEl.style.cssText = 'font-size:11px;padding:2px 8px;background:#ffedd5;color:#f97316;border:1px solid #fed7aa;';
          } else {
            urgencyEl.className = 'chip';
            urgencyEl.style.cssText = 'font-size:11px;padding:2px 8px;background:#eff6ff;color:#3b82f6;border:1px solid #bfdbfe;';
          }
        }

        // Fetch recommendations
        const recommendations = await window.hrApi.recommendations({ position_id: Number(positionId) });

        const candidateDetails = await Promise.all(
          recommendations.map(async (rec) => {
            try {
              const candidate = await window.hrApi.candidate(rec.candidate_id);
              return { ...rec, candidate };
            } catch {
              return { ...rec, candidate: null };
            }
          })
        );

        setText('[data-recommend-count]', candidateDetails.length);

        const list = document.querySelector('[data-candidate-list]');
        if (!candidateDetails.length) {
          list.innerHTML = '<div class="list-item"><div class="item-meta">该岗位暂无推荐候选人。</div></div>';
        } else {
          list.innerHTML = candidateDetails.map((item) => {
            const c = item.candidate;
            if (!c) {
              return '<div class="list-item" style="display:grid;grid-template-columns:1.5fr 1fr 1.5fr 0.8fr 0.8fr 0.8fr 1fr 200px;gap:10px;align-items:center;padding:12px 16px;border-bottom:1px solid #e2e8f0;color:#475569;font-size:13px;"><div>候选人数据不可用 (ID: ' + item.candidate_id + ')</div><div></div><div></div><div></div><div></div><div></div><div></div><div></div></div>';
            }
            const statusColor = item.status === '已录用' || item.status === '已入职' ? 'success' : 
                               item.status === '淘汰' || item.status === '不合适' ? 'neutral' : 'warning';
            return '<div class="list-item" style="display:grid;grid-template-columns:1.5fr 1fr 1.5fr 0.8fr 0.8fr 0.8fr 1fr 200px;gap:10px;align-items:center;padding:12px 16px;border-bottom:1px solid #e2e8f0;">'
              + '<div style="display:flex;align-items:center;gap:8px;">'
              + '<div style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;">' + (c.name || '?').charAt(0) + '</div>'
              + '<div><div style="font-weight:600;color:#0f172a;font-size:13px;cursor:pointer;color:#6657ee;text-decoration:underline;text-underline-offset:2px;" data-candidate-name-link data-id="' + c.id + '" onclick="showCandidateDetail(' + c.id + ')">' + (c.name || '--') + '</div>'
              + '<div style="font-size:11px;color:#94a3b8;">' + (c.email || '') + '</div></div></div>'
              + '<div style="color:#475569;font-size:13px;">' + (c.phone || '--') + '</div>'
              + '<div style="color:#475569;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="' + (c.current_title || '') + '">' + (c.current_title || '--') + '</div>'
              + '<div style="color:#475569;font-size:13px;text-align:center;">' + (c.city || '--') + '</div>'
              + '<div style="color:#475569;font-size:13px;text-align:center;">' + (c.education || '--') + '</div>'
              + '<div style="color:#475569;font-size:13px;text-align:center;">' + (c.experience_years != null ? c.experience_years + '年' : '--') + '</div>'
              + '<div style="text-align:center;"><span class="chip ' + statusColor + '" style="font-size:11px;padding:3px 8px;">' + (item.status || '待推荐') + '</span></div>'
              + '<div class="table-actions" style="display:flex;gap:6px;align-items:center;justify-content:center;">'
              + '<button class="btn-sm" data-action="edit-candidate" data-id="' + c.id + '">详情</button>'
              + '<button class="btn-sm" onclick="exportCandidate(' + c.id + ', \'' + (c.name || '').replace(/'/g, "\\'") + '\')">导出</button>'
              + '<button class="btn-sm" style="color:#ef4444;border-color:#fecaca;" onclick="removeRecommendation(' + item.id + ', ' + c.id + ', \'' + (c.name || '').replace(/'/g, "\\'") + '\', this)">移除</button>'
              + '</div>'
              + '</div>';
          }).join('');
        }
      } catch (err) {
        console.warn(err);
        const list = document.querySelector('[data-candidate-list]');
        if (list) list.innerHTML = '<div class="list-item"><div class="item-meta">加载失败：' + err.message + '</div></div>';
      }
    }

    window.addEventListener('DOMContentLoaded', async () => {
      await renderApp();
      initPage();
    });

    // -- Shared helper functions -- //

    function showCandidateDetail(candidateId) {
      const fakeBtn = document.createElement('button');
      fakeBtn.dataset.action = 'edit-candidate';
      fakeBtn.dataset.id = String(candidateId);
      fakeBtn.style.display = 'none';
      document.body.appendChild(fakeBtn);
      fakeBtn.click();
      setTimeout(() => fakeBtn.remove(), 100);
    }

    async function exportCandidate(candidateId, candidateName) {
      try {
        const c = await window.hrApi.candidate(candidateId);
        if (!c) throw new Error('候选人不存在');

        const companyName = document.querySelector('[data-company-name]')?.textContent || '';
        const projectName = document.querySelector('[data-project-name]')?.textContent || '';
        const positionName = document.querySelector('[data-position-name]')?.textContent || '';

        const record = await window.hrApi.createExportRecord({
          candidate_id: c.id,
          candidate_name: c.name || '',
          company_name: companyName,
          project_name: projectName,
          position_name: positionName,
          format: 'PDF',
          watermarked: true,
          exported_by: 'admin',
          file_name: (c.name || '候选人') + '-简历报告.pdf',
          file_path: '',
          contract_no: '',
          project_no: '',
          headhunter_position: '',
        });
        if (record && record.file_path) {
          await new Promise(r => setTimeout(r, 500));
          const link = document.createElement('a');
          link.href = record.file_path;
          link.download = record.file_name;
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
        }
        showToast((candidateName || '候选人') + ' 的简历已导出');
      } catch (err) {
        showToast('导出失败：' + (err.message || err));
      }
    }

    async function removeRecommendation(recommendationId, candidateId, candidateName, btnEl) {
      if (!confirm('确认将 ' + (candidateName || '该候选人') + ' 从当前岗位移除？')) return;
      try {
        if (btnEl) { btnEl.disabled = true; btnEl.textContent = '移除中...'; }
        await window.hrApi.deleteRecommendation(recommendationId);
        showToast('已移除 ' + (candidateName || '候选人'));
        // Refresh the list
        setTimeout(() => refreshList(), 300);
      } catch (err) {
        showToast('移除失败：' + (err.message || err));
        if (btnEl) { btnEl.disabled = false; btnEl.textContent = '移除'; }
      }
    }

    function showToast(msg) {
      const container = document.querySelector('.toast-container');
      if (container) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
      } else {
        // Fallback to window.showToast if available
        try { window.showToast(msg); } catch(e) { alert(msg); }
      }
    }
  </script>
</body>
</html>
