<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>岗位候选人管理</title>
  <link rel="stylesheet" href="../../styles.css?v=1" />
  <script defer src="../../frontend-api.js"></script>
  <script defer src="../../app.js?v=1"></script>
</head>
<body>
  <div id="app"></div>
  <script>
    window.__PAGE_BODY__ = `
      <section class="panel">
        <div class="section-head">
          <div>
            <h3 data-page-title>岗位候选人</h3>
            <div class="section-sub" data-page-sub>加载中...</div>
          </div>
          <div class="hero-actions" style="margin-top:0;">
            <button class="btn" data-action="open-export-modal">批量导出</button>
            <button class="btn" onclick="history.back()">返回</button>
          </div>
        </div>

        <div class="position-header" style="display:flex;gap:16px;padding:16px 20px;background:#f8fafc;border-bottom:1px solid #e2e8f0;flex-wrap:wrap;">
          <div style="flex:1;min-width:200px;">
            <div style="font-size:18px;font-weight:700;color:#0f172a;" data-position-name>--</div>
            <div style="font-size:13px;color:#64748b;margin-top:4px;">
              <span data-company-name>--</span> · <span data-project-name>--</span>
            </div>
          </div>
          <div style="text-align:right;min-width:200px;">
            <div style="font-size:13px;color:#475569;">
              <span class="chip" data-urgency-chip style="font-size:11px;padding:2px 8px;">--</span>
              <span data-position-salary>--</span> · <span data-position-location>--</span>
            </div>
            <div style="font-size:12px;color:#94a3b8;margin-top:4px;">
              招聘 <span data-hiring-count class="chip neutral" style="font-size:11px;padding:2px 8px;">0</span> 人 · 已推荐 <span data-recommend-count class="chip success" style="font-size:11px;padding:2px 8px;">0</span> 人
            </div>
          </div>
        </div>

        <div class="table-head" style="display:grid;grid-template-columns:1.5fr 1fr 1.5fr 0.8fr 0.8fr 0.8fr 1fr 200px;gap:10px;padding:12px 16px;background:#f8fafc;border-bottom:1px solid #e2e8f0;font-weight:600;color:#475569;font-size:13px;align-items:center;">
          <div>候选人</div>
          <div>手机号</div>
          <div>当前职位</div>
          <div style="text-align:center;">城市</div>
          <div style="text-align:center;">学历</div>
          <div style="text-align:center;">经验</div>
          <div style="text-align:center;">推荐状态</div>
          <div style="text-align:center;">操作</div>
        </div>
        <div data-candidate-list>
          <div class="list-item"><div class="item-meta">加载中...</div></div>
        </div>
      </section>
    `;

    async function initPage() {
      const params = new URLSearchParams(location.search);
      const positionId = params.get('position_id');
      if (!positionId) {
        document.querySelector('[data-candidate-list]').innerHTML = '<div class="list-item"><div class="item-meta">缺少岗位ID参数。</div></div>';
        return;
      }

      try {
        const [positions, projects, companies] = await Promise.all([
          window.hrApi.positions(),
          window.hrApi.projects(),
          window.hrApi.companies(),
        ]);

        const position = positions.find(p => p.id === Number(positionId));
        if (!position) throw new Error('岗位不存在');

        const project = projects.find(p => p.id === position.project_id);
        const company = companies.find(c => c.id === (project?.company_id));

        const setText = (sel, val) => { const el = document.querySelector(sel); if (el) el.textContent = val || '--'; };
        setText('[data-page-title]', (position.name || '岗位') + ' - 候选人管理');
        setText('[data-page-sub]', '管理该岗位下的推荐候选人');
        setText('[data-position-name]', position.name);
        setText('[data-company-name]', company?.name || '--');
        setText('[data-project-name]', project?.name || '--');
        setText('[data-position-salary]', formatSalary(position));
        setText('[data-position-location]', position.location || '--');
        setText('[data-hiring-count]', position.hiring_count || 1);

        const urgencyEl = document.querySelector('[data-urgency-chip]');
        if (urgencyEl) {
          urgencyEl.textContent = position.urgency || '--';
          if (position.urgency === '高') {
            urgencyEl.style.cssText = 'font-size:11px;padding:2px 8px;background:#fee2e2;color:#ef4444;border:1px solid #fecaca;';
          } else if (position.urgency === '中') {
            urgencyEl.style.cssText = 'font-size:11px;padding:2px 8px;background:#ffedd5;color:#f97316;border:1px solid #fed7aa;';
          } else {
            urgencyEl.style.cssText = 'font-size:11px;padding:2px 8px;background:#eff6ff;color:#3b82f6;border:1px solid #bfdbfe;';
          }
        }

        // Fetch recommendations
        const recommendations = await window.hrApi.recommendations({ position_id: Number(positionId) });

        const candidateDetails = await Promise.all(
          recommendations.map(async (rec) => {
            try {
              const candidate = await window.hrApi.candidate(rec.candidate_id);
              return { ...rec, candidate };
            } catch {
              return { ...rec, candidate: null };
            }
          })
        );

        setText('[data-recommend-count]', candidateDetails.length);
        // Store candidate IDs for batch export
        const allCandidateIds = candidateDetails.map(item => item.candidate?.id).filter(Boolean).map(String);
        const exportBtn = document.querySelector('[data-action="open-export-modal"]');
        if (exportBtn && allCandidateIds.length) {
          // Override default open-export-modal to use position's candidates
          const orig = exportBtn.onclick;
          exportBtn.dataset.positionCandidateIds = JSON.stringify(allCandidateIds);
        }

        const list = document.querySelector('[data-candidate-list]');
        if (!candidateDetails.length) {
          list.innerHTML = '<div class="list-item"><div class="item-meta">该岗位暂无推荐候选人。</div></div>';
        } else {
          list.innerHTML = candidateDetails.map((item) => {
            const c = item.candidate;
            if (!c) {
              return '<div class="list-item" style="display:grid;grid-template-columns:1.5fr 1fr 1.5fr 0.8fr 0.8fr 0.8fr 1fr 200px;gap:10px;align-items:center;padding:12px 16px;border-bottom:1px solid #e2e8f0;color:#475569;font-size:13px;"><div>候选人不可用 (ID: ' + item.candidate_id + ')</div><div></div><div></div><div></div><div></div><div></div><div></div><div></div></div>';
            }
            const statusColor = item.status === '已录用' || item.status === '已入职' ? 'success' :
                               item.status === '淘汰' || item.status === '不合适' ? 'neutral' : 'warning';
            return '<div class="list-item" style="display:grid;grid-template-columns:1.5fr 1fr 1.5fr 0.8fr 0.8fr 0.8fr 1fr 200px;gap:10px;align-items:center;padding:12px 16px;border-bottom:1px solid #e2e8f0;">'
              + '<div style="display:flex;align-items:center;gap:8px;">'
              + '<div style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;">' + (c.name || '?').charAt(0) + '</div>'
              + '<div><div style="font-weight:600;color:#0f172a;font-size:13px;">' + (c.name || '--') + '</div>'
              + '<div style="font-size:11px;color:#94a3b8;">' + (c.email || '') + '</div></div></div>'
              + '<div style="color:#475569;font-size:13px;">' + (c.phone || '--') + '</div>'
              + '<div style="color:#475569;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="' + (c.current_title || '') + '">' + (c.current_title || '--') + '</div>'
              + '<div style="color:#475569;font-size:13px;text-align:center;">' + (c.city || '--') + '</div>'
              + '<div style="color:#475569;font-size:13px;text-align:center;">' + (c.education || '--') + '</div>'
              + '<div style="color:#475569;font-size:13px;text-align:center;">' + (c.experience_years != null ? c.experience_years + '年' : '--') + '</div>'
              + '<div style="text-align:center;"><span class="chip ' + statusColor + '" style="font-size:11px;padding:3px 8px;">' + (item.status || '待推荐') + '</span></div>'
              + '<div class="table-actions" style="display:flex;gap:6px;align-items:center;justify-content:center;">'
              + '<button class="btn-sm" data-action="view-detail" data-id="' + c.id + '">详情</button>'
              + '<button class="btn-sm" onclick="positionExportSingle(' + c.id + ', \'' + (c.name || '').replace(/'/g, "\\'") + '\')">导出</button>'
              + '<button class="btn-sm" style="color:#ef4444;border-color:#fecaca;" onclick="removeRecommendation(' + item.id + ', \'' + (c.name || '').replace(/'/g, "\\'") + '\', this)">移除</button>'
              + '</div>'
              + '</div>';
          }).join('');
        }
      } catch (err) {
        console.warn(err);
        const list = document.querySelector('[data-candidate-list]');
        if (list) list.innerHTML = '<div class="list-item"><div class="item-meta">加载失败：' + err.message + '</div></div>';
      }
    }

    function formatSalary(p) {
      const min = p?.salary_min;
      const max = p?.salary_max;
      if (min || max) return (min || '0') + '-' + (max || '不限') + 'K';
      return '薪资面议';
    }

    window.addEventListener('DOMContentLoaded', async () => {
      await renderApp();
      initPage();
    });

    // Single export: open export modal (shows all candidates, user can select/deselect)
    async function positionExportSingle(candidateId, candidateName) {
      const fakeBtn = document.createElement('button');
      fakeBtn.dataset.action = 'open-export-modal';
      fakeBtn.style.display = 'none';
      document.body.appendChild(fakeBtn);
      fakeBtn.click();
      setTimeout(() => fakeBtn.remove(), 100);
    }

    // Remove recommendation
    async function removeRecommendation(recommendationId, candidateName, btnEl) {
      if (!confirm('确认将 ' + (candidateName || '该候选人') + ' 从当前岗位移除？')) return;
      try {
        if (btnEl) { btnEl.disabled = true; btnEl.textContent = '移除中...'; }
        await window.hrApi.deleteRecommendation(recommendationId);
        showToast('已移除 ' + (candidateName || '候选人'));
        setTimeout(() => location.reload(), 300);
      } catch (err) {
        showToast('移除失败：' + (err.message || err));
        if (btnEl) { btnEl.disabled = false; btnEl.textContent = '移除'; }
      }
    }

    function showToast(msg) {
      const container = document.querySelector('.toast-container');
      if (container) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
      } else {
        try { window.showToast(msg); } catch(e) { alert(msg); }
      }
    }
  </script>

      <div class="modal" data-export-modal style="display:none; position:fixed; inset:0; background:rgba(14,22,34,.45); z-index:2000; padding:24px;">
        <div class="panel" style="max-width:820px; margin:4vh auto 0; background:#fff; max-height:90vh; overflow-y:auto;">
          <div class="section-head" style="position:sticky; top:0; background:#fff; z-index:1; border-bottom:1px solid rgba(15,23,42,.06); padding-bottom:16px; margin-bottom:0;">
            <div>
              <h3>简历导出</h3>
              <div class="section-sub">为每位候选人分别填写合同编号、项目编号和猎头职位（选填），确认后各自生成一份 PDF 简历并自动下载。</div>
            </div>
            <div class="hero-actions" style="margin-top:0">
              <button class="btn" data-action="close-export-modal">取消</button>
              <button class="btn primary" data-action="confirm-export-upload">确认导出</button>
            </div>
          </div>
          <div class="grid-2" style="padding:16px;">
            <div style="display:flex; flex-direction:column; gap:0;">
              <div style="font-size:11px; font-weight:600; color:#64748b; text-transform:uppercase; letter-spacing:.06em; margin-bottom:10px;">待导出候选人</div>
              <div data-export-candidates-list style="display:flex; flex-direction:column; gap:10px;">
              </div>
            </div>
            <div>
              <div style="font-size:11px; font-weight:600; color:#64748b; text-transform:uppercase; letter-spacing:.06em; margin-bottom:10px;">最近导出记录</div>
              <div class="list" data-export-history-modal style="border:1px solid rgba(15,23,42,.08); border-radius:8px; overflow:hidden;">
                <div class="list-item"><div class="item-meta">导出记录来自数据库，可按候选人回看。</div></div>
              </div>
            </div>
          </div>
        </div>
      </div>

            <div class="panel" style="box-shadow:none;border:1px solid rgba(15,23,42,.08);">
              <h4>工作与教育</h4>
              <div class="list"><div class="list-item"><div><div class="item-title">当前职位</div></div><div data-candidate-detail-title>--</div></div><div class="list-item"><div><div class="item-title">学历</div></div><div data-candidate-detail-education>--</div></div><div class="list-item"><div><div class="item-title">从业年限</div></div><div data-candidate-detail-exp>--</div></div><div class="list-item"><div><div class="item-title">教育经历</div></div><div data-candidate-detail-edu-detail style="white-space:pre-wrap;">--</div></div><div class="list-item"><div><div class="item-title">工作经历</div></div><div data-candidate-detail-work-history style="white-space:pre-wrap;">--</div></div><div class="list-item"><div><div class="item-title">项目经历</div></div><div data-candidate-detail-project-history style="white-space:pre-wrap;">--</div></div></div>
            </div>
            <div class="panel" style="box-shadow:none;border:1px solid rgba(15,23,42,.08);">
              <h4>薪资与意向</h4>
              <div class="list"><div class="list-item"><div><div class="item-title">期望薪资</div></div><div data-candidate-detail-salary>--</div></div><div class="list-item"><div><div class="item-title">薪资结构</div></div><div data-candidate-detail-salary-structure style="white-space:pre-wrap;">--</div></div><div class="list-item"><div><div class="item-title">到岗周期</div></div><div data-candidate-detail-onboard>--</div></div><div class="list-item"><div><div class="item-title">目前状态</div></div><div data-candidate-detail-job-status>--</div></div><div class="list-item"><div><div class="item-title">求职意向</div></div><div data-candidate-detail-intention>--</div></div><div class="list-item"><div><div class="item-title">核心价值</div></div><div data-candidate-detail-core-value style="white-space:pre-wrap;">--</div></div></div>
            </div>
            <div class="panel" style="box-shadow:none;border:1px solid rgba(15,23,42,.08);">
              <h4>综合评价</h4>
              <div class="list"><div class="list-item"><div><div class="item-title">综合评估</div></div><div data-candidate-detail-evaluation style="white-space:pre-wrap;">--</div></div></div>
            </div>
          </div>
          <div style="display:flex;gap:8px;padding:12px 0;"><button class="btn" data-action="edit-candidate" data-id="" style="margin-right:auto;"><span>&#9998;</span> 编辑</button><button class="btn" data-action="open-detail-note-modal"><span>&#128221;</span> 备注</button><button class="btn" data-action="open-detail-salary-modal"><span>&#128178;</span> 薪资</button><button class="btn" data-action="open-detail-mail-modal"><span>&#9993;</span> 邮件</button></div>
        </div>
      </div>

</body>
</html>
