<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>首页 - AI招聘管理平台</title>
  <link rel="stylesheet" href="../../styles.css" />
  <script defer src="../../frontend-api.js"></script>
  <script defer src="../../app.js"></script>
</head>
<body>
  <div id="app"></div>
  <script>
    window.__PAGE_BODY__ = `
      <section class="dashboard-redesign">
        <section class="dashboard-workbench panel">
          <div class="dashboard-workbench-head">
            <div>
              <div class="eyebrow">首页工作台 · 数据看板</div>
              <h2>把每天推荐节奏、月度转化结果和团队处理压力放在同一屏里。</h2>
              <p>上方看总量，中间看本月每天推荐给客户的候选人数量，底部看月度面试、推荐、入职和反馈结果。</p>
            </div>
            <div class="dashboard-workbench-actions">
              <button class="btn primary" data-action="nav-candidates">进入候选人库</button>
              <button class="btn" data-action="nav-projects">查看项目进度</button>
              <button class="btn warn" data-action="nav-logs">查看待办</button>
            </div>
          </div>
        </section>

        <section class="dashboard-kanban-grid" data-dashboard-top-cards></section>

        <section class="dashboard-calendar-panel panel">
          <div class="dashboard-section-head">
            <div>
              <h3>推荐日历</h3>
              <p class="panel-sub">按推荐交付节奏展示每天推荐给客户的候选人数量。</p>
            </div>
            <div class="dashboard-calendar-toolbar">
              <button class="dashboard-calendar-nav" type="button" data-calendar-nav="-1" aria-label="上一个月">‹</button>
              <div class="dashboard-calendar-month" data-calendar-month-label>--</div>
              <button class="dashboard-calendar-nav" type="button" data-calendar-nav="1" aria-label="下一个月">›</button>
            </div>
          </div>
          <div class="dashboard-calendar-summary" data-calendar-summary></div>
          <div class="dashboard-calendar-board">
            <div class="dashboard-calendar-weekdays" data-calendar-weekdays></div>
            <div class="dashboard-calendar-grid" data-calendar-grid></div>
          </div>
          <div class="dashboard-calendar-detail" data-calendar-detail></div>
        </section>

        <section class="dashboard-month-panel panel">
          <div class="dashboard-section-head">
            <div>
              <h3>月度数据看板</h3>
              <p class="panel-sub">围绕当前展示月份汇总推荐、面试、入职和客户反馈表现。</p>
            </div>
            <div class="dashboard-month-caption" data-month-caption>--</div>
          </div>
          <div class="dashboard-month-grid" data-dashboard-month-cards></div>
        </section>
      </section>
    `;

    const dashboardState = {
      summary: null,
      projects: [],
      todos: [],
      recommendations: [],
      deliveries: [],
      interviews: [],
      employments: [],
      feedbacks: [],
      auditLogs: [],
      calendarMonth: null,
      selectedDayKey: '',
    };

    const WEEKDAY_LABELS = ['日', '一', '二', '三', '四', '五', '六'];

    function parseDateValue(value) {
      if (!value) return null;
      if (value instanceof Date) return Number.isNaN(value.getTime()) ? null : value;
      const normalized = typeof value === 'string' && value.includes(' ') ? value.replace(' ', 'T') : value;
      const date = new Date(normalized);
      return Number.isNaN(date.getTime()) ? null : date;
    }

    function monthStart(date) {
      return new Date(date.getFullYear(), date.getMonth(), 1);
    }

    function addMonths(date, offset) {
      return new Date(date.getFullYear(), date.getMonth() + offset, 1);
    }

    function dayKey(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function formatMonthLabel(date) {
      return `${date.getFullYear()}年${date.getMonth() + 1}月`;
    }

    function formatDayLabel(date) {
      return `${date.getMonth() + 1}月${date.getDate()}日`;
    }

    function sameMonth(left, right) {
      return left.getFullYear() === right.getFullYear() && left.getMonth() === right.getMonth();
    }

    function formatNumber(value) {
      return new Intl.NumberFormat('zh-CN').format(Number(value || 0));
    }

    function getLatestDate(rows, pickers) {
      const dates = rows
        .flatMap((row) => pickers.map((picker) => parseDateValue(row[picker])))
        .filter(Boolean)
        .sort((a, b) => b - a);
      return dates[0] || null;
    }

    function getRecommendationAuditRows() {
      return dashboardState.auditLogs
        .filter((row) => String(row.module || '').includes('推荐') || String(row.action || '').includes('推荐'))
        .map((row) => ({
          date: parseDateValue(row.created_at),
          operator: row.actor || '未署名顾问',
          source: 'audit',
        }))
        .filter((row) => row.date);
    }

    function getCalendarEvents() {
      if (dashboardState.deliveries.length) {
        return dashboardState.deliveries.map((item) => ({
          date: parseDateValue(item.delivered_at),
          operator: item.delivered_by || '未署名顾问',
          source: 'delivery',
        })).filter((item) => item.date);
      }
      if (dashboardState.recommendations.length) {
        return dashboardState.recommendations.map((item) => ({
          date: parseDateValue(item.created_at),
          operator: item.recommender || '未署名顾问',
          source: 'recommendation',
        })).filter((item) => item.date);
      }
      return getRecommendationAuditRows();
    }

    function getMonthRows(rows, picker, monthDate, predicate = null) {
      return rows.filter((row) => {
        const date = parseDateValue(row[picker]);
        if (!date || !sameMonth(date, monthDate)) return false;
        return predicate ? predicate(row) : true;
      });
    }

    function getMonthlyMetrics(monthDate) {
      const monthlyRecommendations = getMonthRows(dashboardState.recommendations, 'created_at', monthDate);
      const monthlyDeliveries = getMonthRows(dashboardState.deliveries, 'delivered_at', monthDate);
      const monthlyInterviews = getMonthRows(dashboardState.interviews, 'created_at', monthDate);
      const monthlyEmployments = getMonthRows(
        dashboardState.employments,
        'created_at',
        monthDate,
        (row) => ['已入职', '已录用'].includes(row.status)
      );
      const monthlyFeedbacks = getMonthRows(dashboardState.feedbacks, 'created_at', monthDate);
      const monthlyCalendarEvents = getCalendarEvents().filter((row) => sameMonth(row.date, monthDate));
      const activeProjects = dashboardState.projects.filter((row) => row.status !== '招聘完毕').length;
      const activeOperators = new Set(monthlyCalendarEvents.map((row) => row.operator || '未署名顾问')).size;
      return {
        monthlyRecommendations,
        monthlyDeliveries,
        monthlyInterviews,
        monthlyEmployments,
        monthlyFeedbacks,
        monthlyCalendarEvents,
        activeProjects,
        activeOperators,
      };
    }

    function renderTopCards() {
      const container = document.querySelector('[data-dashboard-top-cards]');
      if (!container || !dashboardState.summary) return;
      const metrics = getMonthlyMetrics(dashboardState.calendarMonth);
      const cards = [
        {
          title: '求职者总数',
          value: dashboardState.summary.candidate_count,
          note: `本月有 ${metrics.monthlyCalendarEvents.length} 次推荐推进`,
          tone: 'primary',
        },
        {
          title: '客户公司数',
          value: dashboardState.summary.company_count,
          note: `当前有 ${metrics.activeProjects} 个项目在推进`,
          tone: 'success',
        },
        {
          title: '总推荐数',
          value: dashboardState.summary.recommendation_count,
          note: `本月已交付 ${metrics.monthlyDeliveries.length} 次`,
          tone: 'warning',
        },
        {
          title: '待处理需求',
          value: dashboardState.todos.length,
          note: dashboardState.todos.length ? '请优先处理高优先级待办' : '当前待办已清空',
          tone: 'danger',
        },
        {
          title: '总操作员数',
          value: dashboardState.summary.user_count,
          note: `本月活跃顾问 ${metrics.activeOperators} 人`,
          tone: 'neutral',
        },
      ];
      container.innerHTML = cards.map((card) => `
        <article class="dashboard-kanban-card tone-${card.tone}">
          <div class="dashboard-kanban-title">${card.title}</div>
          <div class="dashboard-kanban-body">
            <strong>${formatNumber(card.value)}</strong>
            <span>${card.note}</span>
          </div>
        </article>
      `).join('');
    }

    function renderCalendarWeekdays() {
      const container = document.querySelector('[data-calendar-weekdays]');
      if (!container) return;
      container.innerHTML = WEEKDAY_LABELS.map((label) => `<div>${label}</div>`).join('');
    }

    function buildCalendarCells(monthDate, eventRows) {
      const firstDay = monthStart(monthDate);
      const start = new Date(firstDay);
      start.setDate(firstDay.getDate() - firstDay.getDay());
      const counts = eventRows.reduce((acc, row) => {
        const key = dayKey(row.date);
        acc[key] = acc[key] || { count: 0, operators: new Set() };
        acc[key].count += 1;
        acc[key].operators.add(row.operator);
        return acc;
      }, {});
      const todayKey = dayKey(new Date());
      const cells = [];
      for (let index = 0; index < 42; index += 1) {
        const cellDate = new Date(start);
        cellDate.setDate(start.getDate() + index);
        const key = dayKey(cellDate);
        const stat = counts[key] || { count: 0, operators: new Set() };
        cells.push({
          key,
          date: cellDate,
          inMonth: sameMonth(cellDate, monthDate),
          isToday: key === todayKey,
          isSelected: key === dashboardState.selectedDayKey,
          count: stat.count,
          operatorCount: stat.operators.size,
        });
      }
      return cells;
    }

    function renderCalendar() {
      const monthDate = dashboardState.calendarMonth || monthStart(new Date());
      const events = getCalendarEvents().filter((row) => sameMonth(row.date, monthDate));
      const cells = buildCalendarCells(monthDate, events);
      const monthLabel = document.querySelector('[data-calendar-month-label]');
      if (monthLabel) monthLabel.textContent = formatMonthLabel(monthDate);

      const grid = document.querySelector('[data-calendar-grid]');
      if (grid) {
        grid.innerHTML = cells.map((cell) => `
          <button
            type="button"
            class="dashboard-calendar-cell${cell.inMonth ? '' : ' is-outside'}${cell.isToday ? ' is-today' : ''}${cell.isSelected ? ' is-selected' : ''}"
            data-day-key="${cell.key}"
          >
            <span class="dashboard-calendar-date">${cell.date.getDate()}</span>
            <span class="dashboard-calendar-count">${cell.count ? `${cell.count}条` : '0条'}</span>
          </button>
        `).join('');
      }

      const total = events.length;
      const peak = cells
        .filter((cell) => cell.inMonth)
        .sort((left, right) => right.count - left.count)[0];
      const summary = document.querySelector('[data-calendar-summary]');
      if (summary) {
        summary.innerHTML = `
          <div class="dashboard-summary-chip">
            <strong>${formatNumber(total)}</strong>
            <span>本月累计推荐</span>
          </div>
          <div class="dashboard-summary-chip">
            <strong>${peak && peak.count ? formatDayLabel(peak.date) : '--'}</strong>
            <span>${peak && peak.count ? `单日峰值 ${peak.count} 条` : '暂无推荐峰值'}</span>
          </div>
        `;
      }

      const selectedDate = parseDateValue(dashboardState.selectedDayKey) || monthDate;
      const detailRows = events.filter((item) => dayKey(item.date) === dashboardState.selectedDayKey);
      const detail = document.querySelector('[data-calendar-detail]');
      if (detail) {
        const operatorCount = new Set(detailRows.map((row) => row.operator)).size;
        detail.innerHTML = `
          <div class="dashboard-calendar-detail-copy">
            <div class="dashboard-calendar-detail-title">${dashboardState.selectedDayKey ? formatDayLabel(selectedDate) : `${formatMonthLabel(monthDate)}总览`}</div>
            <div class="dashboard-calendar-detail-meta">
              ${detailRows.length ? `当天推荐 ${detailRows.length} 条，涉及 ${operatorCount} 位顾问` : '当天暂无推荐交付记录'}
            </div>
          </div>
          <div class="dashboard-calendar-detail-tags">
            ${detailRows.slice(0, 4).map((row) => `<span class="dashboard-operator-chip">${row.operator}</span>`).join('') || '<span class="dashboard-operator-chip is-muted">暂无顾问记录</span>'}
          </div>
        `;
      }
    }

    function renderMonthCards() {
      const monthDate = dashboardState.calendarMonth || monthStart(new Date());
      const metrics = getMonthlyMetrics(monthDate);
      const container = document.querySelector('[data-dashboard-month-cards]');
      if (!container) return;
      const cards = [
        {
          title: '本月面试数量',
          value: metrics.monthlyInterviews.length,
          note: `安排面试状态 ${metrics.monthlyRecommendations.filter((row) => row.status === '安排面试').length} 条`,
          tone: 'primary',
        },
        {
          title: '本月推荐数量',
          value: metrics.monthlyRecommendations.length || metrics.monthlyCalendarEvents.length,
          note: metrics.monthlyDeliveries.length ? `已形成 ${metrics.monthlyDeliveries.length} 条交付记录` : '本月暂未形成交付记录',
          tone: 'success',
        },
        {
          title: '本月入职数量',
          value: metrics.monthlyEmployments.length,
          note: metrics.monthlyEmployments.length ? '已录用 / 已入职记录已纳入统计' : '本月暂无入职转化',
          tone: 'warning',
        },
        {
          title: '本月客户反馈',
          value: metrics.monthlyFeedbacks.length,
          note: metrics.monthlyFeedbacks.length ? '客户反馈记录已沉淀到推荐链路' : '本月暂无客户反馈记录',
          tone: 'danger',
        },
      ];
      container.innerHTML = cards.map((card) => `
        <article class="dashboard-month-card tone-${card.tone}">
          <div class="dashboard-month-card-label">${card.title}</div>
          <div class="dashboard-month-card-value">${formatNumber(card.value)}</div>
          <div class="dashboard-month-card-note">${card.note}</div>
        </article>
      `).join('');

      const caption = document.querySelector('[data-month-caption]');
      if (caption) caption.textContent = formatMonthLabel(monthDate);
    }

    function ensureSelectedDay() {
      const monthDate = dashboardState.calendarMonth;
      const events = getCalendarEvents().filter((row) => sameMonth(row.date, monthDate));
      const availableKeys = [...new Set(events.map((row) => dayKey(row.date)))].sort();
      if (availableKeys.includes(dashboardState.selectedDayKey)) return;
      const today = new Date();
      const todayKey = dayKey(today);
      dashboardState.selectedDayKey =
        (sameMonth(today, monthDate) && availableKeys.includes(todayKey) && todayKey) ||
        availableKeys[availableKeys.length - 1] ||
        dayKey(monthDate);
    }

    function bindCalendarEvents() {
      document.addEventListener('click', (event) => {
        const navButton = event.target.closest('[data-calendar-nav]');
        if (navButton) {
          dashboardState.calendarMonth = addMonths(dashboardState.calendarMonth, Number(navButton.dataset.calendarNav || 0));
          ensureSelectedDay();
          renderTopCards();
          renderCalendar();
          renderMonthCards();
          return;
        }
        const dayButton = event.target.closest('[data-day-key]');
        if (!dayButton) return;
        dashboardState.selectedDayKey = dayButton.dataset.dayKey || dashboardState.selectedDayKey;
        renderCalendar();
      });
    }

    async function loadDashboardData() {
      const requests = await Promise.allSettled([
        window.hrApi.dashboardSummary(),
        window.hrApi.projects(),
        window.hrApi.dashboardTodos(),
        window.hrApi.recommendations(),
        window.hrApi.deliveries(),
        window.hrApi.interviewRecords(),
        window.hrApi.employmentRecords(),
        window.hrApi.recommendationFeedbacks(),
        window.hrApi.auditLogs(),
      ]);
      const [
        summaryResult,
        projectsResult,
        todosResult,
        recommendationsResult,
        deliveriesResult,
        interviewsResult,
        employmentsResult,
        feedbacksResult,
        auditLogsResult,
      ] = requests;

      dashboardState.summary = summaryResult.status === 'fulfilled' ? summaryResult.value : {
        candidate_count: 0,
        company_count: 0,
        recommendation_count: 0,
        user_count: 0,
      };
      dashboardState.projects = projectsResult.status === 'fulfilled' ? projectsResult.value : [];
      dashboardState.todos = todosResult.status === 'fulfilled' ? todosResult.value : [];
      dashboardState.recommendations = recommendationsResult.status === 'fulfilled' ? recommendationsResult.value : [];
      dashboardState.deliveries = deliveriesResult.status === 'fulfilled' ? deliveriesResult.value : [];
      dashboardState.interviews = interviewsResult.status === 'fulfilled' ? interviewsResult.value : [];
      dashboardState.employments = employmentsResult.status === 'fulfilled' ? employmentsResult.value : [];
      dashboardState.feedbacks = feedbacksResult.status === 'fulfilled' ? feedbacksResult.value : [];
      dashboardState.auditLogs = auditLogsResult.status === 'fulfilled' ? auditLogsResult.value : [];

      const latestActivity =
        getLatestDate(getCalendarEvents(), ['date']) ||
        getLatestDate(dashboardState.interviews, ['created_at']) ||
        getLatestDate(dashboardState.employments, ['created_at']) ||
        new Date();

      dashboardState.calendarMonth = monthStart(latestActivity);
      ensureSelectedDay();
    }

    window.addEventListener('DOMContentLoaded', async () => {
      await renderApp();
      renderCalendarWeekdays();
      bindCalendarEvents();
      try {
        await loadDashboardData();
        renderTopCards();
        renderCalendar();
        renderMonthCards();
      } catch (error) {
        console.warn('dashboard load failed', error);
      }
    });
  </script>
</body>
</html>
