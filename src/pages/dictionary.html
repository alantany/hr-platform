<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>标签字典</title>
  <link rel="stylesheet" href="../../styles.css" />
  <script defer src="../../frontend-api.js"></script>
  <script defer src="../../app.js?v=20260629-tag-fields"></script>
</head>
<body>
  <div id="app"></div>
  <script>
    window.__PAGE_BODY__ = `
      <section class="tag-dictionary-page">
        <section class="tag-dictionary-warning">
          <span>⚠</span>
          <div>标签管理现在维护的是“对象字段 -> 标签展示”配置。对象命中字段值后，会在候选人、岗位、项目和客户页面实时显示对应标签。</div>
        </section>

        <nav class="tag-dictionary-tabs" data-tag-tabs></nav>

        <section class="tag-dictionary-panel panel">
          <div class="tag-dictionary-card-head">
            <div>
              <h3 data-tag-panel-title>候选人字段标签</h3>
              <div class="section-sub">启用后，字段值会按排序实时显示为标签；标签样式来自这里的统一配置。</div>
            </div>
            <button class="tag-dictionary-add-btn" type="button" data-action="open-tag-config-modal">新增字段配置</button>
          </div>
          <div class="tag-dictionary-toolbar">
            <div class="field-group">
              <label>筛选字段</label>
              <input class="input" data-tag-filter-keyword placeholder="搜索字段名 / 展示名..." />
            </div>
            <div class="field-group">
              <label>状态</label>
              <select class="input" data-tag-filter-enabled>
                <option value="">全部状态</option>
                <option value="true">仅启用</option>
                <option value="false">仅停用</option>
              </select>
            </div>
          </div>
          <div class="tag-dictionary-config-table">
            <div class="tag-dictionary-config-row is-head">
              <div>字段展示名</div>
              <div>数据库字段</div>
              <div>样式</div>
              <div>排序</div>
              <div>预览</div>
              <div>状态</div>
              <div>操作</div>
            </div>
            <div data-tag-config-list></div>
          </div>
        </section>
      </section>

      <div class="modal" data-tag-config-modal style="display:none; position:fixed; inset:0; background:rgba(14,22,34,.45); z-index:2000; padding:24px;">
        <div class="panel" style="max-width:860px; margin:8vh auto 0; background:#fff;">
          <div class="section-head">
            <div>
              <h3 data-tag-config-modal-title>新增字段标签配置</h3>
              <div class="section-sub">只允许从预设字段池中选择字段；标签文案直接显示字段值本身。</div>
            </div>
            <div class="hero-actions" style="margin-top:0;">
              <button class="btn" type="button" data-action="close-tag-config-modal">取消</button>
              <button class="btn primary" type="button" data-action="save-tag-config">保存配置</button>
            </div>
          </div>
          <div class="grid-2">
            <div class="list">
              <div class="list-item">
                <div class="item-top">
                  <div>
                    <div class="item-title">对象类型</div>
                    <div class="item-meta">标签所属业务对象</div>
                  </div>
                </div>
                <select class="input" data-tag-object-type></select>
              </div>
              <div class="list-item">
                <div class="item-top">
                  <div>
                    <div class="item-title">字段</div>
                    <div class="item-meta">从当前对象允许的字段池中选择</div>
                  </div>
                </div>
                <select class="input" data-tag-field-key></select>
              </div>
              <div class="list-item">
                <div class="item-top">
                  <div>
                    <div class="item-title">后台展示名</div>
                    <div class="item-meta">用于标签管理页识别字段维度</div>
                  </div>
                </div>
                <input class="input" data-tag-field-label />
              </div>
            </div>
            <div class="list">
              <div class="list-item">
                <div class="item-top">
                  <div>
                    <div class="item-title">样式键</div>
                    <div class="item-meta">仅允许统一蓝灰体系内的受控样式</div>
                  </div>
                </div>
                <select class="input" data-tag-style-key></select>
              </div>
              <div class="list-item">
                <div class="item-top">
                  <div>
                    <div class="item-title">排序</div>
                    <div class="item-meta">数值越小越靠前</div>
                  </div>
                </div>
                <input class="input" data-tag-sort-order type="number" min="0" step="10" />
              </div>
              <div class="list-item">
                <div class="item-top">
                  <div>
                    <div class="item-title">启用状态</div>
                    <div class="item-meta">关闭后全站不再显示该字段标签</div>
                  </div>
                </div>
                <select class="input" data-tag-enabled>
                  <option value="true">启用</option>
                  <option value="false">停用</option>
                </select>
              </div>
            </div>
          </div>
          <div class="panel tag-config-preview-card">
            <div class="section-head" style="margin-bottom:12px;">
              <div>
                <h3>样式预览</h3>
                <div class="section-sub">预览只展示样式，不影响标签文案直接取字段值的规则。</div>
              </div>
            </div>
            <div data-tag-config-preview></div>
          </div>
        </div>
      </div>
    `;

    const OBJECT_TYPES = [
      { key: 'candidate', label: '候选人' },
      { key: 'position', label: '岗位' },
      { key: 'project', label: '项目' },
      { key: 'company', label: '客户' },
    ];

    const FIELD_OPTIONS = {
      candidate: [
        { key: 'education', label: '学历' },
        { key: 'job_status', label: '求职状态' },
        { key: 'experience_years', label: '工作年限' },
        { key: 'expected_salary', label: '期望薪资' },
        { key: 'onboard_cycle', label: '到岗周期' },
        { key: 'gender', label: '性别' },
        { key: 'city', label: '所在城市' },
        { key: 'current_title', label: '当前职位' },
        { key: 'status', label: '锁定状态' },
        { key: 'delivery_status', label: '推荐进度' },
        { key: 'candidate_warranty_status', label: '质保状态' },
        { key: 'source', label: '来源' },
        { key: 'hukou_location', label: '户口所在地' },
        { key: 'family_status', label: '家庭情况' },
        { key: 'birth_date', label: '出生日期' },
        { key: 'certificates', label: '证书' },
      ],
      position: [
        { key: 'urgency', label: '紧急程度' },
        { key: 'location', label: '工作地点' },
        { key: 'education_requirement', label: '学历要求' },
        { key: 'experience_requirement', label: '经验要求' },
        { key: 'age_requirement', label: '年龄要求' },
        { key: 'status', label: '岗位状态' },
        { key: 'hiring_count', label: '招聘人数' },
      ],
      project: [
        { key: 'status', label: '项目状态' },
        { key: 'level', label: '项目等级' },
        { key: 'work_location', label: '工作地点' },
        { key: 'project_period', label: '项目周期' },
        { key: 'hiring_count', label: '招聘人数' },
      ],
      company: [
        { key: 'status', label: '客户状态' },
        { key: 'cooperation_period', label: '合作周期' },
        { key: 'address', label: '详细地址' },
      ],
    };

    const STYLE_OPTIONS = [
      { key: 'neutral', label: '默认灰', sample: '本科' },
      { key: 'primary-soft', label: '浅蓝强调', sample: '招聘中' },
      { key: 'subtle-outline', label: '浅边框', sample: '上海' },
      { key: 'muted', label: '柔和灰', sample: '1周内' },
    ];

    const state = {
      activeTab: 'candidate',
      rows: [],
      editingId: null,
    };

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function getObjectLabel(objectType) {
      return OBJECT_TYPES.find((item) => item.key === objectType)?.label || objectType;
    }

    function getFieldOptions(objectType) {
      return FIELD_OPTIONS[objectType] || [];
    }

    function getFieldLabel(objectType, fieldKey) {
      return getFieldOptions(objectType).find((item) => item.key === fieldKey)?.label || fieldKey;
    }

    function renderPreviewTag(styleKey, text) {
      const toneMap = {
        neutral: 'tag-slate',
        'primary-soft': 'tag-blue',
        'subtle-outline': 'tag-outline',
        muted: 'tag-muted',
      };
      return `<span class="tag ${toneMap[styleKey] || 'tag-slate'}">${escapeHtml(text)}</span>`;
    }

    function getFilteredRows() {
      const keyword = document.querySelector('[data-tag-filter-keyword]')?.value?.trim().toLowerCase() || '';
      const enabled = document.querySelector('[data-tag-filter-enabled]')?.value || '';
      return state.rows
        .filter((row) => row.object_type === state.activeTab)
        .filter((row) => {
          if (!keyword) return true;
          return [row.field_label, row.field_key].join(' ').toLowerCase().includes(keyword);
        })
        .filter((row) => {
          if (enabled === '') return true;
          return String(Boolean(row.enabled)) === enabled;
        })
        .sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0) || a.id - b.id);
    }

    function renderTabs() {
      const host = document.querySelector('[data-tag-tabs]');
      if (!host) return;
      host.innerHTML = OBJECT_TYPES.map((item) => `
        <button type="button" class="tag-dictionary-tab${state.activeTab === item.key ? ' is-active' : ''}" data-tag-tab="${item.key}">
          ${escapeHtml(item.label)}字段标签
        </button>
      `).join('');
    }

    function renderRows() {
      const title = document.querySelector('[data-tag-panel-title]');
      const list = document.querySelector('[data-tag-config-list]');
      if (title) {
        title.textContent = `${getObjectLabel(state.activeTab)}字段标签`;
      }
      if (!list) return;
      const rows = getFilteredRows();
      if (!rows.length) {
        list.innerHTML = '<div class="tag-dictionary-config-empty">当前筛选下暂无字段配置。</div>';
        return;
      }
      list.innerHTML = rows.map((row) => `
        <div class="tag-dictionary-config-row">
          <div>
            <div class="tag-dictionary-dimension-name">${escapeHtml(row.field_label)}</div>
            <div class="item-meta">${escapeHtml(getObjectLabel(row.object_type))}</div>
          </div>
          <div class="field-tag-meta mono">${escapeHtml(row.field_key)}</div>
          <div>${escapeHtml(STYLE_OPTIONS.find((item) => item.key === row.style_key)?.label || row.style_key)}</div>
          <div>${escapeHtml(row.sort_order)}</div>
          <div>${renderPreviewTag(row.style_key, STYLE_OPTIONS.find((item) => item.key === row.style_key)?.sample || row.field_label)}</div>
          <div><span class="chip ${row.enabled ? 'success' : 'neutral'}">${row.enabled ? '启用' : '停用'}</span></div>
          <div class="tag-dictionary-config-actions">
            <button type="button" class="tag-dictionary-link" data-tag-edit="${row.id}">编辑</button>
            <button type="button" class="tag-dictionary-link" data-tag-toggle="${row.id}">${row.enabled ? '停用' : '启用'}</button>
            <button type="button" class="tag-dictionary-link is-danger" data-tag-delete="${row.id}">删除</button>
          </div>
        </div>
      `).join('');
    }

    function renderAll() {
      renderTabs();
      renderRows();
    }

    function fillObjectTypeOptions() {
      const select = document.querySelector('[data-tag-object-type]');
      if (!select) return;
      select.innerHTML = OBJECT_TYPES.map((item) => `<option value="${item.key}">${escapeHtml(item.label)}</option>`).join('');
    }

    function fillStyleOptions() {
      const select = document.querySelector('[data-tag-style-key]');
      if (!select) return;
      select.innerHTML = STYLE_OPTIONS.map((item) => `<option value="${item.key}">${escapeHtml(item.label)}</option>`).join('');
    }

    function syncFieldOptions(preferredFieldKey = '') {
      const objectType = document.querySelector('[data-tag-object-type]')?.value || 'candidate';
      const select = document.querySelector('[data-tag-field-key]');
      if (!select) return;
      const options = getFieldOptions(objectType);
      select.innerHTML = options.map((item) => `<option value="${item.key}">${escapeHtml(item.label)}（${escapeHtml(item.key)}）</option>`).join('');
      select.value = preferredFieldKey && options.some((item) => item.key === preferredFieldKey) ? preferredFieldKey : (options[0]?.key || '');
      syncFieldLabel();
    }

    function syncFieldLabel(force = false) {
      const objectType = document.querySelector('[data-tag-object-type]')?.value || 'candidate';
      const fieldKey = document.querySelector('[data-tag-field-key]')?.value || '';
      const input = document.querySelector('[data-tag-field-label]');
      if (!input) return;
      if (force || !input.value.trim()) {
        input.value = getFieldLabel(objectType, fieldKey);
      }
      renderModalPreview();
    }

    function renderModalPreview() {
      const preview = document.querySelector('[data-tag-config-preview]');
      if (!preview) return;
      const styleKey = document.querySelector('[data-tag-style-key]')?.value || 'neutral';
      const fieldLabel = document.querySelector('[data-tag-field-label]')?.value?.trim() || '字段标签';
      preview.innerHTML = `
        <div class="field-tag-stack">
          <div class="field-tag-group">
            <span class="field-tag-caption">${escapeHtml(fieldLabel)} 命中后的展示效果</span>
            <div class="field-tag-list">${renderPreviewTag(styleKey, STYLE_OPTIONS.find((item) => item.key === styleKey)?.sample || fieldLabel)}</div>
          </div>
        </div>
      `;
    }

    function openModal(row = null) {
      state.editingId = row?.id || null;
      const modal = document.querySelector('[data-tag-config-modal]');
      const title = document.querySelector('[data-tag-config-modal-title]');
      if (title) title.textContent = row ? '编辑字段标签配置' : '新增字段标签配置';
      fillObjectTypeOptions();
      fillStyleOptions();
      document.querySelector('[data-tag-object-type]').value = row?.object_type || state.activeTab;
      syncFieldOptions(row?.field_key || '');
      document.querySelector('[data-tag-field-label]').value = row?.field_label || getFieldLabel(row?.object_type || state.activeTab, row?.field_key || getFieldOptions(state.activeTab)[0]?.key || '');
      document.querySelector('[data-tag-style-key]').value = row?.style_key || 'neutral';
      document.querySelector('[data-tag-sort-order]').value = String(row?.sort_order ?? 0);
      document.querySelector('[data-tag-enabled]').value = String(row?.enabled ?? true);
      renderModalPreview();
      if (modal) modal.style.display = 'block';
    }

    function closeModal() {
      state.editingId = null;
      const modal = document.querySelector('[data-tag-config-modal]');
      if (modal) modal.style.display = 'none';
    }

    async function loadRows() {
      state.rows = await window.hrApi.tags();
      renderAll();
    }

    async function saveConfig() {
      const objectType = document.querySelector('[data-tag-object-type]')?.value || 'candidate';
      const fieldKey = document.querySelector('[data-tag-field-key]')?.value || '';
      const fieldLabel = document.querySelector('[data-tag-field-label]')?.value?.trim() || '';
      const styleKey = document.querySelector('[data-tag-style-key]')?.value || 'neutral';
      const sortOrder = Number(document.querySelector('[data-tag-sort-order]')?.value || 0);
      const enabled = document.querySelector('[data-tag-enabled]')?.value !== 'false';

      if (!fieldKey || !fieldLabel) {
        throw new Error('请先选择字段并填写展示名');
      }

      const duplicated = state.rows.find((item) => item.object_type === objectType && item.field_key === fieldKey && item.id !== state.editingId);
      if (duplicated) {
        throw new Error('同一对象下的字段配置不能重复');
      }

      const payload = {
        object_type: objectType,
        field_key: fieldKey,
        field_label: fieldLabel,
        style_key: styleKey,
        sort_order: sortOrder,
        enabled,
      };

      if (state.editingId) {
        await window.hrApi.updateTag(state.editingId, payload);
      } else {
        await window.hrApi.createTag(payload);
      }
      window.hrTagSystem?.invalidate?.();
      closeModal();
      await loadRows();
    }

    document.addEventListener('click', async (event) => {
      const tab = event.target.closest('[data-tag-tab]');
      if (tab) {
        state.activeTab = tab.dataset.tagTab;
        renderAll();
        return;
      }
      if (event.target.closest('[data-action="open-tag-config-modal"]')) {
        openModal();
        return;
      }
      if (event.target.closest('[data-action="close-tag-config-modal"]')) {
        closeModal();
        return;
      }
      if (event.target.closest('[data-action="save-tag-config"]')) {
        try {
          await saveConfig();
          window.showToast?.('标签字段配置已保存');
        } catch (error) {
          window.showToast?.(error.message || '保存失败');
        }
        return;
      }
      const editBtn = event.target.closest('[data-tag-edit]');
      if (editBtn) {
        const row = state.rows.find((item) => item.id === Number(editBtn.dataset.tagEdit));
        openModal(row);
        return;
      }
      const toggleBtn = event.target.closest('[data-tag-toggle]');
      if (toggleBtn) {
        const row = state.rows.find((item) => item.id === Number(toggleBtn.dataset.tagToggle));
        if (!row) return;
        await window.hrApi.updateTag(row.id, { enabled: !row.enabled });
        window.hrTagSystem?.invalidate?.();
        await loadRows();
        window.showToast?.(`已${row.enabled ? '停用' : '启用'}字段标签`);
        return;
      }
      const deleteBtn = event.target.closest('[data-tag-delete]');
      if (deleteBtn) {
        const row = state.rows.find((item) => item.id === Number(deleteBtn.dataset.tagDelete));
        if (!row) return;
        if (!window.confirm(`确认删除字段标签配置「${row.field_label}」吗？`)) return;
        await window.hrApi.deleteTag(row.id);
        window.hrTagSystem?.invalidate?.();
        await loadRows();
        window.showToast?.('字段标签配置已删除');
      }
    });

    document.addEventListener('input', (event) => {
      if (event.target.matches('[data-tag-filter-keyword], [data-tag-filter-enabled]')) {
        renderRows();
        return;
      }
      if (event.target.matches('[data-tag-field-label], [data-tag-style-key], [data-tag-sort-order]')) {
        renderModalPreview();
      }
    });

    document.addEventListener('change', (event) => {
      if (event.target.matches('[data-tag-object-type]')) {
        syncFieldOptions();
        return;
      }
      if (event.target.matches('[data-tag-field-key]')) {
        syncFieldLabel(true);
      }
      if (event.target.matches('[data-tag-style-key], [data-tag-enabled]')) {
        renderModalPreview();
      }
    });

    window.addEventListener('DOMContentLoaded', async () => {
      await renderApp();
      try {
        fillObjectTypeOptions();
        fillStyleOptions();
        await loadRows();
      } catch (error) {
        console.warn(error);
        const list = document.querySelector('[data-tag-config-list]');
        if (list) {
          list.innerHTML = `<div class="tag-dictionary-config-empty">加载失败：${escapeHtml(error.message || '未知错误')}</div>`;
        }
      }
    });
  </script>
</body>
</html>
