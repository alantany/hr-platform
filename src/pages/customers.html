    window.addEventListener('DOMContentLoaded', async () => {
      await renderApp();
      try {
        const [companies, projects] = await Promise.all([window.hrApi.companies(), window.hrApi.projects()]);
        const deliveries = await window.hrApi.deliveries();
        document.querySelector('[data-company-total]').textContent = String(companies.length);
        document.querySelector('[data-company-projects]').textContent = String(projects.filter(project => project.status === '招聘中').length);
        document.querySelector('[data-company-delivery]').textContent = String(deliveries.length);
        document.querySelector('[data-company-positions]').textContent = String(companies.reduce((sum, company) => sum + (company.position_count || 0), 0));
        const list = document.querySelector('[data-company-list]');
        if (list) {
          list.innerHTML = window.hrRenderCompanyTree
            ? window.hrRenderCompanyTree(companies, new Map(), new Map(), new Map())
            : (window.hrRenderCompanyList ? window.hrRenderCompanyList(companies) : '');
        }
      } catch (err) {
        console.warn(err);
      }
    });
