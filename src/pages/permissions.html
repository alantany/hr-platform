<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>权限管理</title>
  <link rel="stylesheet" href="../../styles.css" />
  <script defer src="../../frontend-api.js"></script>
  <script defer src="../../app.js"></script>
</head>
<body>
  <div id="app"></div>
  <script>
    window.__PAGE_BODY__ = `
      <section class="admin-manage-page">
        <section class="admin-note-banner">
          <span>📍</span>
          <div>权限控制模型：用户 → 角色 → 功能权限（菜单/操作按钮）｜数据权限（公司 → 项目 → 岗位）</div>
        </section>

        <nav class="admin-tabbar" data-permission-page-tabs>
          <button type="button" class="admin-tabbar-btn is-active" data-permission-tab="function">功能权限</button>
          <button type="button" class="admin-tabbar-btn" data-permission-tab="data">数据权限</button>
        </nav>

        <section class="admin-table-panel panel" data-permission-function-panel>
          <div class="admin-panel-head">
            <h3>功能权限矩阵</h3>
            <button class="admin-primary-btn admin-primary-btn--small" type="button" data-permission-page-open-modal style="display:none;">+ 添加权限</button>
          </div>
          <div class="admin-table-shell">
            <div class="admin-table-head admin-permission-grid">
              <div>权限名称</div>
              <div>类型</div>
              <div>所属模块</div>
              <div>关联角色</div>
              <div>操作</div>
            </div>
            <div data-permission-function-body></div>
          </div>
        </section>

        <section class="admin-table-panel panel" data-permission-data-panel style="display:none;">
          <div class="admin-panel-head">
            <h3>数据权限规则</h3>
          </div>
          <div class="admin-table-shell">
            <div class="admin-table-head admin-permission-data-grid">
              <div>角色</div>
              <div>数据范围</div>
              <div>粒度</div>
              <div>说明</div>
            </div>
            <div data-permission-data-body></div>
          </div>
        </section>
      </section>

      <div class="modal" data-permission-page-modal style="display:none; position:fixed; inset:0; background:rgba(14,22,34,.45); z-index:2000; padding:24px;">
        <div class="panel admin-edit-modal">
          <div class="section-head">
            <div><h3>保存功能权限</h3><div class="section-sub">保存到真实角色权限表。</div></div>
            <div class="hero-actions" style="margin-top:0">
              <button class="btn" type="button" data-permission-page-close-modal>取消</button>
              <button class="btn primary" type="button" data-permission-page-save-modal>确认保存</button>
            </div>
          </div>
          <div class="grid-2">
            <div class="panel admin-edit-card">
              <div class="list">
                <div class="list-item"><div class="item-top"><div><div class="item-title">关联角色</div><div class="item-meta">勾选拥有该权限的角色</div></div></div><div class="admin-checkbox-group" data-permission-form-roles-container style="display:flex; flex-direction:column; gap:8px; margin-top:8px; padding-left:4px;"></div></div>
                <div class="list-item">
                  <div class="item-top"><div><div class="item-title">功能权限选项</div><div class="item-meta">选择系统内置功能，或选择自定义输入</div></div></div>
                  <select class="input" data-permission-form-key-select>
                    <option value="page:dashboard" data-type="menu" data-module="主要功能">首页 (page:dashboard)</option>
                    <option value="page:candidates" data-type="menu" data-module="主要功能">求职者数据池 (page:candidates)</option>
                    <option value="page:import" data-type="menu" data-module="主要功能">简历导入 (page:import)</option>
                    <option value="page:customers" data-type="menu" data-module="主要功能">客户管理 (page:customers)</option>
                    <option value="page:projects" data-type="menu" data-module="主要功能">项目管理 (page:projects)</option>
                    <option value="page:positions" data-type="menu" data-module="主要功能">岗位管理 (page:positions)</option>
                    <option value="page:recruit-job-publish" data-type="menu" data-module="岗位管理">岗位发布 (page:recruit-job-publish)</option>
                    <option value="page:recruit-job-list" data-type="menu" data-module="岗位管理">岗位列表 (page:recruit-job-list)</option>
                    <option value="page:recruit-daily-tasks" data-type="menu" data-module="岗位管理">每日任务 (page:recruit-daily-tasks)</option>
                    <option value="page:evaluations" data-type="menu" data-module="主要功能">评价体系 (page:evaluations)</option>
                    <option value="page:statistics" data-type="menu" data-module="主要功能">统计管理 (page:statistics)</option>
                    <option value="page:dictionary" data-type="menu" data-module="系统设置">标签字典 (page:dictionary)</option>
                    <option value="page:users" data-type="menu" data-module="系统设置">用户管理 (page:users)</option>
                    <option value="page:roles" data-type="menu" data-module="系统设置">角色管理 (page:roles)</option>
                    <option value="page:permissions" data-type="menu" data-module="系统设置">权限管理 (page:permissions)</option>
                    <option value="page:data-permissions" data-type="menu" data-module="系统设置">数据权限 (page:data-permissions)</option>
                    <option value="page:warranty" data-type="menu" data-module="系统设置">质保期管理 (page:warranty)</option>
                    <option value="page:logs" data-type="menu" data-module="系统设置">操作日志 (page:logs)</option>
                    <option value="page:ui-kit" data-type="menu" data-module="开发工具">UI 样板 (page:ui-kit)</option>
                    <option value="page:notifications" data-type="menu" data-module="主要功能">通知提醒 (page:notifications)</option>
                    <option value="all" data-type="menu" data-module="系统">全部功能 (all)</option>
                    <option value="action:create-company" data-type="action" data-module="客户管理">创建客户公司 (action:create-company)</option>
                    <option value="action:assign-operator" data-type="action" data-module="系统设置">分配操作员权限 (action:assign-operator)</option>
                    <option value="custom" data-type="" data-module="">✏️ 自定义手动输入...</option>
                  </select>
                  <input class="input" data-permission-form-key style="display:none; margin-top:8px;" placeholder="请输入自定义权限标识，如 action:test" />
                </div>
                <div class="list-item"><div class="item-top"><div><div class="item-title">权限类型</div><div class="item-meta">菜单、按钮或操作</div></div></div><select class="input" data-permission-form-type><option value="menu">菜单</option><option value="button">按钮</option><option value="action">操作</option></select></div>
                <div class="list-item"><div class="item-top"><div><div class="item-title">所属模块</div><div class="item-meta">例如 系统设置 / 求职者 / 客户管理</div></div></div><input class="input" data-permission-form-module /></div>
                <div class="list-item"><div class="item-top"><div><div class="item-title">启用状态</div><div class="item-meta">控制当前权限是否生效</div></div></div><select class="input" data-permission-form-enabled><option value="true">启用</option><option value="false">停用</option></select></div>
              </div>
            </div>
            <div class="panel admin-edit-card">
              <h3>当前说明</h3>
              <div class="list">
                <div class="list-item"><div class="item-meta">功能权限页展示的数据全部来自 role_permissions 表，并按角色真实关联显示。</div></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    `;

    const permissionPageState = {
      tab: 'function',
      roles: [],
      permissions: [],
      users: [],
      dataPermissions: [],
      editingPermission: null,
    };

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (char) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[char]));
    }

    function getRoleName(roleCode) {
      return permissionPageState.roles.find((item) => item.code === roleCode)?.name || roleCode;
    }

    function getRoleTone(roleCodeOrName) {
      const text = String(roleCodeOrName || '');
      if (text.includes('ADMIN') || text.includes('超级')) return 'tone-pink';
      if (text.includes('LEADER') || text.includes('组长')) return 'tone-orange';
      return 'tone-violet';
    }

    function getPermissionTone(type) {
      if (type === 'menu') return 'tone-violet';
      if (type === 'button') return 'tone-softviolet';
      return 'tone-orange';
    }

    function formatPermissionType(type) {
      return ({ menu: '菜单', button: '按钮', action: '操作' }[type] || type || '—');
    }

    function prettyPermissionName(key) {
      if (!key) return '未命名权限';
      const nameMap = {
        'page:dashboard': '首页',
        'page:candidates': '求职者数据池',
        'page:import': '简历导入',
        'page:customers': '客户管理',
        'page:projects': '项目管理',
        'page:recruit-job-publish': '岗位发布',
        'page:recruit-job-list': '岗位列表',
        'page:recruit-daily-tasks': '每日任务',
        'page:positions': '岗位管理',
        'page:evaluations': '评价体系',
        'page:statistics': '统计管理',
        'page:dictionary': '标签字典',
        'page:users': '用户管理',
        'page:roles': '角色管理',
        'page:permissions': '权限管理',
        'page:data-permissions': '数据权限',
        'page:warranty': '质保期管理',
        'page:logs': '操作日志',
        'page:ai-center': 'UI 样板',
        'page:ui-kit': 'UI 样板',
        'page:notifications': '通知提醒',
        'all': '全部功能',
        'action:create-company': '创建客户公司',
        'action:assign-operator': '分配操作员权限',
      };
      if (nameMap[key]) return nameMap[key];
      const raw = key.split(':').slice(1).join(':') || key;
      return raw.replace(/[-_]/g, ' ').replace(/\b\w/g, (char) => char.toUpperCase());
    }

    function renderPermissionRoleCheckboxes(activeRoles = []) {
      const container = document.querySelector('[data-permission-form-roles-container]');
      if (!container) return;
      container.innerHTML = permissionPageState.roles.map((role) => {
        const isChecked = activeRoles.includes(role.code) ? 'checked' : '';
        return `
          <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
            <input type="checkbox" name="role_codes" value="${escapeHtml(role.code)}" ${isChecked} style="width:16px; height:16px; margin:0;" />
            <span>${escapeHtml(role.name)} / ${escapeHtml(role.code)}</span>
          </label>
        `;
      }).join('');
    }

    function openPermissionModal(permission = null) {
      permissionPageState.editingPermission = permission;
      let activeRoles = [];
      if (permission) {
        activeRoles = permissionPageState.permissions
          .filter((item) =>
            item.permission_key === permission.permission_key &&
            (item.module || '') === (permission.module || '') &&
            (item.permission_type || '') === (permission.permission_type || '')
          )
          .map((item) => item.role_code);
      } else {
        const defaultRole = new URLSearchParams(location.search).get('role_code');
        if (defaultRole) activeRoles.push(defaultRole);
      }
      renderPermissionRoleCheckboxes(activeRoles);
      
      const key = permission?.permission_key || '';
      const select = document.querySelector('[data-permission-form-key-select]');
      const input = document.querySelector('[data-permission-form-key]');
      
      let hasOption = false;
      if (select) {
        for (let option of select.options) {
          if (option.value === key) {
            hasOption = true;
            break;
          }
        }
        if (key && hasOption) {
          select.value = key;
          input.value = key;
          input.style.display = 'none';
        } else if (!key) {
          select.value = select.options[0]?.value || '';
          input.value = select.value;
          input.style.display = 'none';
          const opt = select.options[select.selectedIndex];
          if (opt && opt.value !== 'custom') {
            document.querySelector('[data-permission-form-type]').value = opt.dataset.type || 'menu';
            document.querySelector('[data-permission-form-module]').value = opt.dataset.module || '';
          }
        } else {
          select.value = 'custom';
          input.value = key;
          input.style.display = 'block';
        }
      }

      document.querySelector('[data-permission-form-type]').value = permission?.permission_type || (select && select.value !== 'custom' ? select.options[select.selectedIndex]?.dataset.type : 'menu') || 'menu';
      document.querySelector('[data-permission-form-module]').value = permission?.module || (select && select.value !== 'custom' ? select.options[select.selectedIndex]?.dataset.module : '') || '';
      document.querySelector('[data-permission-form-enabled]').value = String(permission?.enabled ?? true);
      document.querySelector('[data-permission-page-modal]').style.display = 'block';
    }

    function closePermissionModal() {
      document.querySelector('[data-permission-page-modal]').style.display = 'none';
    }

    function aggregatePermissionRows() {
      const grouped = new Map();
      permissionPageState.permissions.forEach((item) => {
        const key = `${item.permission_key}__${item.permission_type}__${item.module}`;
        if (!grouped.has(key)) grouped.set(key, { ...item, roles: [] });
        grouped.get(key).roles.push(item.role_code);
      });
      return Array.from(grouped.values()).sort((a, b) => String(a.module || a.permission_key).localeCompare(String(b.module || b.permission_key), 'zh-CN'));
    }

    function renderFunctionPermissions() {
      const body = document.querySelector('[data-permission-function-body]');
      if (!body) return;
      body.innerHTML = aggregatePermissionRows().map((item) => `
        <div class="admin-table-row admin-permission-grid">
          <div>${escapeHtml(prettyPermissionName(item.permission_key))}</div>
          <div><span class="admin-pill ${getPermissionTone(item.permission_type)}">${escapeHtml(formatPermissionType(item.permission_type))}</span></div>
          <div>${escapeHtml(item.module || '未分组')}</div>
          <div>${item.roles.map((roleCode) => `<span class="admin-mini-chip ${getRoleTone(roleCode)}">${escapeHtml(getRoleName(roleCode))}</span>`).join(' ')}</div>
          <div class="admin-inline-actions"><button type="button" class="admin-text-link" data-permission-page-edit="${escapeHtml(item.permission_key)}" data-permission-page-module="${escapeHtml(item.module || '')}" data-permission-page-type="${escapeHtml(item.permission_type || '')}">编辑</button></div>
        </div>
      `).join('') || '<div class="admin-empty-state">暂无功能权限记录。</div>';
    }

    function getRoleRuleRows() {
      return permissionPageState.roles.map((role) => {
        const roleUsers = permissionPageState.users.filter((user) => user.role === role.name);
        const userIds = new Set(roleUsers.map((user) => user.id));
        const activePermissions = permissionPageState.dataPermissions.filter((item) => item.active && userIds.has(item.user_id));
        if (role.code === 'ADMIN' || role.name.includes('超级')) {
          return {
            role,
            range: '全部数据',
            granularity: '无限制',
            desc: '管理员角色默认可访问全量数据，无需额外数据范围限制。',
          };
        }
        const scopes = Array.from(new Set(activePermissions.map((item) => item.scope_type)));
        const scopeLabelMap = { company: '授权公司', project: '授权项目', position: '授权岗位' };
        const granularityMap = { company: '公司级', project: '项目级', position: '岗位级' };
        return {
          role,
          range: scopes.length ? scopes.map((scope) => scopeLabelMap[scope] || scope).join(' / ') : '暂无授权',
          granularity: scopes.length ? Array.from(new Set(scopes.map((scope) => granularityMap[scope] || scope))).join(' / ') : '未配置',
          desc: activePermissions.length
            ? `${activePermissions.length} 条有效数据权限记录，覆盖 ${activePermissions.map((item) => item.scope_name || item.scope_id).filter(Boolean).slice(0, 3).join('、')}${activePermissions.length > 3 ? ' 等范围' : ''}。`
            : '当前角色尚未配置可见范围。',
        };
      });
    }

    function renderDataRules() {
      const body = document.querySelector('[data-permission-data-body]');
      if (!body) return;
      body.innerHTML = getRoleRuleRows().map((item) => `
        <div class="admin-table-row admin-permission-data-grid">
          <div><span class="admin-pill ${getRoleTone(item.role.code || item.role.name)}">${escapeHtml(item.role.name)}</span></div>
          <div>${escapeHtml(item.range)}</div>
          <div>${escapeHtml(item.granularity)}</div>
          <div>${escapeHtml(item.desc)}</div>
        </div>
      `).join('') || '<div class="admin-empty-state">暂无数据权限规则。</div>';
    }

    async function loadPermissionPageData() {
      const [roles, permissions, users, dataPermissions] = await Promise.all([
        window.hrApi.roles(),
        window.hrApi.rolePermissions(),
        window.hrApi.users(),
        window.hrApi.dataPermissions(),
      ]);
      permissionPageState.roles = roles;
      permissionPageState.permissions = permissions;
      permissionPageState.users = users;
      permissionPageState.dataPermissions = dataPermissions;
      renderFunctionPermissions();
      renderDataRules();
    }

    function switchPermissionTab(tab) {
      permissionPageState.tab = tab;
      document.querySelectorAll('[data-permission-page-tabs] .admin-tabbar-btn').forEach((button) => {
        button.classList.toggle('is-active', button.dataset.permissionTab === tab);
      });
      document.querySelector('[data-permission-function-panel]').style.display = tab === 'function' ? '' : 'none';
      document.querySelector('[data-permission-data-panel]').style.display = tab === 'data' ? '' : 'none';
    }

    async function savePermission() {
      const permission_key = document.querySelector('[data-permission-form-key]').value.trim();
      const permission_type = document.querySelector('[data-permission-form-type]').value;
      const module = document.querySelector('[data-permission-form-module]').value.trim();
      const enabled = document.querySelector('[data-permission-form-enabled]').value === 'true';

      if (!permission_key || !module) throw new Error('请先填写完整的权限信息');

      const selectedRoles = Array.from(document.querySelectorAll('input[name="role_codes"]:checked')).map((input) => input.value);

      let originalRoles = [];
      const oldPerm = permissionPageState.editingPermission;
      if (oldPerm) {
        originalRoles = permissionPageState.permissions
          .filter((item) =>
            item.permission_key === oldPerm.permission_key &&
            (item.module || '') === (oldPerm.module || '') &&
            (item.permission_type || '') === (oldPerm.permission_type || '')
          )
          .map((item) => item.role_code);
      }

      const toAdd = selectedRoles.filter((role) => !originalRoles.includes(role));
      const toDelete = originalRoles.filter((role) => !selectedRoles.includes(role));

      const promises = [];
      toAdd.forEach((role_code) => {
        promises.push(
          window.hrApi.saveRolePermission({
            role_code,
            permission_key,
            permission_type,
            module,
            enabled,
          })
        );
      });
      toDelete.forEach((role_code) => {
        promises.push(
          window.hrApi.deleteRolePermission(role_code, permission_key, permission_type, module)
        );
      });

      await Promise.all(promises);

      closePermissionModal();
      await loadPermissionPageData();
      showToast('功能权限已保存');
    }

    function bindPermissionPageEvents() {
      const select = document.querySelector('[data-permission-form-key-select]');
      const input = document.querySelector('[data-permission-form-key]');
      if (select && input) {
        select.addEventListener('change', () => {
          const opt = select.options[select.selectedIndex];
          if (select.value === 'custom') {
            input.style.display = 'block';
            input.value = '';
            document.querySelector('[data-permission-form-type]').value = 'menu';
            document.querySelector('[data-permission-form-module]').value = '';
          } else {
            input.style.display = 'none';
            input.value = select.value;
            if (opt) {
              document.querySelector('[data-permission-form-type]').value = opt.dataset.type || 'menu';
              document.querySelector('[data-permission-form-module]').value = opt.dataset.module || '';
            }
          }
        });
      }

      document.addEventListener('click', async (event) => {
        const tabButton = event.target.closest('[data-permission-tab]');
        if (tabButton) {
          switchPermissionTab(tabButton.dataset.permissionTab);
          return;
        }
        if (event.target.closest('[data-permission-page-open-modal]')) {
          openPermissionModal();
          return;
        }
        if (event.target.closest('[data-permission-page-close-modal]')) {
          closePermissionModal();
          return;
        }
        if (event.target.closest('[data-permission-page-save-modal]')) {
          try { await savePermission(); } catch (error) { showToast(error.message || '保存失败'); }
          return;
        }
        const editButton = event.target.closest('[data-permission-page-edit]');
        if (editButton) {
          const permission = permissionPageState.permissions.find((item) =>
            item.permission_key === editButton.dataset.permissionPageEdit &&
            (item.module || '') === editButton.dataset.permissionPageModule &&
            (item.permission_type || '') === editButton.dataset.permissionPageType
          );
          openPermissionModal(permission || null);
        }
      });
    }

    window.addEventListener('DOMContentLoaded', async () => {
      await renderApp();
      bindPermissionPageEvents();
      try {
        await loadPermissionPageData();
      } catch (error) {
        console.warn(error);
        showToast('权限页面加载失败');
      }
    });
  </script>
</body>
</html>
